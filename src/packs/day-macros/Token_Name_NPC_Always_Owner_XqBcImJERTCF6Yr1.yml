folder: 1XrfuqzpstOwCTFI
name: Token Name-NPC-Always Owner
type: script
author: txZjek5EOiCBHPoz
img: icons/svg/sound-off.svg
scope: global
command: >-
  const sceneTokens = canvas.scene.tokens; // all tokens on current viewed scene

  const relevantTokens = sceneTokens.filter(k=> k.actor.type=="npc"); // filter
  for NPC tokens

  // await
  relevantTokens.map(i=>i.update({"displayName":CONST.TOKEN_DISPLAY_MODES.OWNER}));
  // slower

  let updates = relevantTokens.map(i=>({"_id":i._id, "displayName":
  CONST.TOKEN_DISPLAY_MODES.OWNER}));

  await canvas.scene.updateEmbeddedDocuments("Token", updates); // faster


  // CONST.TOKEN_DISPLAY_MODES reference:

  // NONE (never display) (0)

  // CONTROL (displayed when controlled) (10)

  // OWNER_HOVER (on hover for owner) (20)

  // HOVER (on hover for all) (30)

  // OWNER (always for owner) (40)

  // ALWAYS (always for all) (50)
sort: 0
ownership:
  default: 0
  txZjek5EOiCBHPoz: 3
