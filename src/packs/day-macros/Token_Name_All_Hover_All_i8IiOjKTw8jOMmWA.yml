name: Token Name-All-Hover All
type: script
author: txZjek5EOiCBHPoz
img: icons/svg/sound-off.svg
scope: global
command: |-
  // const activeSceneTokens = game.scenes.find(i=>i.active==true).tokens;
  const activeSceneTokens = canvas.scene.tokens;

  // Slower
  // await activeSceneTokens.map(i=>
  //    i.update({"displayName":CONST.TOKEN_DISPLAY_MODES.HOVER}));

  // Faster
  let updates = activeSceneTokens.map(i=>
    ({"_id":i._id, "displayName": CONST.TOKEN_DISPLAY_MODES.HOVER}));
  await canvas.scene.updateEmbeddedDocuments("Token", updates);

  // CONST.TOKEN_DISPLAY_MODES reference:
  // NONE (never display) (0)
  // CONTROL (displayed when controlled) (10)
  // OWNER_HOVER (on hover for owner) (20)
  // HOVER (on hover for all) (30)
  // OWNER (always for owner) (40)
  // ALWAYS (always for all) (50)
