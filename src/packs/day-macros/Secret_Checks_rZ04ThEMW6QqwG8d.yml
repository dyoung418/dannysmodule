name: Secret Checks
type: script
command: |-
  // Send a chat with a bunch of secret GM roll inline chat buttons
  main()

  async function main() {

      let rolls = [
        "<hr>Perception Checks",
        `<p>@Check[type:perception|dc:@self.level|adjustment:0|traits:secret|showDC:gm]</p>`,
        "<hr>Recall Knowledge Checks",
        `<p>@Check[type:nature|dc:@self.level|adjustment:0|traits:secret|showDC:gm] 
        @Check[type:arcana|dc:@self.level|adjustment:0|traits:secret|showDC:gm] 
        @Check[type:occultism|dc:@self.level|adjustment:0|traits:secret|showDC:gm] 
        @Check[type:religion|dc:@self.level|adjustment:0|traits:secret|showDC:gm]
        @Check[type:crafting|dc:@self.level|adjustment:0|traits:secret|showDC:gm]
        @Check[type:diplomacy|dc:@self.level|adjustment:0|traits:secret|showDC:gm]
        @Check[type:society|dc:@self.level|adjustment:0|traits:secret|showDC:gm]</p>`,
        "<hr>Social Encounter Checks",
        `<p>@Check[type:diplomacy|dc:@self.level|adjustment:0|traits:secret|showDC:gm] 
        @Check[type:deception|dc:@self.level|adjustment:0|traits:secret|showDC:gm] 
        @Check[type:intimidation|dc:@self.level|adjustment:0|traits:secret|showDC:gm] 
        @Check[type:performance|dc:@self.level|adjustment:0|traits:secret|showDC:gm]</p>`,
        "<hr>Secrecy Checks",
        `<p>@Check[type:stealth|dc:@self.level|adjustment:0|traits:secret|showDC:gm] 
        @Check[type:thievery|dc:@self.level|adjustment:0|traits:secret|showDC:gm] 
        @Check[type:acrobatics|dc:@self.level|adjustment:0|traits:secret|showDC:gm] 
        @Check[type:athletics|dc:@self.level|adjustment:0|traits:secret|showDC:gm] 
        @Check[type:survival|dc:@self.level|adjustment:0|traits:secret|showDC:gm]</p>`,
      ];
      console.log(rolls.join(" "));
      
      ChatMessage.create({content: rolls.join(" ")});
  }
