name: Roll rolltable with Blind GM option
type: script
command: >-
  /* Macro to roll on a rolltable using blind gm mode
   REQUIRED: uncomment and update one of the methods below for getting the table with your table (by name, by id, or by UUID).
  */


  const myTable = game.tables.getName("Random Kingdom Events"); // by name

  //const myTable = game.tables.get("2hCBWiGyHz1duvp6"); // by id

  //const myTable = game.tables.find((t) => t.uuid ==
  "RollTable.2hCBWiGyHz1duvp6"); // by UUID


  myTable.draw({roll: true, displayChat: true, rollMode:
  CONST.DICE_ROLL_MODES.BLIND});
