name: Send imm/weak/resist to chat
type: script
command: |-
  await ChatMessage.create( 
    {
      user: game.user._id, 
      content: _token.actor.name + ["immunities", "weaknesses", 
                "resistances"].map(
        (x) => `<p><b>${x}</b>` + ': ' +
               _token.actor.system.attributes[x].map(
          (p) => p.label ).join( ',</p>' ) ).join( "<hl>" ) 
    }, {} );
