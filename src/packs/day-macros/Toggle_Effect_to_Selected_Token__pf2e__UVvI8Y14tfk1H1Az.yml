command: |-
  // REQUIRED: update the UUID below
  const ITEM_UUID = "Item.08zmCz8bM0ifoOGY"; // Wyvern Venom

  const actors = game.user.getActiveTokens().flatMap((t) => t.actor ?? []);
  if (actors.length === 0) {
      return ui.notifications.error("Select at least one token");
  }

  const item = await fromUuid(ITEM_UUID);
  if (item?.type === "condition") {
      for (const actor of actors) {
          actor.toggleCondition(item.slug);
      }
  } else if (item?.type === "effect") {
      const source = item.toObject();
      source.flags = mergeObject(source.flags ?? {}, { core: { sourceId: ITEM_UUID } });

      for (const actor of actors) {
          const existing = actor.itemTypes.effect.find((e) => e.flags.core?.sourceId === ITEM_UUID);
          if (existing) {
              await existing.delete();
          } else {
              await actor.createEmbeddedDocuments("Item", [source]);
          }
      }
  } else {
      ui.notifications.error("Item UUID not found");
  }
name: Toggle Effect to Selected Token (pf2e)
