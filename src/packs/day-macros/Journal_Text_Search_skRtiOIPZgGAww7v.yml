_id: skRtiOIPZgGAww7v
author: txZjek5EOiCBHPoz
img: icons/tools/scribal/magnifying-glass.webp
scope: global
command: |-
  const inputDialog = new Dialog({
      title: "Find Text in Journals",
      content: `<label for="toFind">Text to Find</label><input id="toFind" name="toFind" type="text">`,
      buttons: {
          find: {
          label: "Find Text in Journal",
          callback: (html) => findItems(html),
          icon: `<i class="fas fa-check"></i>`
          }
      }
  }).render(true);

  async function findItems(html) {
      let toFind = html.find("#toFind").val();
      let results = "";
      for (let journal of game.journal) {
          for (let page of journal.pages) {
              if ( page.type !== "text" || !page.text.content ) continue;
              const text = page.text.content;
              if ( text.includes(toFind) ) results += `<p><a class="content-link" draggable="true" data-link data-uuid="${page.uuid}" data-id="${page.id}}" data-type="JournalEntryPage" data-tooltip="Text Page">` + page.name + `</a></p>`;
          }
      }
      const breakdown = new Dialog({
          title: "In The Following Locations",
          content: results,
          buttons: {}
      }).render(true);
  }
