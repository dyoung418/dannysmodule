          'claimhex-magi': {'action': "Claim Hex", 'skill': "magic", 'result_text': claimhexResultText, 'result_rp': {0:1, 1:1, 2:1, 3:1}},
          'claimhex-wild': {'action': "Claim Hex", 'skill': "wilderness", 'result_text': claimhexResultText, 'result_rp': {0:1, 1:1, 2:1, 3:1}},
