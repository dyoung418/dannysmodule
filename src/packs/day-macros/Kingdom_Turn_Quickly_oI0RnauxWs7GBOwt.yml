          'rr-intr': {'action': "Repair Reputation (Trained)", 'skill': "intrigue",
              'result_text': {0:`Cannot attempt Repair Reputation for 3 Kingdom Turns`, 1:`Cannot attempt Repair Reputation for Strife for 1 turn`, 2:`Reduce Strife by 1`, 3:`Reduce Strife by 2 and reduce its current ruin penalty by 1 to a minimum of 0`}, 
