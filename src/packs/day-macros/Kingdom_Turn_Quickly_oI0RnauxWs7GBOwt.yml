          'rr-trad': {'action': "Repair Reputation (Trained)", 'skill': "trade",
              'result_text': {0:`Cannot attempt Repair Reputation for 3 Kingdom Turns`, 1:`Cannot attempt Repair Reputation for Crime for 1 turn`, 2:`Reduce Crime by 1`, 3:`Reduce Crime by 2 and reduce its current ruin penalty by 1 to a minimum of 0`}, 
