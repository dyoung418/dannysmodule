              'result_unrest':rrResultUnrest,
              'dc_modifier': 2},
          'rnr-arts': {'action': "Rest and Relax", 'skill': "arts",'result_text': rnrResultText, 'result_rp': blankRp, 'result_unrest':rnrResultUnrest, 'skip_if_zero_unrest': true},
          'rnr-boat': {'action': "Rest and Relax", 'skill': "boating",'result_text': rnrResultText, 'result_rp': blankRp, 'result_unrest':rnrResultUnrest, 'skip_if_zero_unrest': true},
          'rnr-scho': {'action': "Rest and Relax", 'skill': "scholarship",'result_text': rnrResultText, 'result_rp': blankRp, 'result_unrest':rnrResultUnrest, 'skip_if_zero_unrest': true},
          'rnr-trad': {'action': "Rest and Relax", 'skill': "trade",'result_text': rnrResultText, 'result_rp': blankRp, 'result_unrest':rnrResultUnrest, 'skip_if_zero_unrest': true},
          'rnr-wild': {'action': "Rest and Relax", 'skill': "wilderness",'result_text': rnrResultText, 'result_rp': blankRp, 'result_unrest':rnrResultUnrest, 'skip_if_zero_unrest': true},
          'stl-arts': {'action': "Spread The Legend (Linzi)", 'skill': "arts",
              'result_text': {0:`Increase Unrest by 1d4 (done)`, 1:`Reduce unrest by 1 (done)`, 2:`Reduce Unrest by 1d6 (done)`, 3:`Reduce Unrest by 1d6 (done), Gain 1 bonus Fame next turn, Reduce DC of ongoing dangerous event by 1 this turn`}, 
              'result_rp': blankRp, 
              'result_unrest': {0:(await new Roll('1d4').roll()).result, 1:-1, 2:-1* (await new Roll('1d6').roll()).result, 3:-1* (await new Roll('1d6').roll()).result},
              'skip_if_zero_unrest': true},
          'tcvk-agri': {'action': "Take Charge (V&K)", 'skill': "agriculture", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
