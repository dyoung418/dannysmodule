          1:`No benefit, but still expensive. Immediately roll 1 Resource Die and spend RP equal to the result. If you can't afford this cost, treat this result as a Critical Failure instead.`, 
          2:`You gain a +1 circumstance bonus to Loyalty-based checks until the end of your next Kingdom turn (@UUID[Item.RULdEEmHmDBNIgp1]{Loyalty bonus or penalty}). Immediately roll 1 Resource Die and spend RP equal to the result. If you can't afford this cost, treat this result as a Critical Failure instead.`, 
