          'fa-warf': {'action': "Focused Attention", 'skill': "warfare",'result_text': faResultText, 'result_rp': blankRp},
          'fa-wild': {'action': "Focused Attention", 'skill': "wilderness",'result_text': faResultText, 'result_rp': blankRp},
          'ha-expl': {'action': "Hire Adventurers", 'skill': "exploration", 
              'result_text': {0:`You fail to end the +0 continuous event. You can no longer attempt to end this continuous event by hiring adventurers (RP deducted)`, 
                  1:`You fail to end the +0 continuous event (RP deducted). If you try to end the continuous event again, the cost in RP increases to 2 resouce dice`, 
                  2:`The +0 continuous event doesn't end, but you gain a +2 circumstance bonus to resolve the event during the next Event phase (RP deducted)`, 
