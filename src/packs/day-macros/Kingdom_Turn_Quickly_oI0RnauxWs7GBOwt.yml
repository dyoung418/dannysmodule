          'tcvk-defe': {'action': "Take Charge (V&K)", 'skill': "defense", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
          'tcvk-engi': {'action': "Take Charge (V&K)", 'skill': "engineering", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
          'tcvk-expl': {'action': "Take Charge (V&K)", 'skill': "exploration", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
          'tcvk-folk': {'action': "Take Charge (V&K)", 'skill': "folklore", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
          'tcvk-indu': {'action': "Take Charge (V&K)", 'skill': "industry", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
          'tcvk-intr': {'action': "Take Charge (V&K)", 'skill': "intrigue", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
          'tcvk-magi': {'action': "Take Charge (V&K)", 'skill': "magic", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
          'tcvk-poli': {'action': "Take Charge (V&K)", 'skill': "politics", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
          'tcvk-scho': {'action': "Take Charge (V&K)", 'skill': "scholarship", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
          'tcvk-stat': {'action': "Take Charge (V&K)", 'skill': "statecraft", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
          'tcvk-trad': {'action': "Take Charge (V&K)", 'skill': "trade", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
          'tcvk-warf': {'action': "Take Charge (V&K)", 'skill': "warfare", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
          'tcvk-wild': {'action': "Take Charge (V&K)", 'skill': "wilderness", 'result_text': tcvkResultText, 'result_rp': tcvkResultRp},
