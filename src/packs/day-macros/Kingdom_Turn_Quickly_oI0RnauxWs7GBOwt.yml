              }
      let finalMessage = ['<p><b>Kingdom Rolls Summary</b></p><hr>'];
      let rollSummary;
      for(let option of options){
          if(choices[option].hasOwnProperty('skip_if_zero_unrest') && kingdom.unrest.value == 0){
              console.log(`Skipping ${choices[option].action} / ${choices[option].skill} because unrest is zero`)
              continue;
          }
          if(choices[option].hasOwnProperty('skip_if_zero_unrest_and_ruin') && kingdom.unrest.value == 0 && kingdom.abilities.culture.ruin.value == 0 &&
                  kingdom.abilities.economy.ruin.value == 0 && kingdom.abilities.loyalty.ruin.value == 0 && kingdom.abilities.stability.ruin.value == 0){
              console.log(`Skipping ${choices[option].action} / ${choices[option].skill} because unrest and ruins are zero`)
              continue;
          }
          const rollDc = choices[option].hasOwnProperty('dc_modifier') ? kingdom.control.dc.value + choices[option].dc_modifier : kingdom.control.dc.value;
          const roll = await game.actors.party.getStatistic(choices[option].skill).roll({
              "dc": rollDc,
              "item": kingdom.activities.find((a)=>a.name==choices[option].action),
              "extraRollOptions": [
                  "downtime",
                  "leadership" // DAY TODO - I have some non-leadership actions in the list now.
              ],
              "title": `Kingdom Action: ${choices[option].action} / ${choices[option].skill}`,
              "skipDialog": true
          });
          // Create summarization of the roll
          rollSummary = `<p><b>${choices[option].action} / ${choices[option].skill}:</b></p><p style="margin-left: 25px;">${basicResultText[roll.degreeOfSuccess]}: ${choices[option].result_text[roll.degreeOfSuccess]}</p>`;
          // Make any change required to Kingdom Resource Points
          if(choices[option].result_rp[roll.degreeOfSuccess] != 0){
              await kingdom.update({"resources.points": Math.max(0, parseInt(kingdom.resources.points) + parseInt(choices[option].result_rp[roll.degreeOfSuccess])) });
              rollSummary = rollSummary.concat(`<p style="margin-left: 35px;">(RP changed by ${choices[option].result_rp[roll.degreeOfSuccess]})</p>`);
          }
          // Make any change required to Kingdom Unrest
          if(choices[option].hasOwnProperty('result_unrest') && choices[option].result_unrest[roll.degreeOfSuccess] != 0){
              console.log(`Unrest before changing = ${kingdom.unrest.value}.  About to change by ${choices[option].result_unrest[roll.degreeOfSuccess]}`);
              await kingdom.update({"unrest.value": Math.max(0, parseInt(kingdom.unrest.value) + parseInt(choices[option].result_unrest[roll.degreeOfSuccess])) });
              console.log(`Unrest after changing = ${kingdom.unrest.value}`);
              rollSummary = rollSummary.concat(`<p style="margin-left: 35px;">(Unrest changed by ${choices[option].result_unrest[roll.degreeOfSuccess]})</p>`);
          }
          // Send result to chat
          //ChatMessage.create({ content: rollSummary });
          // accumulate the message for big summary message at the end.
          finalMessage.push(rollSummary);
      }
      // Send big summary message of all rolls
      ChatMessage.create({content: finalMessage.join("<hr>")});
      return;
  }

  async function changeKingdom() {
      console.log(`Current resource points = ${kingdom.resources.points}.`);
      await kingdom.update({"resources.points": kingdom.resources.points-1});
      console.log(`Now the resource points = ${kingdom.resources.points}`);
      return;
  }

