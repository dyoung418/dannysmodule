scope: global
command: |-
  // Take a variety of common kingdom actions to streamline kingdom turns.
  main()

  async function main() {
      
      let kingdom = game.actors.party?.campaign;
      if(!kingdom){
          ui.notifications.error("You don't seem to have a kingdom");
      }
      console.log(kingdom);
      
      const option = await showOptions();
      //console.log(`Option: `, option);
      
      makeRolls(kingdom, option);
      
  }

