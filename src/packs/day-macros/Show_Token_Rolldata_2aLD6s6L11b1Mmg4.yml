name: Show Token Rolldata
type: script
command: |-
  const controlledTokens = game.canvas.tokens.controlled;

  if( controlledTokens.length < 1 ) {
    UI.notification("Please select a token");
    return;
  }

  const rollData = controlledTokens[0].actor.getRollData();
  console.log(rollData);
