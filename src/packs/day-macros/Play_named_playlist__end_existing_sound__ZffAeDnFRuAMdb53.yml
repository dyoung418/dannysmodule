name: Play named playlist (end existing sound)
type: script
author: txZjek5EOiCBHPoz
img: icons/svg/dice-target.svg
scope: global
command: |-
  // Path to playlist to play
  const sourcePlaylistName = "A Dream of Defeat";
  const fadeoutDurationMS = 500; // Optional fade out duration in milliseconds

  // Check if playlist is already playing and if so, exit
  // Stop other playlists.
  // Exiting early if it is playing prevents problems if this is triggered
  // multiple times.
  let alreadyPlaying = false;
  game.playlists.filter(p => p.playing).forEach(  
    p => {
        if( p.name === sourcePlaylistName ) {
          alreadyPlaying = true;
        } else {
          p.stopAll();
        }
    });
  if ( alreadyPlaying ) { 
    console.log("exiting because playlist is already playing");
    return; 
  }

  // End any existing sounds
  //const source = "/path/to/soundfile.ogg"
  /*
  for ( let [_, sound] of game.audio.playing ) {
    //const { src } = sound; //these lines are for stopping a named sound
    //if (src === source) {
      console.log(`stopping sound ${sound.src}`)
      await sound.fade(0, { duration: fadeoutDurationMS });
      await sound.stop();
      //return;
    //}
  }
  */

  const options = game.playlists.reduce((acc, e) => {
    // Check if the current playlist's name matches the sourcePlaylist
    const isSelected = (e.name === sourcePlaylistName) ? "selected" : "";
    // Add the 'selected' attribute if it matches
    return acc += `<option value="${e.id}" ${isSelected}>${e.name}</option>`;
  }, ``);

  const content = `<form>
    <div class="form-group">
      <label>Playlist</label>
      <div class="form-fields">
        <select name="playlistId">${options}</select>
      </div>
    </div>
  </form>`;

  const id = await Dialog.prompt({
      title: "Start Playlist",
      content,
      label: "Play",
      callback: (html) => {
          const {playlistId} = new foundry.applications.ux.FormDataExtended(html[0].querySelector("form")).object;
          return playlistId;
      }
  });

  console.log(id);
  const pl = game.playlists.get(`${id}`);
  const plFull = await fromUuid(`Playlist.${id}`);
  console.log(plFull);
  await plFull.playAll();
