      description: >-
        <p>Rangers are highly skilled hunters who, despite their martial
        abilities, rarely lend their skills to an army. Through mastery of the
        body and a deep understanding of the wilderness, rangers become sly
        tacticians, pursuing their quarry with cunning and patience. Many
        rangers track and fight alongside an animal companion with whom they’ve
        forged a powerful spiritual bond. By honing their skills in the wild,
        rangers become expert trackers, as likely to ensnare their foes in a
        trap as they are to assail them head-on.</p>
