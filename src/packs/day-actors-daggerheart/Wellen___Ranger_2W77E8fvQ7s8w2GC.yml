  - folder: onLJZkd7ZOMBaFMG
    name: Ranger's Focus
    type: feature
    _id: FJ5F8YxX0wQ4MVPQ
    img: icons/magic/perception/eye-ringed-green.webp
    system:
      description: >-
        <p>Spend a Hope and make an attack against a target. On a success, deal
        your attack’s normal damage and temporarily make the attack’s target
        your Focus. Until this feature ends or you make a different creature
