  - effects: []
    _id: zlxRXMLZl8Tzf9Tv
    name: Goblin
    type: ancestry
    img: icons/magic/symbols/arrowhead-green.webp
    system:
      attribution:
        source: Daggerheart SRD
        page: 29
        artist: ''
      description: >-
        <p>Goblins are small humanoids easily recognizable by their large eyes
        and massive membranous ears. With keen hearing and sharp eyesight, they
        perceive details both at great distances and in darkness, allowing them
        to move through less-optimal environments with ease. Their skin and eye
        colors are incredibly varied, with no one hue, either vibrant or
        subdued, more dominant than another. A typical goblin stands between 3
        feet and 4 feet tall, and each of their ears is about the size of their
        head. Goblins are known to use ear positions to very specific effect
        when communicating nonverbally. A goblin’s lifespan is roughly 100
        years, and many maintain their keen hearing and sight well into advanced
        age.</p>
      features:
        - type: primary
          item: Compendium.daggerheart.ancestries.Item.YsJticxv8OFndd4D
        - type: secondary
          item: Compendium.daggerheart.ancestries.Item.AXqcoxnRoWBbbKpK
