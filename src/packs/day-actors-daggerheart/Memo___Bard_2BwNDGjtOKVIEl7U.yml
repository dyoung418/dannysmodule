        release)</strong></p><p><br>Bards are the most charismatic people in all
        the realms. Members of this class are masters of captivation and
        specialize in a variety of performance types, including singing, playing
        musical instruments, weaving tales, or telling jokes. Whether performing
        for an audience or speaking to an individual, bards thrive in social
        situations. Members of this profession bond and train at schools or
        guilds, but a current of egotism runs through those of the bardic
