  - name: Clank
    type: ancestry
    img: icons/creatures/magical/construct-golem-stone-blue.webp
    system:
      description: >-
        <p>Clanks are sentient mechanical beings built from a variety of
        materials, including metal, wood, and stone.<br><br></p><p class="green
        Body-Styles_Body">They can resemble humanoids, animals, or even
        inanimate objects. Like organic beings, their bodies come in a wide
        array of sizes. Because of their bespoke construction, many clanks have
        highly specialized physical configurations. Examples include clawed
        hands for grasping, wheels for movement, or built-in weaponry.</p>

        <p class="green Body-Styles_Body">Many clanks embrace body modifications
        for style as well as function, and members of other ancestries often
        turn to clank artisans to construct customized mobility aids and
        physical adornments. Other ancestries can create clanks, even using
        their own physical characteristics as inspiration, but it’s also common
        for clanks to build one another. A clank’s lifespan extends as long as
        they’re able to acquire or craft new parts, making their physical form
        effectively immortal. That said, their minds are subject to the effects
        of time, and deteriorate as the magic that powers them loses
        potency.</p><p></p>
      features:
        - type: primary
          item: Actor.2BwNDGjtOKVIEl7U.Item.fs4sUHaE4X3jXd8E
        - type: secondary
          item: Actor.2BwNDGjtOKVIEl7U.Item.cYG609rCLkiZX7jN
