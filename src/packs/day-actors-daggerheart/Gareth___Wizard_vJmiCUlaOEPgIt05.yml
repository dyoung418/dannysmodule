  - folder: SwEjiVLbnXT2x9Lz
    name: Strange Patterns
    type: feature
    _id: XjO3u3pK9FhLLom1
    img: icons/magic/symbols/rune-sigil-black-pink.webp
    system:
      description: >-
        <p>Choose a number between 1 and 12. When you roll that number on a
        Duality Die, gain a Hope or clear a Stress.</p><p></p><p>You can change
        this number when you take a long rest.</p>
      resource:
        type: diceValue
        value: 1
        max: '1'
        icon: fa-solid fa-hashtag
        dieFaces: d12
        recovery: null
        progression: increasing
        diceStates: {}
      actions:
        RkqPzF1bdWzPPMml:
          type: healing
          _id: RkqPzF1bdWzPPMml
          systemPath: actions
          description: >-
            <p>Choose a number between 1 and 12. When you roll that number on a
            Duality Die, gain a Hope or clear a Stress.</p><p></p><p>You can
            change this number when you take a long rest.</p>
          chatDisplay: true
          actionType: action
          cost: []
          uses:
            value: null
            max: ''
            recovery: null
            consumeOnSuccess: false
          damage:
            parts:
              stress:
                value:
                  custom:
                    enabled: true
                    formula: '1'
                  multiplier: prof
                  flatMultiplier: 1
                  dice: d6
                  bonus: null
                applyTo: stress
                base: false
                resultBased: false
                valueAlt:
                  multiplier: prof
                  flatMultiplier: 1
                  dice: d6
                  bonus: null
                  custom:
                    enabled: false
                    formula: ''
                type: []
            includeBase: false
            direct: false
          target:
            type: any
            amount: null
          effects: []
          roll:
            type: null
            trait: null
            difficulty: null
            bonus: null
            advState: neutral
            diceRolling:
              multiplier: prof
              flatMultiplier: 1
              dice: d6
              compare: null
              treshold: null
            useDefault: false
          name: Clear Stress
          img: icons/magic/symbols/rune-sigil-black-pink.webp
          range: ''
          triggers:
            - trigger: dualityRoll
              triggeringActorType: self
              command: >-
                /* Check if there's a Strange Pattern match */

                const dice = [roll.dFear.total, roll.dHope.total];

                const resource = this.parent.resource?.diceStates ?
                Object.values(this.parent.resource.diceStates).map(x =>
                x.value)[0] : null;

                const nrMatches = dice.filter(x => x === resource).length;


                if (!nrMatches) return;


                /* Create a dialog to choose Hope or Stress - or to cancel*/

                const content = `
                  <div><div>${game.i18n.format('DAGGERHEART.CONFIG.Triggers.triggerTexts.strangePatternsContentTitle', { nr: nrMatches })}</div>
                  <div>${game.i18n.format('DAGGERHEART.CONFIG.Triggers.triggerTexts.strangePatternsContentSubTitle', { nr: nrMatches })}</div>
                <div>${game.i18n.localize('DAGGERHEART.CONFIG.Triggers.triggerTexts.strangePatternsActionExplanation')}</div>
                      <div class="flexrow" style="gap: 8px;">
                        <button type="button" id="hopeButton">
                          <i class="fa-solid fa-hands-holding"></i>
                          <label>0</label>
                        </button>
                        <button type="button" id="stressButton">
                          <i class="fa-solid fa-bolt-lightning"></i>
                          <label>0</label>
                        </button>
                      </div>
                </div>`;


                const result = await foundry.applications.api.DialogV2.input({
                  classes: ['dh-style', 'two-big-buttons'],
                  window: { title: this.item.name },
                  content: content,
                  render: (_, dialog) => {
                      const hopeButton = dialog.element.querySelector('#hopeButton');
                      const stressButton = dialog.element.querySelector('#stressButton');
                dialog.element.querySelector('button[type="submit"]').disabled =
                true;
                    
                      const updateFunc = (event, selector, adding, clamp) => {
                        const button = event.target.closest(`#${selector}Button`);
                        const parent = event.target.closest('.flexrow');
                        const hope = Number.parseInt(parent.querySelector('#hopeButton label').innerHTML);
                        const stress = Number.parseInt(parent.querySelector('#stressButton label').innerHTML);
                        const currentTotal = (Number.isNumeric(hope) ? hope : 0) + (Number.isNumeric(stress) ? stress : 0);
                        if (adding && currentTotal === nrMatches) return;
                        
                        const current = Number.parseInt(button.querySelector('label').innerHTML);
                        if (!adding && current === 0) return;
                        
                        const value = Number.isNumeric(current) ? adding ? current+1 : current-1 : 1;
                        if (!dialog.data) dialog.data = {};
                        dialog.data[selector] = clamp(value);
                        button.querySelector('label').innerHTML = dialog.data[selector];

                        event.target.closest('.dialog-form').querySelector('button[type="submit"]').disabled = !adding || currentTotal < (nrMatches-1);
                        
                      };
                      hopeButton.addEventListener('click', event => updateFunc(event, 'hope', true, x => Math.min(x, nrMatches)));
                      hopeButton.addEventListener('contextmenu', event => updateFunc(event, 'hope', false, x => Math.max(x, 0)));
                      stressButton.addEventListener('click', event => updateFunc(event, 'stress', true, x => Math.min(x, nrMatches)));
                      stressButton.addEventListener('contextmenu', event => updateFunc(event, 'stress', false, x => Math.max(x, 0)));
                  },
                  ok: { callback: (_event, _result, dialog) => {
                    const hope = dialog.data.hope ?? 0;
                    const stress = dialog.data.stress ?? 0;
                    if (!hope && !stress) return;

                    /* Return resource update according to choices */
                    const hopeUpdate = hope ? { key: 'hope', value: hope, total: -hope, enabled: true } : null;
                    const stressUpdate = stress ? { key: 'stress', value: -stress, total: stress, enabled: true } : null;
                    return { updates: [hopeUpdate, stressUpdate].filter(x => x) };
                  }}
                });


                return result;
          baseAction: false
          originItem:
            type: itemCollection
          areas: []
      originItemType: class
      attribution:
        source: Daggerheart SRD
        page: 25
        artist: ''
      multiclassOrigin: false
      identifier: class
      featureForm: passive
    effects: []
