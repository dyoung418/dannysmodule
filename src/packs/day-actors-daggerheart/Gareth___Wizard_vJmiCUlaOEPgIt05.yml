        make a <strong>Spellcast Roll (16)</strong>:</p><ul><li
        class="vertical-card-list">If you know the place very well, gain a +3
        bonus.</li><li class="vertical-card-list">If you’ve visited the place
        frequently, gain a +1 bonus.</li><li class="vertical-card-list">If
        you’ve visited the place infrequently, gain no modifier.</li><li
