name: Tripline Arrows
type: consumable
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>This arrow unspools a line of wire as its flies at its target.
      The</p><p>wire animates as it hits a target and attempts to wrap
      around</p><p>its legs before vanishing a moment later. If you can apply
      the</p><p>bow’s critical specialization effect, you can choose to
      knock</p><p>the target prone instead of pinning the target. If you
      cannot</p><p>apply the bow’s critical specialization effect, you can
      instead</p><p>attempt to use the arrow to Trip with the @Check[athletics]
      skill as</p><p>if the bow had the trip weapon trait. The arrow’s
      unwieldy</p><p>nature halves its weapon’s range increment.</p>
