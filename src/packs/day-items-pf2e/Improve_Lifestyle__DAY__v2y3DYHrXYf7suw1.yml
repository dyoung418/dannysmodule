name: Improve Lifestyle (DAY)
system:
  description:
    gm: ''
    value: >-
      <p>Attempt a basic @Check[politics|dc:resolve(@kingdom.control.dc)] check
      to draw upon your kingdom's treasury to enhance the quality of life for
      your citizens. This activity can be taken only during the Commerce phase
      of a Kingdom turn.</p><hr><p><strong>Critical Success</strong> Your push
      to Improve Lifestyles affords your citizens significant free time to
      pursue recreational activities. For the remainder of the Kingdom turn, you
      gain a +2 circumstance bonus to Culture-based checks. Pull
      @UUID[Item.T7ndb7zZTZi3jO8R]{Culture bonus or penalty} onto the kingdom
      sheet, set it to 2 and delete it at the end of the turn (in Ongoing
      tab).</p><p><strong>Success</strong> Your push to Improve Lifestyles helps
      your citizens enjoy life. For the remainder of the Kingdom turn, you gain
      a +1 circumstance bonus to Culture-based checks. Pull
      @UUID[Item.T7ndb7zZTZi3jO8R]{Culture bonus or penalty} onto the kingdom
      sheet, set it to 1 and delete it at the end of the turn (in Ongoing
      tab).</p><p><strong>Failure</strong> As success, but you've strained your
      treasury. Take a –1 circumstance penalty to Economy-based checks for the
      remainder of this Kingdom turn. Pull @UUID[Item.Y6jCauFqTKiSNr0d]{Economy
      bonus or penalty} onto sheet.</p><p><strong>Critical Failure</strong> Your
      attempt to Improve Lifestyles backfires horribly as criminal elements in
      your kingdom abuse your generosity. You take a –1 circumstance penalty to
      Economy-based checks for the remainder of the Kingdom turn, gain 1 Unrest,
      and add 1 to a Ruin of your choice. (Pull
      @UUID[Item.Y6jCauFqTKiSNr0d]{Economy bonus or penalty} onto sheet.) onto
      sheet.)</p>
