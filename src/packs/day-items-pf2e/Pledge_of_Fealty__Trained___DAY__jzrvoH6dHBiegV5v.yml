name: Pledge of Fealty (Trained) (DAY)
system:
  description:
    gm: ''
    value: >-
      <p>When your representatives encounter freeholders, refugees, independent
      groups, or other bands of individuals gathered in the wilderness who
      aren't already part of a nation, you can offer them a place in your
      kingdom, granting them the benefits of protection, security, and
      prosperity in exchange for their fealty. The benefits granted to your
      kingdom can vary wildly, but often manifest as one-time boons to your
      commodities or unique bonuses against certain types of events. The
      adventure text in this campaign offers numerous examples of groups who
      could accept a Pledge of Fealty. You can attempt this skill check with
      @Check[intrigue|dc:resolve(@kingdom.control.dc)],
      @Check[statecraft|dc:resolve(@kingdom.control.dc)], or
      @Check[warfare|dc:resolve(@kingdom.control.dc)]; however, certain groups
      will respond better (or worse) to specific skills. The DC is the
      @UUID[JournalEntry.ufhwExwde2g3iEa7.JournalEntryPage.eATwgXlHtXmEU16S]{group's
      Negotiation DC} (see the sidebar on page 519).</p><hr
      /><p><strong>Critical Success</strong> The group becomes part of your
      kingdom, granting the specific boon or advantage listed in that group's
      entry. If you haven't already claimed the hex in which the group dwells,
      you immediately do so, gaining 10 kingdom XP and increasing your kingdom's
      Size by 1 (this affects all statistics determined by Size; see page 532).
      If the hex doesn't share a border with your kingdom, it becomes a
      secondary territory and checks involving this location take a Control
      penalty.</p><p><strong>Success</strong> As success, but you don't claim
      the hex the group is in. Immediately roll 1 Resource Die. You must spend
      RP equal to the result to integrate the group into your
      kingdom.</p><p><strong>Failure</strong> The group refuses to pledge to you
      at this time. You can attempt to get them to Pledge Fealty next turn.
      Increase Unrest by 1.</p><p><strong>Critical Failure</strong> The group
      refuses to pledge to you—furthermore, it will never Pledge Fealty to your
      kingdom, barring significant in-play changes or actions by the PCs
      (subject to the GM's approval). The group's potentially violent rebuff of
      your offer increases Unrest by 2 and increases a Ruin of your choice by
      1</p>
