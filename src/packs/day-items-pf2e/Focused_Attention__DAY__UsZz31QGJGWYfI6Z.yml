    value: >-
      <p>You set aside time to focus attention on aiding another leader in an
      activity. Choose another leader and a Kingdom skill, then attempt a DC 20
      check using the chosen skill.</p><p>@Check[agriculture|dc:20]<br
      />@Check[arts|dc:20]<br />@Check[boating|dc:20]<br
      />@Check[defense|dc:20]<br />@Check[engineering|dc:20]<br
      />@Check[exploration|dc:20]<br />@Check[folklore|dc:20]<br
      />@Check[industry|dc:20]<br />@Check[intrigue|dc:20]<br
      />@Check[magic|dc:20]<br />@Check[politics|dc:20]<br
      />@Check[scholarship|dc:20]<br />@Check[statecraft|dc:20]<br
      />@Check[trade|dc:20]<br />@Check[warfare|dc:20]<br
      />@Check[wilderness|dc:20]</p><p></p><p>On a success, you grant that
      leader a +2 circumstance bonus to one kingdom check using that skill,
      provided that leader attempts the skill check during the same Kingdom
      turn. </p><p>The Cooperative Leadership Kingdom feat increases the
      efficiency of this activity.</p>
