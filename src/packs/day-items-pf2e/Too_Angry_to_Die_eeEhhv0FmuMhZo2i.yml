name: Too Angry to Die
system:
  description:
    gm: ''
    value: >-
      <p><strong>Trigger</strong> you stand up from
      @UUID[Compendium.pf2e.conditionitems.Item.j91X7x0XSomq8d60]{Prone} after
      waking up from being
      @UUID[Compendium.pf2e.conditionitems.Item.fBnFDH2MTzgFijKf]{Unconscious}</p>

      <hr>

      <p>You refuse to yield the battle, even after you've been knocked off your
      feet and nearly killed. For you, such a brush with death is less something
      to fear and more a thing to become infuriated by. As you stand up, you
      roar in defiance and can attempt to
      @UUID[Compendium.pf2e.actionspf2e.Item.2u915NdUyQan6uKF]{Demoralize} a
      foe.</p>
