system:
  description:
    gm: ''
    value: "<p>Kalikke takes time and weighs all options when faced with decisions, regardless of their importance. While this can sometimes lead her to taking too long to make choices, her theoretical analysis can be quite helpful in navigating continuous events. Choose a single continuous event that will affect your kingdom on this turn’s Event Phase, then attempt a @Check[scholarship|dc:resolve(@kingdom.control.dc)] check against that event’s DC.<br /><strong>Critical Success</strong> Kalikke’s aid has been monumentally\_helpful. When you roll to resolve the continuous event\_you chose, you can roll twice and choose which result to apply. You gain a +1 status bonus to each roll.<br /><strong>Success</strong> Kalikke’s suggestions are useful, granting you a +1\_status bonus to rolls to resolve the chosen continuous\_event.<br /><strong>Failure</strong> Kalikke’s advice isn’t helpful, but neither does it\_hinder your ability to handle the event.<br /><strong>Critical Failure</strong> You got too caught up in Kalikke’s theoretical analysis and spent too much time preparing. When you\_roll to resolve the continuous event you tried to plan for,\_roll twice and take the worse result.</p>"
