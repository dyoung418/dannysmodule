  description:
    gm: ''
    value: "<p>You spend some time getting directly involved in helping your kingdom. Choose a skill that your Kingdom is at least Trained in, then attempt a basic check. You can never use the same skill for this activity twice in the same Kingdom turn.\_</p><p>@Check[agriculture|dc:resolve(@kingdom.control.dc)]<br />@Check[arts|dc:resolve(@kingdom.control.dc)]<br />@Check[boating|dc:resolve(@kingdom.control.dc)]<br />@Check[defense|dc:resolve(@kingdom.control.dc)]<br />@Check[engineering|dc:resolve(@kingdom.control.dc)]<br />@Check[exploration|dc:resolve(@kingdom.control.dc)]<br />@Check[folklore|dc:resolve(@kingdom.control.dc)]<br />@Check[industry|dc:resolve(@kingdom.control.dc)]<br />@Check[intrigue|dc:resolve(@kingdom.control.dc)]<br />@Check[magic|dc:resolve(@kingdom.control.dc)]<br />@Check[politics|dc:resolve(@kingdom.control.dc)]<br />@Check[scholarship|dc:resolve(@kingdom.control.dc)]<br />@Check[statecraft|dc:resolve(@kingdom.control.dc)]<br />@Check[trade|dc:resolve(@kingdom.control.dc)]<br />@Check[warfare|dc:resolve(@kingdom.control.dc)]<br />@Check[wilderness|dc:resolve(@kingdom.control.dc)]</p><p><strong>Critical Success</strong>: Gain 1 RP. In addition you get a +1 Circumstance Bonus to the next Check you make this turn with the chosen skill.<br /><strong>Success</strong>: Gain 1 RP<br /><strong>Failure</strong>: You fail to generate RP.<br /><strong>Critical Failure</strong>: You take a -1 Circumstance Penalty to the next Check you make this turn with the chosen skill.</p>"
