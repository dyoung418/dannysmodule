system:
  description:
    gm: ''
    value: "<p>You take advantage of your nation’s paper to print an extra edition, a bonus-sized issue, or something to spread news to the citizens of the nation so that they are more prepared for upcoming events or more informed on how to deal with ongoing events. Attempt a basic @Check[scholarship|dc:resolve(@kingdom.control.dc)] check to determine how helpful the information proves to be.<br /><strong>Critical Success</strong> Your kingdom becomes particularly\_prepared. The next time you attempt a skill check to\_resolve any event during this Kingdom turn, you gain a\_+4 circumstance bonus to the roll.<br /><strong>Success</strong> The information is helpful, but only against ongoing\_events. The next time you attempt a skill check to resolve\_an ongoing event during this Kingdom turn, you gain a +2\_circumstance bonus to the roll.<br /><strong>Failure</strong> You fail to prepare your people for the worst.<br /><strong>Critical Failure</strong> Critical parts of the information you\_published are false. You take a –2 circumstance penalty\_to all skill checks made to resolve Kingdom events for the\_remainder of this Kingdom turn.</p>"
