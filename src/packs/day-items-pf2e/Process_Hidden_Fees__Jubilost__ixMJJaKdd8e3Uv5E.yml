    value: "<p>With Jubilost’s aid, you can process additional taxes, fees,\_and payments. Attempt a basic @Check[trade|dc:resolve(@kingdom.control.dc)] check to determine what sorts of additional resources you gather.<br /><strong>Critical Success</strong> You gain 2 bonus Resource Dice at the\_start of your next Kingdom turn.<br /><strong>Success</strong> You gain 1 bonus Resource Die at the start of your next Kingdom turn, but the citizens suspect something is going on: if you attempt to Process Hidden Fees on the next Kingdom turn, the result is worsened one\_degree.<br /><strong>Failure</strong> As success, but the citizens catch wind of the\_fees and grow unhappy. Gain 1 Unrest, and you cannot\_Process Hidden Fees on your next Kingdom turn.<br /><strong>Critical Failure</strong> As failure, but gain 1d6 Unrest</p>"
