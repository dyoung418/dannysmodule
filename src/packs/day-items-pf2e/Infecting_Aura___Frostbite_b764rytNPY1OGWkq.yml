name: Infecting Aura - Frostbite
type: action
effects: []
system:
  _migration:
    version: 0.959
    previous: null
  description:
    value: >-
      <p>Aura's usually bestow some effect on others only when they are in the
      aura and it goes away when they leave the aura.</p><p>This one is
      different. This is an aura that "infects" a person with some effect that
      stays with them even when they leave the aura. If the infection lasts
      indefinitely, then you can do this rather simply by specifying
      "removeOnExit": false in the "effects" portion of the rule elements of the
      Aura. However, if you want the infection to be something that expires
      automatically (like after 1 round), then you need to use the method in
      this aura and the two companion effects (the aura gives the "aura tracker"
      effect which is a middleman that gives the "frostbite" effect which has a
      duration limit).</p><p>Note that this aura will give 2 effects, the
      middleman and the final.  The final will expire automatically, but the
      middleman will remain on the character and need to be manually removed (it
      has no lasting effect, but it is unfortunate that I don't yet have a way
      to make it go away after giving the person the final effect).</p>
