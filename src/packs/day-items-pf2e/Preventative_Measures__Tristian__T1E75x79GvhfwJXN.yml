    value: "<p><strong>Requires</strong>: Tristian is Magister and at least Friendly with the PCs</p>\n<p>Tristian helps to organize magical defenses and resources to combat potential upcoming disasters or dangers to the kingdom. Attempt a basic @Check[magic|dc:resolve(@kingdom.control.dc)] check to determine how effective the magical preparations are.<br /><strong>Critical Success</strong> The next time during this Kingdom turn\_that you attempt a Kingdom skill check to resolve a\_dangerous event, you gain a +2 circumstance bonus to\_the check and, unless you roll a critical failure, the result\_is improved one degree. If you reach the end of this\_Kingdom turn and haven’t had a dangerous event, you\_may decrease one Ruin of your choice by 1.<br /><strong>Success</strong> The next time during this Kingdom turn that you\_attempt a Kingdom skill check to resolve a dangerous\_event, you gain a +2 circumstance bonus to the check.<br /><strong>Critical Failure</strong> The attempt to put preventative measures\_in place has resulted in significant waste of resources.\_You can’t use Preventative Measures again on your next\_Kingdom turn, and when your next Kingdom turn begins,\_reduce your Resource Dice total by 2.</p>"
