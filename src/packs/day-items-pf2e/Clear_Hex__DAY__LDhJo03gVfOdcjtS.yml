name: Clear Hex (DAY)
system:
  description:
    gm: ''
    value: >-
      <p>Engineers and mercenaries attempt to prepare a hex to serve as the site
      for a settlement, or they work to remove an existing improvement, a
      dangerous hazard, or an encounter. If you're trying to prepare a hex for a
      settlement or demolish an improvement you previously built (or that was
      already present in the hex), <strong>spend RP</strong> as determined by
      the hex's most inhospitable terrain feature (see the
      @UUID[JournalEntry.ufhwExwde2g3iEa7.JournalEntryPage.BcxGDLM1uo4TqMZY]{Building
      on Rough Terrain} sidebar nearby). Then attempt a basic
      @Check[engineering|dc:resolve(@kingdom.control.dc)] check. If you're
      trying to remove a hazard or encounter, instead attempt an
      @Check[exploration|dc:resolve(@kingdom.control.dc)] check. The DC of this
      check is set by the highest level creature or hazard in the hex (as set by
      Table 10–5:
      @UUID[Compendium.pf2e.journals.JournalEntry.S55aqwWIzpQRFhcq.JournalEntryPage.dRu66xNqJ9Ihe1or#level-based-dcs]{DCs
      by Level}, on page 503 of the Pathfinder Core Rulebook). If the hex you're
      attempting to Clear has existing Ruins or an existing Structure, your
      action doesn't physically remove the buildings from the area and you can
      later incorporate these buildings (or repair ruined ones) into a
      Settlement you build here later (see page 542). Regardless of the skill
      used, <strong>increase the basic DC by 2 if the hex to be cleared is not
      yet part of your kingdom.</strong></p><hr /><p><strong>Critical
      Success</strong> You successfully clear the hex. If you spent RP to
      attempt this activity, you're refunded half of the RP cost. If you were
      removing dangerous creatures (but not hazards) from the hex, your
      explorers and mercenaries recover 2 Luxury Commodities as
      treasure.</p><p><strong>Success</strong> You successfully clear the
      hex.</p><p><strong>Failure</strong> You fail to clear the
      hex.</p><p><strong>Critical Failure</strong> You catastrophically fail to
      clear the hex and several workers lose their lives. Gain 1 Unrest.</p>
