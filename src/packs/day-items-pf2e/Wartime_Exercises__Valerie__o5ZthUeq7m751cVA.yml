system:
  description:
    gm: ''
    value: "<p><strong>Requires</strong>: Valerie is General and is at least Friendly to the PCs</p>\n<p>Valerie spends time studying the nation’s armies, speaking\_with its commanders, researching historical records of\_battles, and running simulations in war rooms to help\_predict the best ways to prepare for upcoming conflicts.\_Attempt a basic @Check[warfare|dc:resolve(@kingdom.control.dc)] check to determine the success\_of these exercises.<br /><strong>Critical Success</strong> The exercises reveal a wide range of\_suggestions for the PCs to use during that month’s military\_exercises. All Army activities taken during this Kingdom\_turn’s Activity Phase gain a +1 circumstance bonus. This\_bonus increases to +2 at Kingdom level 9 and +3 at Kingdom\_level 15. In addition, the next time this Kingdom turn that\_you roll a critical failure on an Army activity, the result is\_improved to a regular failure instead.</p>\n<p><strong>Success</strong> The exercises grant a +1 circumstance bonus\_to your first Army activity taken during the Kingdom\_turn’s Activity Phase. This bonus increases to +2 at\_Kingdom level 9 and +3 at Kingdom level 15.<br /><strong>Failure</strong> The warfare exercises provide no insight this\_turn.<br /><strong>Critical Failure</strong> You accidentally form incorrect\_assumptions about your military tactics. The\_next time you roll a failure on an Army activity\_this Kingdom turn, it becomes a critical failure\_instead.</p>"
