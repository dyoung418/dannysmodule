name: Inkshot
system:
  description:
    gm: ''
    value: >-
      <p>A spray of viscous, toxic ink jets from your fingertip to strike a
      target creature in the face. Make a spell attack roll against the target.
      On a hit, you deal 2d6 poison damage, plus you blast the target's eyes,
      making them
      @UUID[Compendium.pf2e.conditionitems.Item.TkIyaNPgTZFBCCuh]{Dazzled} for 1
      round as the stinging ink blurs and distorts the creature's vision. On a
      critical hit, double the poison damage, and the target becomes dazzled for
      1 minute by the foul ink.</p>

      <p>The ink stain remains for 1 hour before fading, although vigorous
      cleansing (or magic such as a prestidigitation cantrip) can remove the ink
      before then.</p>

      <hr>

      <p><strong>Heightened (+1)</strong> Increase the base poison damage by
      2d6.</p>
