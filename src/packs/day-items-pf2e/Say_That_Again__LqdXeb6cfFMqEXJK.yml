name: Say That Again!
system:
  description:
    gm: ''
    value: >-
      <p><strong>Trigger</strong> An opponent gets a critical failure when
      attempting to
      @UUID[Compendium.pf2e.actionspf2e.Item.2u915NdUyQan6uKF]{Demoralize} you
      or Lie to you.</p>

      <hr />

      <p>The world is full of obnoxious weasels who think they can pull one over
      on you-put them in their place! When an adjacent creature attempts to Lie
      to you or to Demoralize you and gets a critical failure on the roll, you
      can use your reaction to make a
      @UUID[Compendium.pf2e.actionspf2e.Item.7blmbDrQFNfdT731]{Shove} attempt
      against that opponent. If combat results, you can roll Intimidation for
      your initiative check.</p>
