  description:
    gm: ''
    value: "<p>Using Regongar’s advice, a public show of force is performed in an attempt to curtail criminal activity or subversive activity in the kingdom. Attempt a basic @Check[warfare|dc:resolve(@kingdom.control.dc)] check to determine how effective the Show of Force is.<br /><strong>Critical Success</strong> The kingdom’s criminals are cowed by the\_show of force. Reduce Crime by 2 and reduce one other\_Ruin of your choice by 1.<br /><strong>Success</strong> The kingdom’s criminals take note of the show of\_force. Reduce Crime by 1.<br /><strong>Failure</strong> The show of force fails to impress criminals but\_unsettles the rest of the citizens. Increase Unrest by 1.<br /><strong>Critical Failure</strong> The criminals are emboldened by the\_failed show of force. Increase Unrest by 1d4 and Crime\_by 1.</p>"
