name: Spread The Legend (Linzi)
type: campaignFeature
effects: []
system:
  description:
    gm: ''
    value: "<p><strong>Requires</strong>: Linzi in the Counselor role and at least Friendly to the PCs</p>\n<p>Linzi works to spread the word of the party’s heroics and achievements, both through word of mouth and by distributing chapbooks or one-sheets detailing their exploits. Attempt a basic @Check[arts|dc:resolve(@kingdom.control.dc)] check to determine the success of Linzi’s efforts. If she has secured a printing press for the kingdom, the Arts check gains a +2 item bonus.<br /><strong>Critical Success</strong> Not only do Linzi’s stories bring pride and\_patriotism to the nation, but they also help increase its\_glory. Reduce Unrest by 1d6, and at the start of the next\_Kingdom turn, gain one bonus Fame. In addition, if the\_kingdom experiences a dangerous random event during this turn’s Event Phase, reduce that event’s level modifier\_by 1.<br /><strong>Success</strong> The rousing and inspiring stories Linzi spreads\_about the PCs helps to bring the nation together. Reduce\_Unrest by 1d6.<br /><strong>Failure</strong> Linzi avoids spreading unfortunate news, but only\_just barely. The citizens are only slightly entertained by\_their leaders’ exploits. Reduce Unrest by 1.<br /><strong>Critical Failure</strong> Linzi accidentally spreads news of a\_humiliating or embarrassing nature, causing the people\_of the kingdom to lose respect for their leaders. Increase\_Unrest by 1d4.</p>"
