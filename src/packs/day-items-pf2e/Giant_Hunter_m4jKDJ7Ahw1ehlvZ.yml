name: Giant Hunter
system:
  description:
    gm: ''
    value: >-
      <p>You have studied giants and hunt them with efficiency. When you roll
      initiative and can see a giant, you can
      @UUID[Compendium.pf2e.actionspf2e.Item.JYi4MnsdFu618hPm]{Hunt Prey} as a
      free action, designating that enemy as your prey.</p>

      <p>You can use this free action even if you haven't identified the giant
      yet with Recall Knowledge. The benefit doesn't apply against giants
      disguised as other creatures, and the GM determines whether it applies
      against a creature disguised as a giant.</p>
