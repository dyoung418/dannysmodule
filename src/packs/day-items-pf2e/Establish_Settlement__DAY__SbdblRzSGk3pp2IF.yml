name: Establish Settlement (DAY)
system:
  description:
    gm: ''
    value: >-
      <p><strong>Requirements</strong> The hex in which you're establishing the
      settlement has been Cleared and doesn't currently have a settlement
      (including a Freehold) in it.</p><hr><p>You draw up plans, gather
      resources, entice citizens, and establish boundaries to found a brand new
      settlement in the hex. Attempt a basic
      @Check[engineering|dc:resolve(@kingdom.control.dc)],
      @Check[industry|dc:resolve(@kingdom.control.dc)],
      @Check[politics|dc:resolve(@kingdom.control.dc)], or
      @Check[scholarship|dc:resolve(@kingdom.control.dc)] check. If you cannot
      pay the RP required by the result of this check, treat your result as a
      critical failure. A settlement always starts as a village. See
      @UUID[JournalEntry.BIu4C1T1RR17QNwl.JournalEntryPage.YzEamDkFcnQo557d]{page
      540} for further details about building
      settlements.</p><hr><p><strong>Critical Success</strong> You establish the
      settlement largely with the aid of enthusiastic volunteers. Spend [[/r 1d6
      #RP]]{1d6 RP}.</p><p><strong>Success</strong> You establish the
      settlement. Spend [[/r 3d6 #RP]]{3d6 RP}.</p><p><strong>Failure</strong>
      You establish the settlement, but inefficiently and at great expense.
      Spend [[/r 6d6 #RP]]{6d6 RP}.</p><p><strong>Critical Failure</strong> You
      fail to establish the settlement</p>
