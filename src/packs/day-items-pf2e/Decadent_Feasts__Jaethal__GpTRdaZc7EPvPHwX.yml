name: Decadent Feasts (Jaethal)
type: campaignFeature
effects: []
system:
  description:
    gm: ''
    value: "<p>Requires: Jaethal serves as Emissary and is at least Friendly to the PCs</p>\n<p>Urgathoa is more than just the goddess of undeath—she’s also the goddess of gluttony. And Jaethal is no fool; she understands the fear her goddess inspires in the living and knows that focusing on other aspects of her worship are more likely to result in positive growth for the nation. In order to distract the populace, she arranges for decadent feasts for the people, simultaneously feeding the hungry while camouflaging some of her faith’s more sinister aspects. <strong>Spend</strong> 1d8 Food commodities and 1 Luxury commodity, then attempt a basic @Check[agriculture|dc:resolve(@kingdom.control.dc)] or @Check[trade|dc:resolve(@kingdom.control.dc)] check to determine how effective the feasts are.<br /><strong>Critical Success</strong> The people rejoice and glut themselves on\_the repast! Reduce Unrest by 1d6, and the next time this Kingdom turn you suffer an effect that increases Unrest,\_do not increase your Unrest.<br /><strong>Success</strong> The people enjoy the meal, but no longer than it\_takes to gulp it down. Reduce Unrest by 1d3.<br /><strong>Failure</strong> The meal is appreciated, but the people remain\_suspicious. Reduce Unrest by 1.<br /><strong>Critical Failure</strong> The people are too suspicious of the feast to\_enjoy it. Worse, rumors that Jaethal is trying to distract\_the citizens from an evil ritual spread. Increase Unrest by\_1d4 and increase Corruption by 1.</p>"
