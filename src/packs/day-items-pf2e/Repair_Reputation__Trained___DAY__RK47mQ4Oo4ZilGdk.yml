name: Repair Reputation (Trained) (DAY)
system:
  description:
    gm: ''
    value: >-
      <p>When things have gotten out of hand in the kingdom and the nation's
      reputation has become damaged, you can focus efforts on a campaign to
      reassure the citizens and bring them closer together, stamp down crime,
      organize repairs and maintenance of public structures, or strive to adjust
      poor public opinions. The skill used to Repair Reputation depends on which
      Ruin total you wish to reduce. If you wish to reduce your
      <strong>Corruption</strong>, you attempt an
      @Check[arts|dc:resolve(@kingdom.control.dc+2)] check. If you wish to
      reduce your <strong>Crime</strong>, you attempt a
      @Check[trade|dc:resolve(@kingdom.control.dc+2)] check. If you wish to
      reduce your <strong>Decay</strong>, you attempt an
      @Check[engineering|dc:resolve(@kingdom.control.dc+2)] check. If you wish
      to reduce your <strong>Strife</strong>, you attempt an
      @Check[intrigue|dc:resolve(@kingdom.control.dc+2)] check. In all cases,
      the DC is your Control DC + 2.</p><hr /><p><strong>Critical
      Success</strong> You reduce the targeted Ruin by 2 and reduce its current
      ruin penalty by 1 to a minimum of 0.</p><p><strong>Success</strong> You
      reduce the targeted Ruin by 1.</p><p><strong>Failure</strong> You fail to
      reduce the targeted Ruin. You cannot attempt to Repair Reputation on this
      Ruin for 1 Kingdom turn.</p><p><strong>Critical Failure</strong> You fail
      to reduce the targeted Ruin in a particularly public and embarrassing way.
      Increase Unrest by 1d4, and you cannot attempt to Repair Reputation for 3
      Kingdom turns.</p>
