    gm: ''
    value: "<p>A popular tavern is a respectable establishment for entertainment, eating, and drinking.</p><hr /><p><strong>Lots</strong>\_1;\_<strong>Cost</strong>\_24 RP, 6 Lumber, 2 Stone</p><p><strong>Construction</strong>\_Trade (expert) DC 18</p><p><strong>Upgrade From</strong>\_<a class=\"content-link\" draggable=\"true\" data-uuid=\"JournalEntry.BIu4C1T1RR17QNwl.JournalEntryPage.SwV5dzUCvzrLwd8f\" data-id=\"SwV5dzUCvzrLwd8f\" data-type=\"JournalEntryPage\" data-tooltip=\"Text Page\">tavern, dive</a></p><p><strong>Upgrade To</strong>\_<a class=\"content-link\" draggable=\"true\" data-uuid=\"JournalEntry.BIu4C1T1RR17QNwl.JournalEntryPage.iahk4kSrqXdJ5MJD\" data-id=\"iahk4kSrqXdJ5MJD\" data-type=\"JournalEntryPage\" data-tooltip=\"Text Page\">tavern, luxury</a></p><p><strong>Item Bonus</strong>\_+1 item bonus to\_<a class=\"content-link\" draggable=\"true\" data-uuid=\"Compendium.pf2e.kingmaker-features.Item.bBXJdNxd0Pa1qScw\" data-id=\"bBXJdNxd0Pa1qScw\" data-type=\"Item\" data-pack=\"pf2e.kingmaker-features\" data-tooltip=\"Campaign Feature Item\">Hire Adventurers</a>\_and Reconnoiter (V&amp;K) and to\_<a class=\"content-link\" draggable=\"true\" data-uuid=\"Compendium.pf2e.kingmaker-features.Item.G6UuSaPpXYa80qDw\" data-id=\"G6UuSaPpXYa80qDw\" data-type=\"Item\" data-pack=\"pf2e.kingmaker-features\" data-tooltip=\"Campaign Feature Item\">Rest and Relax</a>\_using Trade</p><p><strong>Effects</strong>\_The first time you build a popular tavern in a Kingdom turn, reduce Unrest by 2. If you attempt a Performance check to\_<a class=\"content-link\" draggable=\"true\" data-uuid=\"Compendium.pf2e.actionspf2e.Item.QyzlsLrqM0EEwd7j\" data-id=\"QyzlsLrqM0EEwd7j\" data-type=\"Item\" data-pack=\"pf2e.actionspf2e\" data-tooltip=\"Ability Item\">Earn Income</a>\_in a settlement with a popular tavern, you gain a +1 item bonus to the check. All checks made to\_<a class=\"content-link\" draggable=\"true\" data-uuid=\"Compendium.pf2e.actionspf2e.Item.plBGdZhqq5JBl1D8\" data-id=\"plBGdZhqq5JBl1D8\" data-type=\"Item\" data-pack=\"pf2e.actionspf2e\" data-tooltip=\"Ability Item\">Gather Information</a> in a settlement with at least one popular tavern gain a +1 item bonus.</p>"
