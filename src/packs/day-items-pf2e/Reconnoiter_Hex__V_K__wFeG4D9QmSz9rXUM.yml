system:
  description:
    gm: ''
    value: "<p>You send a team to spend time surveying and exploring a specific hex, getting the lay of the land and looking for unusual features and specific sites. <strong>Spend 1 RP</strong> and then attempt a @Check[wilderness|dc:resolve(@kingdom.control.dc)]  or @Check[exploration|dc:resolve(@kingdom.control.dc)] Basic check.\_</p><p><br /><strong>Critical Success</strong>: Your team successfully explores the hex and it is now Reconnoitered for the purpose of Claim Hex. Your team automatically finds one Special or Hidden feature if the hex contains one. If the hex contains multiple Special or Hidden Features the GM chooses one. If the hex contains an Encounter or Hazard, the team avoids it and reports back useful and detailed information on it. In addition, your team's reconnaissance of the hex goes so smoothly you may immediately attempt an additional Reconnoiter Hex activity on an adjacent hex. Treat a Critical Success on this additional check as a Success instead<br /><strong>Success</strong>: Your team successfully explores the hex and it is now Reconnoitered for the purpose of Claim Hex. If the hex contains a Special feature your team may find it if your GM wishes. If the hex contains an Encounter or Hazard, the team avoids it and reports basic information on it.<br /><strong>Failure</strong>: Your team fails to explore the hex sufficiently. If the hex contains an Encounter or Hazard, the team escapes it and reports basic information on it.\_<br /><strong>Critical Failure</strong>: Your team fails to explore the hex sufficiently and a number of the team are lost, causing you to take a -1 circumstance penalty to Loyalty-based checks until the end of your next Kingdom turn. If the hex contains an Encounter or Hazard, the team members were lost to it and the survivors can report back basic information on it.</p>"
