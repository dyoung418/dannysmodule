    value: "<p>A cemetery sets aside a plot of land to bury the dead and can also include above-ground vaults or underground catacombs.</p>\n<hr />\n<p><strong>Lots</strong>\_1;\_<strong>Cost</strong>\_4 RP, 1 Stone</p>\n<p><strong>Construction</strong>\_Folklore DC 15</p>\n<p><strong>Effects</strong> Giving the citizens a place to bury and remember their departed loved ones helps to temper Unrest gained from dangerous events. If you have at least one cemetery in a settlement, reduce Unrest gained from any dangerous settlement events in that particular settlement by 1 (to a maximum of 4 for four cemeteries). The presence of a cemetery provides additional effects during certain kingdom events.</p>"
