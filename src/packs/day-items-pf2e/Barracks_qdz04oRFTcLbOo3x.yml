    value: "<p>Barracks are focused on housing and training guards, militia, soldiers, and military forces</p>\n<hr />\n<p><strong>Lots</strong>\_1;\_<strong>Cost</strong>\_6 RP, 2 Lumber, 1 Stone</p>\n<p><strong>Construction</strong>\_Defense DC 16</p>\n<p><strong>Upgrade To</strong>\_<a class=\"content-link\" draggable=\"true\" data-uuid=\"JournalEntry.BIu4C1T1RR17QNwl.JournalEntryPage.KyMscpPDWlGzLSDa\" data-id=\"KyMscpPDWlGzLSDa\" data-type=\"JournalEntryPage\" data-tooltip=\"Text Page\">garrison</a></p>\n<p><strong>Item Bonus</strong>\_+1 item bonus to\_<a class=\"content-link\" draggable=\"true\" data-uuid=\"Compendium.pf2e.kingmaker-features.Item.iYLFBep0kddHQkW9\" data-id=\"iYLFBep0kddHQkW9\" data-type=\"Item\" data-pack=\"pf2e.kingmaker-features\" data-tooltip=\"Campaign Feature Item\">Garrison Army</a>,\_<a class=\"content-link\" draggable=\"true\" data-uuid=\"Compendium.pf2e.kingmaker-features.Item.1wzNJEvPCuMwJdHe\" data-id=\"1wzNJEvPCuMwJdHe\" data-type=\"Item\" data-pack=\"pf2e.kingmaker-features\" data-tooltip=\"Campaign Feature Item\">Recover Army</a>, or\_<a class=\"content-link\" draggable=\"true\" data-uuid=\"Compendium.pf2e.kingmaker-features.Item.Fko5kdpi9Oxas6Ty\" data-id=\"Fko5kdpi9Oxas6Ty\" data-type=\"Item\" data-pack=\"pf2e.kingmaker-features\" data-tooltip=\"Campaign Feature Item\">Recruit Army</a>.</p>\n<p><strong>Effects</strong> Barracks aid in the recruitment of armies and in helping soldiers recover from battle. The first time you build a barracks in any settlement, reduce Unrest by 1.</p>"
