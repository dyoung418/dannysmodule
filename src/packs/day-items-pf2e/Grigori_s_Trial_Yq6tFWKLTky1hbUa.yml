name: Grigori's Trial
type: campaignFeature
effects: []
system:
  description:
    gm: ''
    value: "<p>If you choose to run Grigori’s trial as a downtime activity, it takes one week to resolve. This special kingdom event should take place during the next kingdom turn.</p>\n<p>Once Grigori has been arrested, the PCs have the option of putting him on trial during a following Kingdom turn’s Activities phase. As this is a leadership activity, it must be one of the three activities performed during Step 3 of the Activities phase. Each Kingdom turn that passes with Grigori imprisoned without a trial, increase the Kingdom’s Unrest by\_<a class=\"inline-roll gmroll\" data-mode=\"gmroll\" data-flavor data-formula=\"1d4\" data-tooltip=\"1d4\" data-damage-roll>1d4</a>\_and Corruption by 1. If a\_<a class=\"content-link\" draggable=\"true\" data-uuid=\"JournalEntry.dAtoyQhSfSBvjr2W.JournalEntryPage.OURUA8YrKosurVYG\" data-id=\"OURUA8YrKosurVYG\" data-type=\"JournalEntryPage\" data-tooltip=\"Text Page\">Public Scandal</a>\_random event ever occurs while Grigori is imprisoned, he is released from prison on a technicality and all previous Support Points are zeroed out as he begins to spread propaganda again, starting the whole process over from the start. If a Justice Prevails random event occurs while he’s imprisoned, Grigori is either executed, exiled, or rehabilitated (players’ choice) as part of that event, with the corresponding repercussions as detailed below for a successful trial.</p>\n<p>\_</p>\n<p>During Grigori’s trial (which lasts for several days over the month), attempt a @Check[intrigue|dc:27] , @Check[politics|dc:27] , @Check[statecraft|dc:27] Intrigue, Politics, or Statecraft Kingdom skill check. This DC is equal to Grigori’s Deception DC. Each PC can attempt to lower this DC with a successful\_</p>\n<p data-pm-slice=\"1 1 [&quot;section&quot;,{&quot;_preserve&quot;:{&quot;class&quot;:&quot;event&quot;}}]\">@Check[type:deception|dc:26], @Check[type:diplomacy|dc:26] or @Check[type:intimidation|dc:26] check, or with a @Check[type:legal-lore|dc:19] check; each success reduces the Kingdom skill check DC by 1 to a maximum reduction of 5.</p>\n<header class=\"split\">\n<p><strong>Kingdom Skill:</strong>\_Intrigue, Politics, or Statecraft;</p>\n<p><strong>Leader:</strong>\_Emissary</p>\n</header>\n<ul>\n<li>\n<p><strong>Critical Success:</strong> The trial concludes and finds Grigori to be guilty. Reduce Unrest by <span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">[[/gmroll 1d6]], </span>\_and the party must choose between the following options on how to sentence Grigori, with each option granting a different reward to the kingdom.</p>\n<ul>\n<li>\n<p><strong>Execution:</strong>\_Grigori is executed publicly.\_</p>\n</li>\n<li>\n<p><strong>Exile:</strong>\_Grigori is released and escorted out of the kingdom.\_</p>\n</li>\n<li>\n<p><strong>Imprisonment:</strong>\_Grigori is sentenced to a longer prison term. At the start of every Kingdom turn that follows, the PCs can choose one of the other three sentences (Execution, Exile, or Pardon) to end his imprisonment, or instead to keep him imprisoned.\_</p>\n</li>\n<li>\n<p><strong>Pardon:</strong>\_Grigori is pardoned for his crimes and allowed to go free.\_</p>\n</li>\n</ul>\n</li>\n<li>\n<p><strong>Success:</strong>\_As critical success, but do not reduce Unrest. Pardon cannot be chosen at this time (but can be later if the PCs imprison Grigori).</p>\n</li>\n<li>\n<p><strong>Failure:</strong>\_The trial fails to reach a resolution. The PCs can attempt this leadership activity again if they have any more leadership activities available on this Kingdom turn, otherwise Grigori remains imprisoned for another month and the trial can be continued during the next Kingdom turn.</p>\n</li>\n<li>\n<p><strong>Critical Failure:</strong> The trial ends with Grigori being found not guilty. He is released from imprisonment but knows better than to stay where he’s not welcome. He flees the kingdom and may become a recurring foil. Increase Unrest by <span style=\"font-family:var(--font-primary);font-size:var(--font-size-14)\">[[/gmroll 1d4]]</span>\_and two Ruins of the party’s choice by 2.</p>\n</li>\n</ul>"
