name: That's Not Natural!
system:
  description:
    gm: ''
    value: >-
      <p>Your mastery at surviving in the wild has given you a sort of
      sixth-sense when it comes to noticing creatures that aren't part of the
      natural order. You gain a +1 circumstance bonus to all initiative checks
      made at the start of a battle in which at least one of your enemies is an
      aberration, fey, mutant, or undead, or if one of your enemies is from a
      plane other than the Material Plane, as long as the battle takes place in
      a wilderness region. In wilderness regions, you also increase your
      Perception DC by 1 against these types of creatures for the purposes of
      resolving their Stealth checks. If you're master in Survival, this
      circumstance bonus increases to +2.</p>

      <p>If you know the
      <em>@UUID[Compendium.pf2e.spells-srd.Item.7DN13ILADW2N9Z1t]{Commune}</em>
      ritual, you can use Survival as a primary or secondary check to resolve
      that ritual-if you do so, you gain a +2 circumstance bonus.</p>
