name: Kingdom Untrained Improvisation
type: campaignFeature
effects: []
system:
  description:
    gm: ''
    value: >-
      <p>Your kingdom has learned how to handle situations when it’s out of its
      depth. Your proficiency bonus to untrained skill checks is equal to half
      your level instead of +0. If you’re 7th level or higher, the bonus
      increases to your full level instead. This doesn’t allow you to use the
      skill’s trained actions.</p>
  rules:
    - hideIfDisabled: true
      key: FlatModifier
      selector: kingdom-check
      value: >-
        match(when(lte(@actor.campaign.level, 6), max(1,
        floor(@kingdom.level/2))), when(gte(@actor.campaign.level, 7),
        @kingdom.level))
      type: proficiency
      predicate:
        - proficiency:untrained
