name: Establish Work Site (DAY)
system:
  description:
    gm: ''
    value: >-
      <p>Your hire a crew of workers to travel to a hex that contains Lumber,
      Ore, or Stone to be harvested. Spend RP as determined by the hex's most
      inhospitable terrain (see the
      @UUID[JournalEntry.ufhwExwde2g3iEa7.JournalEntryPage.BcxGDLM1uo4TqMZY]{Building
      on Rough Terrain} sidebar on page 519). Then attempt a basic
      @Check[engineering|dc:resolve(@kingdom.control.dc)] check. Lumber camps
      can be established in any hex that contains a significant amount of forest
      terrain. Mines and quarries can be established in any hex that contains a
      significant amount of hill or mountain terrain.</p><hr
      /><p><strong>Critical Success</strong> You establish a Work Site in the
      hex and proceed to discover an unexpectedly rich supply of high quality
      Commodities. All Commodity yields granted by this site are doubled until
      the end of the next Kingdom turn.</p><p><strong>Success</strong> You
      establish a Work Site in the hex.</p><p><strong>Failure</strong> You fail
      to establish a Work Site in the hex.</p><p><strong>Critical
      Failure</strong> Not only do you fail to establish a Work Site, but you
      lose several workers to an accident, banditry, a vicious monster, or some
      other unforeseen occurrence. Gain 1 Unrest.</p>
