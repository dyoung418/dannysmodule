system:
  description:
    gm: ''
    value: "<p>Following Ekundayo’s advice, rural-dwelling citizens work\_to supplement stores of food and resources through hunting\_and trapping. Attempt a basic @Check[wilderness|dc:resolve(@kingdom.control.dc)] check to gather\_excess livestock from the local wildlife, ranches, and farms\_to generate food commodities.<br /><strong>Critical Success</strong> Gain 1d4 Food commodities, 1 Luxury\_commodity, and 1 bonus Resource Die at the start of your\_next Kingdom turn.<br /><strong>Success</strong> Choose only one of the three options from the\_above result.<br /><strong>Failure</strong> Your hunters and trappers fail to supplement your\_stores and must spend time resupplying and setting new\_traps; you cannot attempt Supplementary Hunting on the\_next Kingdom turn.<br /><strong>Critical Failure</strong> As failure, but your hunters and trappers have accidentally attracted the attention of dangerous\_wildlife. Either gain 1d4 Unrest or increase a Ruin of your\_choice by 1.</p>"
