  - name: Celestial Revelation
    system:
      description:
        value: >-
          <p>When you reach character level 3, you can transform as a Bonus
          Action using one of the options below (choose the option each time you
          transform). The transformation lasts for 1 minute or until you end it
          (no action required). Once you transform, you can’t do so again until
          you finish a Long Rest.</p><p>Once on each of your turns before the
          transformation ends, you can deal extra damage to one target when you
          deal damage to it with an attack or a spell. The extra damage equals
          your Proficiency Bonus, and the extra damage’s type is either Necrotic
          for Necrotic Shroud or Radiant for Heavenly Wings and Inner
          Radiance.</p><p>Here are the transformation
          options:</p><p><strong>Heavenly Wings. </strong>Two spectral wings
          sprout from your back temporarily. Until the transformation ends, you
          have a Fly Speed equal to your Speed.</p><p><strong>Inner Radiance.
          </strong>Searing light temporarily radiates from your eyes and mouth.
          For the duration, you shed Bright Light in a 10-foot radius and Dim
          Light for an additional 10 feet, and at the end of each of your turns,
          each creature within 10 feet of you takes Radiant damage equal to your
          Proficiency Bonus.</p><p><strong>Necrotic Shroud.</strong> Your eyes
          briefly become pools of darkness, and flightless wings sprout from
          your back temporarily. Creatures other than your allies within 10 feet
          of you must succeed on a Charisma saving throw (DC 8 plus your
          Charisma modifier and Proficiency Bonus) or have the
          &amp;Reference[Frightened] condition until the end of your next
          turn.</p><section class="secret"
          id="secret-xYg9zvtrUSXdd7vM"><p><strong>Foundry
          Note</strong></p><p>Each activity expends your use of this
          feature.</p><p>The <strong>Heavenly Wings</strong> activity includes
          an Active Effect which upgrades your Fly Speed to "1" to indicate
          equivalence to (walk) Speed.</p><p>The <strong>Inner Radiance</strong>
          activity includes an Active Effect for tracking and a damage roll that
          scales as you level up.</p><p>The <strong>Necrotic Shroud</strong>
          activity includes the saving throw and an Active Effect for tracking
          impacted creatures and applies the Frightened condition.</p></section>
        chat: ''
      source:
        custom: ''
        rules: '2024'
        revision: 1
