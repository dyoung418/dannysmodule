items:
  - name: Aasimar
    system:
      description:
        value: >-
          <p>Aasimar (pronounced AH-sih-mar) are mortals who carry a spark of
          the Upper Planes within their souls. Whether descended from an angelic
          being or infused with celestial power, they can fan that spark to
          bring light, healing, and heavenly fury.</p><p>Aasimar can arise among
          any population of mortals. They resemble their parents, but they live
          for up to 160 years and have features that hint at their celestial
          heritage, such as metallic freckles, luminous eyes, a halo, or the
          skin color of an angel (silver, opalescent green, or coppery red).
          These features start subtle and become obvious when the aasimar learns
          to reveal their full celestial nature.</p><h3
          data-anchor="aasimar-traits">Aasimar Traits</h3><p
          class="phb-meta"><strong>Creature Type: </strong>Humanoid</p><p
          class="phb-meta"><strong>Size: </strong>Medium (about 4–7 feet tall)
          or Small (about 2–4 feet tall), chosen when you select this
          species</p><p class="phb-meta"><strong>Speed:</strong> 30
          feet</p><p>As an Aasimar, you have these special
          traits.</p><p><strong>Celestial Resistance.</strong> You have
          Resistance to Necrotic damage and Radiant
          damage.</p><p><strong>Darkvision.</strong> You have Darkvision with a
          range of 60 feet.</p><p><strong>Healing Hands.</strong> As a Magic
          action, you touch a creature and roll a number of d4s equal to your
          Proficiency Bonus. The creature regains a number of Hit Points equal
          to the total rolled. Once you use this trait, you can’t use it again
          until you finish a Long Rest.</p><p><strong>Light Bearer.</strong> You
          know the <em>Light</em> cantrip. Charisma is your spellcasting ability
          for it.</p><p><strong>Celestial Revelation.</strong> When you reach
          character level 3, you can transform as a Bonus Action using one of
          the options below (choose the option each time you transform). The
          transformation lasts for 1 minute or until you end it (no action
          required). Once you transform, you can’t do so again until you finish
          a Long Rest.</p><p>Once on each of your turns before the
          transformation ends, you can deal extra damage to one target when you
          deal damage to it with an attack or a spell. The extra damage equals
          your Proficiency Bonus, and the extra damage’s type is either Necrotic
          for Necrotic Shroud or Radiant for Heavenly Wings and Inner
          Radiance.</p><p>Here are the transformation
          options:</p><p><strong>Heavenly Wings. </strong>Two spectral wings
          sprout from your back temporarily. Until the transformation ends, you
          have a Fly Speed equal to your Speed.</p><p><strong>Inner Radiance.
          </strong>Searing light temporarily radiates from your eyes and mouth.
          For the duration, you shed Bright Light in a 10-foot radius and Dim
          Light for an additional 10 feet, and at the end of each of your turns,
          each creature within 10 feet of you takes Radiant damage equal to your
          Proficiency Bonus.</p><p><strong>Necrotic Shroud.</strong> Your eyes
          briefly become pools of darkness, and flightless wings sprout from
          your back temporarily. Creatures other than your allies within 10 feet
          of you must succeed on a Charisma saving throw (DC 8 plus your
          Charisma modifier and Proficiency Bonus) or have the Frightened
          condition until the end of your next turn.</p>
        chat: ''
      source:
        custom: ''
        rules: '2024'
        revision: 1
