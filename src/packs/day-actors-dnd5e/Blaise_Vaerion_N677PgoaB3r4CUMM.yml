  - _id: wipb68Ashv4kiEak
    name: Sorcerer
    type: class
    folder: 45fGQlR9VJAIreZA
    img: modules/dnd-players-handbook/assets/icons/classes/sorcerer.webp
    system:
      description:
        value: >-
          <blockquote><p>A Dazzling Mage Filled with Innate
          Magic</p></blockquote><h3>Core Sorcerer Traits</h3><table
          class="core-class-traits"><tbody><tr><th
          scope="row"><p><strong>Primary
          Ability</strong></p></th><td><p>Charisma</p></td></tr><tr><th
          scope="row"><p><strong>Hit Point Die</strong></p></th><td><p>D6 per
          Sorcerer level</p></td></tr><tr><th scope="row"><p><strong>Saving
          Throw Proficiencies</strong></p></th><td><p>Constitution and
          Charisma</p></td></tr><tr><th scope="row"><p><strong>Skill
          Proficiencies</strong></p></th><td><p><em>Choose 2:</em> Arcana,
          Deception, Insight, Intimidation, Persuasion, or
          Religion</p></td></tr><tr><th scope="row"><p><strong>Weapon
          Proficiencies</strong></p></th><td><p>Simple
          weapons</p></td></tr><tr><th scope="row"><p><strong>Armor
          Training</strong></p></th><td><p>None</p></td></tr><tr><th
          scope="row"><p><strong>Starting
          Equipment</strong></p></th><td><p><em>Choose A or B: </em>(A)
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbwepSpear00000]{Spear},
          2
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbwepDagger0000]{Daggers},
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbagArcaneFocus]{Arcane
          Focus}
          (@UUID[Compendium.dnd-players-handbook.equipment.Item.phbafcCrystal000]{crystal}),
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbagDungeoneers]{Dungeoneer’s
          Pack}, and [[/award 28GP]]; or (B) [[/award
          50GP]]</p></td></tr></tbody></table><p>Sorcerers wield innate magic
          that is stamped into their being. Some Sorcerers can’t name the origin
          of their power, while others trace it to strange events in their
          personal or family history. The blessing of a dragon or a dryad at a
          baby’s birth or the strike of lightning from a clear sky might spark a
          Sorcerer’s gift. So too might the gift of a deity, exposure to the
          strange magic of another plane of existence, or a glimpse into the
          inner workings of reality. Whatever the origin, the result is an
          indelible mark on the Sorcerer, a churning magic that can be passed
          down through generations.</p><p>Sorcerers don’t learn magic; the raw,
          roiling power of magic is part of them. The essential art of a
          Sorcerer is learning to harness and channel that innate magic,
          allowing the Sorcerer to discover new and staggering ways to unleash
          their power. As Sorcerers master their innate magic, they grow more
          attuned to its origin, developing distinct powers that reflect its
          source.</p><p>Sorcerers are rare. Some family lines produce exactly
          one Sorcerer in every generation, but most of the time, the talents of
          sorcery appear as a fluke. People who have this magical power soon
          discover that it doesn’t like to stay quiet. A Sorcerer’s magic wants
          to be wielded.</p><h2>Becoming a Sorcerer …</h2><h3>As a Level 1
          Character</h3><ul><li>Gain all the traits in the Core Sorcerer Traits
          table.</li><li>Gain the Sorcerer’s level 1 features, which are listed
          in the
          @UUID[Compendium.dnd-players-handbook.content.JournalEntry.phbSorcerer00000.JournalEntryPage.fsqRUA4acVXH4I3O#class-features]{Sorcerer
          Features table}.</li></ul><h3>As a Multiclass
          Character</h3><ul><li>Gain the Hit Point Die from the Core Sorcerer
          Traits table.</li><li>Gain the Sorcerer’s level 1 features, which are
          listed in the Sorcerer Features table. See the
          @UUID[Compendium.dnd-players-handbook.content.JournalEntry.phbCreatingAChar.JournalEntryPage.vcs4jfEKRxPCsgXm]{multiclassing
          rules} to determine your available spell slots.</li></ul>
        chat: ''
