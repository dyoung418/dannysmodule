  - name: Guide - Magical
    system:
      description:
        value: >-
          <p><strong>Ability Scores:</strong> Dexterity, Constitution,
          Intelligence</p><p><strong>Feat:</strong>
          @UUID[Compendium.dnd-players-handbook.feats.Item.phbftMagicInitia]{Magic
          Initiate} (Druid)</p><p><strong>Skill Proficiencies:</strong> Stealth
          and Arcana</p><p><strong>Tool Proficiency:</strong> Cartographer’s
          Tools</p><p><strong>Equipment:</strong> <em>Choose A or B:</em> (A)
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbwepShortbow00]{Shortbow},
          20
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbamoArrows0000]{Arrows},
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbtulCartograph]{Cartographer’s
          Tools},
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbagBedroll0000]{Bedroll},
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbagQuiver00000]{Quiver},
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbagTent0000000]{Tent},
          @UUID[Compendium.dnd5e.items.Item.SsAmWV6YBqeOFihT]{Traveler’s
          Clothes}, 3 GP; or (B) 50 GP</p><p>You came of age outdoors, far from
          settled lands. Your home was anywhere you chose to spread your
          bedroll. There are wonders in the wilderness—strange monsters,
          pristine forests and streams, overgrown ruins of great halls once trod
          by giants—and you learned to fend for yourself as you explored them.
          From time to time, you guided friendly nature priests who instructed
          you in the fundamentals of channeling the magic of the wild.</p>
