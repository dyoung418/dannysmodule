  - _id: 4W0dQ869gmMEMgJJ
    name: Wizard
    type: class
    folder: 5UciSMNOwLY83syr
    img: modules/dnd-players-handbook/assets/icons/classes/wizard.webp
    system:
      description:
        value: >-
          <blockquote><p>A Scholarly Magic-User of Arcane
          Power</p></blockquote><h3>Core Wizard Traits</h3><table
          class="core-class-traits"><tbody><tr><th
          scope="row"><p><strong>Primary
          Ability</strong></p></th><td><p>Intelligence</p></td></tr><tr><th
          scope="row"><p><strong>Hit Point Die</strong></p></th><td><p>D6 per
          Wizard level</p></td></tr><tr><th scope="row"><p><strong>Saving Throw
          Proficiencies</strong></p></th><td><p>Intelligence and
          Wisdom</p></td></tr><tr><th scope="row"><p><strong>Skill
          Proficiencies</strong></p></th><td><p><em>Choose 2:</em>Arcana,
          History, Insight, Investigation, Medicine, Nature, or
          Religion</p></td></tr><tr><th scope="row"><p><strong>Weapon
          Proficiencies</strong></p></th><td><p>Simple
          weapons</p></td></tr><tr><th scope="row"><p><strong>Armor
          Training</strong></p></th><td><p>None</p></td></tr><tr><th
          scope="row"><p><strong>Starting
          Equipment</strong></p></th><td><p><em>Choose A or B:</em> (A) 2
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbwepDagger0000]{Daggers},
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbagArcaneFocus]{Arcane
          Focus}
          (@UUID[Compendium.dnd-players-handbook.equipment.Item.phbwepQuartersta]{Quarterstaff}),
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbagRobe0000000]{Robe},
          @UUID[Compendium.dnd5e.items.Item.LBajgahniRJbAgDr]{Spellbook},
          @UUID[Compendium.dnd-players-handbook.equipment.Item.phbagScholarsPac]{Scholar’s
          Pack}, and [[/award 5GP]]; or (B) [[/award
          55GP]]</p></td></tr></tbody></table><p>Wizards are defined by their
          exhaustive study of magic’s inner workings. They cast spells of
          explosive fire, arcing lightning, subtle deception, and spectacular
          transformations. Their magic conjures monsters from other planes of
          existence, glimpses the future, or forms protective barriers. Their
          mightiest spells change one substance into another, call meteors from
          the sky, or open portals to other worlds.</p><p>Most Wizards share a
          scholarly approach to magic. They examine the theoretical
          underpinnings of magic, particularly the categorization of spells into
          schools of magic. Renowned Wizards such as Bigby, Tasha, Mordenkainen,
          and Yolande have built on their studies to invent iconic spells now
          used across the multiverse.</p><p>The closest a Wizard is likely to
          come to an ordinary life is working as a sage or lecturer. Other
          Wizards sell their services as advisers, serve in military forces, or
          pursue lives of crime or domination.</p><p>But the lure of knowledge
          calls even the most unadventurous Wizards from the safety of their
          libraries and laboratories and into crumbling ruins and lost cities.
          Most Wizards believe that their counterparts in ancient civilizations
          knew secrets of magic that have been lost to the ages, and discovering
          those secrets could unlock the path to a power greater than any magic
          available in the present age.</p><h2>Becoming a Wizard …</h2><h3>As a
          Level 1 Character</h3><ul><li>Gain all the traits in the Core Wizard
          Traits table.</li><li>Gain the Wizard’s level 1 features, which are
          listed in the Wizard Features table.</li></ul><h3>As a Multiclass
          Character</h3><ul><li>Gain the Hit Point Die from the Core Wizard
          Traits table.</li><li>Gain the Wizard’s level 1 features, which are
          listed in the
          @UUID[Compendium.dnd-players-handbook.content.JournalEntry.phbWizard0000000.JournalEntryPage.g7cMRWzsgAsEF7zC#class-features]{Wizard
          Features table}. See the
          @UUID[Compendium.dnd-players-handbook.content.JournalEntry.phbCreatingAChar.JournalEntryPage.vcs4jfEKRxPCsgXm]{multiclassing
          rules} to determine your available spell slots.</li></ul><aside
          class="notable"><p><strong>Expanding and Replacing a
          Spellbook</strong></p><p>Spell Scroll, for example, and then copy it
          into your spellbook.</p><p><strong>Copying a Spell into the
          Book.</strong> When you find a level 1+ Wizard spell, you can copy it
          into your spellbook if it’s of a level you can prepare and if you have
          time to copy it. For each level of the spell, the transcription takes
          2 hours and costs 50 GP. Afterward you can prepare the spell like the
          other spells in your spellbook.</p><p><strong>Copying the
          Book.</strong> You can copy a spell from your spellbook into another
          book. This is like copying a new spell into your spellbook but faster,
          since you already know how to cast the spell. You need spend only 1
          hour and 10 GP for each level of the copied spell.</p><p>If you lose
          your spellbook, you can use the same procedure to transcribe the
          Wizard spells that you have prepared into a new spellbook. Filling out
          the remainder of the new book requires you to find new spells to do
          so. For this reason, many wizards keep a backup spellbook.</p></aside>
        chat: ''
