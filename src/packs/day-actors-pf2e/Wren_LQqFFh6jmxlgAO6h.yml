  - _id: aQoBjB9FnSILH8qv
    img: icons/sundries/books/book-red-exclamation.webp
    name: Quickened Casting
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Frequency</strong> once per day</p>

          <hr />

          <p><strong>Bard</strong> If your next action is to cast a bard cantrip
          or a bard spell that is at least 2 ranks lower than the highest-rank
          bard spell slot you have, reduce the number of actions to cast it by 1
          (minimum 1 action).</p>

          <p><strong>Witch</strong> You accelerate your spellcasting. If your
          next action is to cast a witch cantrip or a witch spell that is at
          least 2 ranks lower than the highest-rank witch spell slot you have,
          reduce the number of actions to cast it by 1 (minimum 1 action).</p>

          <p><strong>Wizard</strong> Straining your mind, you collapse as much
          of your spell's formulas as you can, resulting in a shorter but much
          more complex incantation. If your next action is to cast a wizard
          cantrip or a wizard spell that is at least 2 ranks lower than the
          highest-rank wizard spell slot you have, reduce the number of actions
          to cast it by 1 (minimum 1 action).</p>

          <p><strong>Others</strong> If your next action is to cast a class
          cantrip or a class spell that is at least 2 levels lower than the
          highest-level class spell slot you have, reduce the number of actions
          to cast it by 1 (minimum 1 action).</p>
      rules:
        - itemType: spell
          key: ItemAlteration
          mode: add
          predicate:
            - spellshape:quickened-casting
            - or:
                - item:cast:actions:1
                - item:cast:actions:2
                - item:cast:actions:3
          property: description
          value:
