  - img: systems/pf2e/icons/default-icons/background.svg
    name: Cursed
    system:
      description:
        gm: ''
        value: >-
          <p>You are the victim of a personal or hereditary curse. Through great
          effort and occult study, you have learned to fend off the curse's
          worst effects and, by extension, you can protect yourself against
          other harmful magic. However, the curse still hangs over you and
          sometimes manifests in dangerous ways.</p>

          <p>Choose two attribute boosts. One must be to
          <strong>Intelligence</strong> or <strong>Charisma</strong>, and one is
          a free attribute boost.</p>

          <p>You are trained in Occultism and Curse Lore. You gain the
          @UUID[Compendium.pf2e.actionspf2e.Item.7pdG8l9POMK76Lf2]{Warding Sign}
          reaction. You and the GM should determine the full effects of the
          curse, though you've staved most of them off for now. The GM
          determines the curse's lingering manifestations on you, which usually
          include at least a constant or very frequent thematic effect and
          occasional more dangerous effects.</p>
      rules:
        - key: GrantItem
          uuid: Compendium.pf2e.actionspf2e.Item.7pdG8l9POMK76Lf2
          flag: wardingSign
