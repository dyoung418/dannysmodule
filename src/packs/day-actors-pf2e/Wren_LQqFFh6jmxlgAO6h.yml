  - img: icons/magic/light/projectile-smoke-pink.webp
    name: Sorcerous Potency
    system:
      description:
        gm: ''
        value: >-
          <p>Because of the magical power inherent in your blood, your spells
          that hurt or cure are stronger than those of other spellcasters. When
          you Cast a Spell from your spell slots that either deals damage or
          restores Hit Points, you gain a status bonus to that spell's damage or
          healing equal to the spell's rank. This applies only to the initial
          damage or healing the spell deals when cast. An individual creature
          takes this damage or benefits from this healing only once per spell,
          even if the spell would damage or heal that creature multiple
          times.</p>
