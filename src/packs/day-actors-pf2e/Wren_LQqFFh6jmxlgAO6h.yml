  - img: systems/pf2e/icons/spells/detect-magic.webp
    name: Detect Magic
    system:
      description:
        gm: ''
        value: >-
          <p>You send out a pulse that registers the presence of magic. You
          receive no information beyond the presence or absence of magic. You
          can choose to ignore magic you're fully aware of, such as the magic
          items and ongoing spells of you and your allies. You detect illusion
          magic only if that magic's effect has a lower rank than the rank of
          your <em>detect magic</em> spell. However, items that have an illusion
          aura but aren't deceptive in appearance (such as an
          @UUID[Compendium.pf2e.equipment-srd.Item.bikFUFRLwfdvX2x2]{Invisibility
          Potion}) typically are detected normally.</p>

          <hr />

          <p><strong>Heightened (3rd)</strong> You learn the rank or level of
          the most powerful magical effect the spell detects, as determined by
          the GM.</p>

          <p><strong>Heightened (4th)</strong> As 3rd rank, but you also
          pinpoint the source of the highest-rank magic. Like for an imprecise
          sense, you don't learn the exact location, but can narrow down the
          source to within a 5-foot cube (or the nearest if larger than
          that).</p>
