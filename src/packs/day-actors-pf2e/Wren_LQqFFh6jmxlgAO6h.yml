          9th:
          @UUID[Compendium.pf2e.spells-srd.Item.4WS7HrFjwNvTn8T2]{Implosion}</p>

          <p><strong>Bloodline Spells</strong> initial:
          @UUID[Compendium.pf2e.spells-srd.Item.dtOUkMC57izf93z5]{Ancestral
          Memories}, advanced:
          @UUID[Compendium.pf2e.spells-srd.Item.LyqqvufOUIh8U25d]{Extend Blood
