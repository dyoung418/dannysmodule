  - img: icons/skills/melee/hand-grip-sword-red.webp
    name: Weapon Expertise
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Champion, Investigator, Oracle, Magus</strong> You've
          dedicated yourself to learning the intricacies of your weapons. Your
          proficiency ranks for simple weapons, martial weapons, and unarmed
          attacks increase to expert.</p>

          <p><strong>Druid</strong> You've improved your combat skill. Your
          proficiency rank for simple weapons and unarmed attacks increases to
          expert.</p>

          <p><strong>Sorcerer</strong> Training and magic improved your weapon
          technique. Your proficiency rank for simple weapons and unarmed
          attacks increases to expert.</p>

          <p><strong>Summoner</strong> Training and magic improved your weapon
          technique. Your proficiency rank for simple weapons and unarmed
          attacks increases to expert. (<em>Note: this is called Simple Weapon
          Expertise in Secrets of Magic</em>)</p>

