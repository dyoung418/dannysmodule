    name: Light
    system:
      description:
        gm: ''
        value: >-
          <p>You create an orb of light that sheds bright light in a 20-foot
          radius (and dim light for the next 20 feet) in a color you choose. If
          you create the light in the same space as a willing creature, you can
          attach the light to the creature, causing it to float near that
