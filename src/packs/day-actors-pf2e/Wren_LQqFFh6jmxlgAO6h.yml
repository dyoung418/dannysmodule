          <p>One of your ancestors was a mortal who mastered magic.</p>

          <p><strong>Tradition</strong> arcane</p>

          <p><strong>Bloodline Skills</strong> Arcana, Society</p>

          <p><strong>Sorcerous Gifts</strong> cantrip
