  - img: systems/pf2e/icons/spells/prying-eye.webp
    name: Scouting Eye
    system:
      description:
        gm: ''
        value: >-
          <p>You create an
          @UUID[Compendium.pf2e.conditionitems.Item.zJxUflt9np0q4yML]{Invisible},
          floating eye, 1 inch in diameter, at a location you can see within 500
          feet. It sees in all directions with your normal visual senses and
          continuously transmits what it sees to you.</p>

          <p>The first time you Sustain the spell each round, you can either
          move the eye up to 30 feet, seeing only things in front of the eye, or
          move it up to 10 feet, seeing everything in all directions around it.
