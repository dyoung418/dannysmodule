  - img: icons/sundries/books/book-symbol-spiral-silver-blue.webp
    name: Spell Repertoire (Sorcerer)
    system:
      description:
        gm: ''
        value: >-
          <p>The collection of spells you can cast is called your spell
          repertoire. At 1st level, you learn two 1st-rank spells of your choice
          and four cantrips of your choice, as well as an additional spell and
          cantrip from your bloodline. You choose these from the common spells
          from the tradition corresponding to your bloodline, or from other
          spells from that tradition to which you have access. You can cast any
          spell in your spell repertoire by using a spell slot of an appropriate
          spell rank.</p>

          <p>You add to this spell repertoire as you increase in level. Each
          time you get a spell slot (see the Sorcerer Spells per Day table
          above), you add a spell to your spell repertoire of the same rank.
          When you gain a new rank of spells, your first new spell is always the
          sorcerous gift spell for that rank that's listed in your bloodline,
          but you can choose the other spells. At 2nd level, you select another
          1st-rank spell; at 3rd level, you gain a new spell from your bloodline
          and two other 2nd-rank spells, and so on. When you add spells, you
          might select a higher-rank version of a spell you already know so that
          you can cast a heightened version of that spell.</p>

          <p>Though you gain them at the same rate, your spell slots and the
          spells in your spell repertoire are separate. If a feat or other
          ability adds a spell to your spell repertoire, it wouldn't give you
          another spell slot or vice versa.</p><h3>Swapping Spells in Your
          Repertoire</h3><p>As you gain new spells in your spell repertoire, you
          might want to replace some of the spells you previously learned. Each
          time you gain a level and learn new spells, you can swap out one of
          your old spells for a different spell of the same rank. This spell can
          be a cantrip, but you can't swap out bloodline spells. You can also
          swap out spells by retraining during downtime.</p>
      rules: []
