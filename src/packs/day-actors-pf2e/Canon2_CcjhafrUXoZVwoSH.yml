  - img: systems/pf2e/icons/default-icons/background.svg
    name: Merchant
    system:
      description:
        gm: ''
        value: >-
          <p>In a dusty shop, market stall, or merchant caravan, you bartered
          wares for coin and trade goods. The skills you picked up still apply
          in the adventuring life, in which a good deal on a suit of armor could
          prevent your death.</p>

          <p>Choose two attribute boosts. One must be to
          <strong>Intelligence</strong> or <strong>Charisma</strong>, and one is
          a free attribute boost.</p>

          <p>You're trained in the Diplomacy skill and the Mercantile Lore
          skill. You gain the
          @UUID[Compendium.pf2e.feats-srd.Item.5nc5ridFBfYpn2Om]{Bargain Hunter}
          skill feat.</p>
