  - _id: 2RuWoMsZAiflpaRv
    img: icons/sundries/books/book-red-exclamation.webp
    name: Basic Scroll Cache
    system:
      description:
        gm: ''
        value: >-
          <p>You have a vast and overflowing collection of scroll scraps,
          riddled with errors and misspellings and leaking energy like a sieve.
          With enough care, you can coax these scroll scraps into
          functioning—briefly.</p>

          <p>Each day during your daily preparations, you can create a single
          temporary scroll containing a 1st-rank spell. The spell must be a
          common spell, a spell to which you have access, or a spell you are
          able to cast, and you must be trained in the skill corresponding to at
          least one of the spell's traditions. You can use
          @UUID[Compendium.pf2e.actionspf2e.Item.Q5iIYCFdqJFM31GW]{Learn a
          Spell} to add spells to those you can use with this feat, even if you
          aren't a spellcaster. This scroll is an unstable, temporary item and
          loses its magic the next time you make your daily preparations if you
          haven't already used it. This temporary scroll can't be used to Learn
          the Spell.</p>

          <p>At 8th level, add a second temporary scroll containing a 2nd-rank
          spell.</p>
