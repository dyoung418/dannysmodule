  - img: systems/pf2e/icons/spells/hallucination.webp
    name: Hallucination
    system:
      description:
        gm: ''
        value: >-
          <p>The target consistently detects one thing as another, can't detect
          something that's there, or detects something that's not there, though
          it doesn't alter their beliefs. You choose which of these effects
          applies, and you determine the specifics of the hallucination. For
          example, you could make the target see all elves as humans, be unable
          to detect the presence of their brother, see their beloved good luck
          charm on their person even when it isn't, or see a tower in the center
          of town.</p>

          <p>The target can attempt an initial Will save, with effects below.
          They also receive a Will save to disbelieve the hallucination every
          time they
          @UUID[Compendium.pf2e.actionspf2e.Item.BlAOM2X92SI6HMtJ]{Seek} or
          directly interact with the hallucination. For example, the target
          could attempt to disbelieve the hallucination each time they
          interacted with an elf, bumped into their brother accidentally, tried
          to check their charm, or studied the tower. The target can attempt to
          disbelieve with a large circumstance bonus in situations determined by
          the GM, such as if the target attempted to climb the nonexistent
          tower.</p>

