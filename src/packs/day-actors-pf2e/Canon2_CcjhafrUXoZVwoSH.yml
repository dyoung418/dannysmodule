  - img: systems/pf2e/icons/spells/blood-vendetta.webp
    name: Blood Vendetta
    system:
      description:
        gm: ''
        value: >-
          <p><strong>Requirements</strong> You can bleed.</p>

          <p><strong>Trigger</strong> A creature deals piercing, slashing, or
          persistent bleed damage to you.</p>

          <hr />

          <p>You curse the target, punishing it for having the audacity to spill
          your blood. The target takes 2d6 persistent bleed damage and must
          attempt a Will save.</p>

          <hr />

          <p><strong>Critical Success</strong> The target is unaffected.</p>

          <p><strong>Success</strong> The target takes half the persistent bleed
          damage.</p>

          <p><strong>Failure</strong> The target takes the full persistent bleed
          damage. Until the bleeding stops, the target has weakness 1 to
          piercing and slashing damage.
          @UUID[Compendium.pf2e.spell-effects.Item.buXx8Azr4BYWPtFg]{Spell
          Effect: Blood Vendetta (Failure)}</p>

          <p><strong>Critical Failure</strong> As failure, but the target takes
          double the persistent bleed damage.</p>

          <hr />

          <p><strong>Heightened (+2)</strong> The persistent bleed damage
          increases by 2d6.</p>
