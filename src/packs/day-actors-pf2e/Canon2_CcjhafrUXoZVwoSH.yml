  - img: icons/sundries/books/book-red-exclamation.webp
    name: Bargain Hunter
    system:
      description:
        gm: ''
        value: >-
          <p>You can
          @UUID[Compendium.pf2e.actionspf2e.Item.QyzlsLrqM0EEwd7j]{Earn Income}
          using Diplomacy, spending your days hunting for bargains and reselling
          at a profit. You can also spend time specifically sniffing out a great
          bargain on an item; this works as if you were using Earn Income with
          Diplomacy, except instead of gaining money, you purchase the item at a
          discount equal to the money you would have gained, gaining the item
          for free if your earned income equals or exceeds its cost. Finally, if
          you select Bargain Hunter during character creation at 1st level, you
          start play with an additional 2 gp.</p>
