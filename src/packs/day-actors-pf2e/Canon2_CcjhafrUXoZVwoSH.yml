    name: Disintegrate
    system:
      description:
        gm: ''
        value: >-
          <p>A black tracer bolt flies toward your target, and upon making
          contact intensifies into a powerful destructive beam. Make a spell
          attack against the target. If you hit an object or force construct
          (such as a wall of force), it's destroyed with no save unless it's an
          artifact or similarly powerful. A single casting can destroy no more
          than a 10-foot cube of matter. If you hit a creature, it takes 12d10
