  - img: icons/sundries/books/book-red-exclamation.webp
    name: Trick Magic Item
    system:
      description:
        gm: ''
        value: >-
          <p>You examine a magic item you normally couldn't use in an effort to
          fool it and activate it temporarily. For example, this might allow a
          fighter to cast a spell from a wand or allow a wizard to cast a spell
          that's not on the arcane list using a scroll. You must know what
          activating the item does, or you can't attempt to trick it.</p>

          <p>Attempt a check using the skill matching the item's magic
          tradition, or matching a tradition that has the spell on its list, if
          you're trying to cast a spell from the item. The relevant skills are
          Arcana for arcane, Nature for primal, Occultism for occult, Religion
          for divine, or any of the four for an item that has the magical trait
          and not a tradition trait. The GM determines the DC based on the
          item's level (possibly adjusted depending on the item or
          situation).</p>

          <p>If you activate a magic item that requires a spell attack modifier
          or spell DC and you don't have the ability to cast spells of the
          relevant tradition, use your level as your proficiency bonus and the
          highest of your Intelligence, Wisdom, or Charisma modifiers. If you're
          a master in the appropriate skill for the item's tradition, you
          instead use the trained proficiency bonus; if you're legendary, you
          instead use the expert proficiency bonus.</p>

          <hr />

          <p><strong>Success</strong> For the rest of the current turn, you can
          spend actions to activate the item as if you could normally use
          it.</p>

          <p><strong>Failure</strong> You can't use the item or try to trick it
          again this turn, but you can try again on subsequent turns.</p>

          <p><strong>Critical Failure</strong> You can't use the item, and you
          can't try to trick it again until your next daily preparations.</p>
      rules: []
      slug: trick-magic-item
      _migration:
        version: 0.94
        previous:
          schema: 0.939
