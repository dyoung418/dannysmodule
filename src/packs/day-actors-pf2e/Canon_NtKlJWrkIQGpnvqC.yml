    system:
      description:
        gm: ''
        value: >-
          <p>One of your ancestors was a mortal who mastered magic. Such magical
          blood can remain latent for generations, but in you it manifested in
          full.</p>

          <p><strong>Spell List</strong> arcane</p>

          <p><strong>Bloodline Skills</strong> Arcana, Society</p>

          <p><strong>Granted Spells</strong> cantrip
          @UUID[Compendium.pf2e.spells-srd.Item.gpzpAAAJ1Lza2JVl]{Detect Magic},
