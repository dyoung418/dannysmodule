  - _id: jeXCve85amWW5SRG
    img: icons/sundries/books/book-red-exclamation.webp
    name: Bon Mot
    system:
      description:
        gm: ''
        value: >-
          <p>You launch an insightful quip at a foe, distracting them. Choose a
          foe within 30 feet and roll a <span data-pf2-action="bonMot"
          data-pf2-glyph="A">Diplomacy</span> check against the target's Will
          DC.</p>

          <hr />

          <p><strong>Critical Success</strong> The target is distracted and
          takes a -3 status penalty to Perception and Will saves for 1
          minute.</p>

          <p>@UUID[Compendium.pf2e.feat-effects.Item.CtrZFI3RV0yPNzTv]{Effect:
          Bon Mot (Critical Success)}</p>

          <p>The target can end the effect early with a retort to your Bon Mot.
          This can either be a single action that has the concentrate trait or
          an appropriate skill action to frame their retort. The GM determines
          which skill actions qualify, though they must take at least 1 action.
          Typically, the retort needs to use a linguistic Charisma-based skill
          action.</p>

          <p><strong>Success</strong> As critical success, but the penalty is
          -2.</p>

          <p>@UUID[Compendium.pf2e.feat-effects.Item.GoSls6SKCFmSoDxT]{Effect:
          Bon Mot}</p>

          <p><strong>Critical Failure</strong> Your quip is atrocious. You take
          the same penalty an enemy would take had you succeeded. This ends
          after 1 minute or if you issue another Bon Mot and succeed.</p>
