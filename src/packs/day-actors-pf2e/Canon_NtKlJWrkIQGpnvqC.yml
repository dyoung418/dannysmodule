  - img: icons/magic/symbols/question-stone-yellow.webp
    name: Bloodline
    system:
      description:
        gm: ''
        value: >-
          <p>Choose a bloodline that gives you your spellcasting talent. This
          choice determines the type of spells you cast and the spell list you
          choose them from, additional spells you learn, and additional trained
          skills. You also gain Focus Points and special focus spells based on
          your bloodline. The bloodlines presented are as follows:</p>

          <ul>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.3qqvnC2U8W26yae7]{Aberrant}</strong>
          A strange and unknowable influence gives you occult spells.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.vhW3glAaEfq2DKrw]{Angelic}</strong>
          Holy grace bestows divine spells upon you.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.w5koctOVrEcpxTIq]{Demonic}</strong>
          A sinful corruption gives you divine spells.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.o39zQMIdERWtmBSB]{Diabolic}</strong>
          A bond with devils gives you divine spells.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.ZHabYxSgYK0XbjhM]{Draconic}</strong>
          The blood of dragons grants you arcane spells.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.RXRnJcG4XSabZ35a]{Elemental}</strong>
          The power of the elements manifests in you as primal spells.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.eW3cfCH7Wpx2vik2]{Fey}</strong>
          Influence from the fey gives you primal spells.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.tYOMBiH3HbViNWwn]{Genie}</strong>
          Through lineage, magic, or wishes made real, the blood of a noble
          genie flows through your veins.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.O0uXZRWMNliDbkxU]{Hag}</strong>
          The blight of a hag has given you occult spells.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.b6hyZTs1rVGHDexz]{Harrow}</strong>
          You have a deep connection to the harrow.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.ZEtJJ5UOlV5oTWWp]{Imperial}</strong>
          An ancient power grants you arcane spells.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.5Wxjghw7lHuCxjZz]{Nymph}</strong>
          One of your ancestors was inspired by a nymph, or perhaps was a nymph
          themself, and now the beauty of nature lives in you.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.TWR1wbPJuCLnGdFZ]{Phoenix}</strong>
          The healing fire a phoenix's blessing grants you primal spells.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.PpzH9tJULk5ksX9w]{Psychopomp}</strong>
          For good or ill, your ancestors' deeds drew the attention of
          psychopomps, or you might somehow count one in your family tree. The
          presence of these shepherds of souls and enemies of undeath has left
          an indelible mark on you.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.uoQOm41BVdSo6pAS]{Shadow}</strong>
          Whether due to a velstrac's manipulations or a planar jaunt gone
          horribly wrong, your bloodline was infused with a vein of shadow.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.7WBZ2kkhZ7JorWu2]{Undead}</strong>
          The touch of death gives you divine spells.</li>

          <li><strong>@UUID[Compendium.pf2e.classfeatures.Item.dKTb959aCQIzSIXj]{Wyrmblessed}</strong>
          A draconic blessing grants you divine spells.</li>

          </ul>
