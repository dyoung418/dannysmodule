  - img: systems/pf2e/icons/features/classes/signature-spells-sorcerer.webp
    name: Sorcerer Spellcasting
    system:
      description:
        gm: ''
        value: >-
          <h2 class="title">Sorcerer Spellcasting</h2>

          <p>Your bloodline provides you with incredible magical power. You can
          cast spells using the Cast a Spell activity, and you can supply
          material, somatic, and verbal components when casting spells. Because
          you're a sorcerer, you can usually replace material components with
          somatic components, so you don't need to use a spell component
          pouch.</p>

          <p>Each day, you can cast up to three 1st-rank spells. You must know
          spells to cast them, and you learn them via the spell repertoire class
          feature. The number of spells you can cast each day is called your
          spell slots.</p>

          <p>As you increase in level as a sorcerer, your number of spells per
          day increases, as does the highest rank of spells you can cast.</p>

          <p>Some of your spells require you to attempt a spell attack roll to
          see how effective they are, or have your enemies roll against your
          spell DC (typically by attempting a saving throw). Since your key
          ability is Charisma, your spell attack rolls and spell DCs use your
          Charisma modifier.</p>

          <h3 class="title"><strong>Heightening Spells</strong></h3>

          <p>When you get spell slots of 2nd level and higher, you can fill
          those slots with stronger versions of lower-rank spells. This
          increases the spell's rank to match the spell slot. You must have a
          spell in your spell repertoire at the rank you want to cast in order
          to heighten it to that rank. Many spells have specific improvements
          when they are heightened to certain ranks. The signature spells class
          feature lets you heighten certain spells freely.</p>

          <h3 class="title"><strong>Cantrips</strong></h3>

          <p>A cantrip is a special type of spell that doesn't use spell slots.
          You can cast a cantrip at will, any number of times per day. A cantrip
          is always automatically heightened to half your level rounded up-this
          is usually equal to the highest rank of spell you can cast as a
          sorcerer. For example, as a 1st-level sorcerer, your cantrips are
          1st-rank spells, and as a 5th-level sorcerer, your cantrips are
          3rd-rank spells.</p>

