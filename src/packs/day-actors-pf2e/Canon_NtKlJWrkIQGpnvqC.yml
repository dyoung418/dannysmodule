  - img: icons/sundries/books/book-red-exclamation.webp
    name: Armor Proficiency (Light)
    system:
      description:
        gm: ''
        value: >-
          <p>You become trained in light armor. If you already were trained in
          light armor, you gain training in medium armor. If you were trained in
          both, you become trained in heavy armor. If you are at least 13th
          level, you become an expert in this armor type.</p>

          <hr />

          <p><strong>Special</strong> You can select this feat more than once.
          Each time, you become trained in the next type of armor, as detailed
          above.</p>
      rules:
        - choices:
            - label: PF2E.Actor.Character.Proficiency.Defense.LightShort
              predicate:
                - defense:light:rank:0
              value: light
            - label: PF2E.Actor.Character.Proficiency.Defense.MediumShort
              predicate:
                - defense:medium:rank:0
                - not: defense:light:rank:0
              value: medium
            - label: PF2E.Actor.Character.Proficiency.Defense.HeavyShort
              predicate:
                - defense:heavy:rank:0
                - nor:
                    - defense:light:rank:0
                    - defense:medium:rank:0
              value: heavy
          key: ChoiceSet
          flag: armorProficiency
          selection: light
        - key: ActiveEffectLike
          mode: upgrade
          path: >-
            system.proficiencies.defenses.{item|flags.pf2e.rulesSelections.armorProficiency}.rank
          value: ternary(gte(@actor.level,13),2,1)
