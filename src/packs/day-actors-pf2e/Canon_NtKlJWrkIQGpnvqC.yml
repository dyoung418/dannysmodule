  - _id: ZixSrqn4rpLYSqzW
    img: icons/sundries/books/book-red-exclamation.webp
    name: Spell Trickster Dedication
    system:
      description:
        gm: ''
        value: >-
          <p>Your experience with magic and its traditions lets you specialize
          in the casting of certain spells, customizing familiar spells to
          create novel effects. Whenever you gain a feat from this archetype,
          you either learn to modify the effects of a single spell, or you
          change one of the modifications from a previous feat. Each time you
          Cast the Spell corresponding to the feat you chose, you decide whether
          to cast its normal or modified version. You can only apply one
          modification to a spell at a time, even if you know more than one
          modification for that spell. Besides modifications mentioned in the
          feat, the spell functions as normal.</p>

          <p>Choose up to two 4th-level spell trickster archetype feats for
          which you meet the spell-casting prerequisite. You gain those feats,
          ignoring their level prerequisite.</p>

          <p><strong>Special</strong> You can't select another dedication feat
          until you have gained two other feats from the
          @UUID[Compendium.pf2e.journals.JournalEntry.vx5FGEG34AxI2dow.JournalEntryPage.DztQF2FexWvnzcaE]{Spell
          Trickster} archetype. The two feats you gain from taking the
          dedication don't count toward this total.</p>
