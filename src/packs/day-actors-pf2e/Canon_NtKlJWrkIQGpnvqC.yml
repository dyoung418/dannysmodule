  - _id: YnMnDay70Telk6ML
    img: icons/sundries/books/book-red-exclamation.webp
    name: Agile Hand
    system:
      description:
        gm: ''
        value: >-
          <p>When you cast
          @UUID[Compendium.pf2e.spells-srd.Item.pwzdSlJgYqN7bs2w]{Telekinetic
          Hand}, you can modify its target to be a
          @UUID[Compendium.pf2e.equipment-srd.Item.zvLyCVD8g2PdHJAc]{Thieves'
