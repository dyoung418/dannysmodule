  - _id: phacqYU2ttaIivw2
    img: icons/sundries/books/book-red-exclamation.webp
    name: Arcane Evolution
    system:
      description:
        gm: ''
        value: >-
          <p>Your arcane legacy grants you an exceptional aptitude for
          intellectual and academic pursuits. You become trained in one skill of
          your choice.</p>

          <p>Additionally, you keep a book of arcane spells similar to a
          wizard's spellbook. You add all the spells in your spell repertoire to
          this book for free, and you can add additional arcane spells to the
          book by paying the appropriate cost and using your Arcana skill,
          similarly to how a wizard can Learn Spells to add those spells to his
          spellbook.</p>

          <p>During your daily preparations, choose any one spell from your book
          of arcane spells. If it isn't in your spell repertoire, add it to your
          spell repertoire until the next time you prepare. If it's already in
          your spell repertoire, add it as an additional signature spell for
          that day.</p>
