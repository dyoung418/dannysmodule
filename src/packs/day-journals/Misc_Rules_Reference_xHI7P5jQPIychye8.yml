  - sort: 100000
    name: Drowning and Suffocation
    type: text
    _id: jFXtu4raE83AdDnV
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><span style="font-family:'Century Gothic', CenturyGothic,
        AppleGothic, sans-serif">You can hold your breath for a number of rounds
        equal to 5 + your Constitution modifier. Reduce your remaining air by 1
        round at the end of each of your turns, or by 2 if you attacked or cast
        any spells that turn. You also lose 1 round worth of air each time you
        are critically hit or critically fail a save against a damaging effect.
        If you speak (including casting spells with verbal components or
        activating items with command components) you lose all remaining air.<br
        style="color:rgb(255, 255, 255);font-family:'Century Gothic',
        CenturyGothic, AppleGothic,
        sans-serif;font-size:15px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;background-color:rgb(15,
        15,
        15);text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial"
        /><br style="color:rgb(255, 255, 255);font-family:'Century Gothic',
        CenturyGothic, AppleGothic,
        sans-serif;font-size:15px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:start;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;background-color:rgb(15,
        15,
        15);text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial"
        />When you run out of air, you fall unconscious and start suffocating.
        You can’t recover from being unconscious and must attempt a DC 20
        Fortitude save at the end of each of your turns. On a failure, you take
        1d10 damage, and on a critical failure, you die. On each check after the
        first, the DC increases by 5 and the damage by 1d10; these increases are
        cumulative. Once your access to air is restored, you stop suffocating
        and are no longer unconscious (unless you’re at 0 Hit
        Points).</span></p>
