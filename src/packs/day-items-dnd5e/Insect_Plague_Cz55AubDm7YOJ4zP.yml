  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Swarming, biting locusts fill a
      20-foot-radius sphere centered on a point you choose within range. The
      sphere spreads around corners. The sphere remains for the duration, and
      its area is lightly obscured. The sphere's area is difficult
      terrain.</p><div class="rd__spc-inline-post"></div><p>When the area
      appears, each creature in it must make a Constitution saving throw. A
      creature takes [[/r 4d10]] piercing damage on a failed save, or half as
      much damage on a successful one. A creature must also make this saving
      throw when it enters the spell's area for the first time on a turn or ends
      its turn there.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 6th level or higher, the damage increases
      by [[/r 1d10]] for each slot level above 5th.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric, Druid, Sorcerer</div>
