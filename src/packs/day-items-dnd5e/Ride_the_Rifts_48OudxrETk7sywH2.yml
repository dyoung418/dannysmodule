    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>When you cast this spell, you gain one <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">level of
      contamination</a>. A stroke of eldritch lightning forming a line 60 feet
      long and 5 feet wide blasts out from you in a direction you choose. Each
      creature in the line must succeed on a Dexterity saving throw. A creature
      takes [[/r 10d6]] lightning damage on a failed save, or half as much
      damage on a successful one. You then teleport to an unoccupied space you
      can see within the line's area.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 4th level or higher, the damage
      increases by [[/r 2d6]] for each slot level above 3rd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
