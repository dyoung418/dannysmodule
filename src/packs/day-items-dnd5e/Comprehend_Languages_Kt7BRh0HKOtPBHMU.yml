  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>For the duration, you understand the
      literal meaning of any spoken language that you hear. You also understand
      any written language that you see, but you must be touching the surface on
      which the words are written. It takes about 1 minute to read one page of
      text.</p><div class="rd__spc-inline-post"></div><p>This spell doesn't
      decode secret messages in a text or a glyph, such as an arcane sigil, that
      isn't part of a written language.</p></div><div><span
      class="bold">Classes: </span>Bard, Sorcerer, Warlock, Wizard</div>
