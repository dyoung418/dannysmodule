  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>The next time you hit a creature with a
      weapon attack before this spell ends, the weapon gleams with astral
      radiance as you strike. The attack deals an extra [[/r 2d6]] radiant
      damage to the target, which becomes visible if it's @condition[invisible],
      and the target sheds dim light in a 5-foot radius and can't become
      @condition[invisible] until the spell ends.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd level or higher, the extra
      damage increases by [[/r 1d6]] for each slot level above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Paladin</div>
