  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A flash of light streaks toward a creature
      of your choice within range. Make a ranged spell attack against the
      target. On a hit, the target takes [[/r 4d6]] radiant damage, and the next
      attack roll made against this target before the end of your next turn has
      advantage, thanks to the mystical dim light glittering on the target until
      then.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, the damage increases by [[/r 1d6]] for each slot
      level above 1st.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric</div>
