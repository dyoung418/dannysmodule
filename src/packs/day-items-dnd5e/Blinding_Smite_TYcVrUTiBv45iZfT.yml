  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>The next time you hit a creature with a
      melee weapon attack during this spell's duration, your weapon flares with
      bright light, and the attack deals an extra [[/r 3d8]] radiant damage to
      the target. Additionally, the target must succeed on a Constitution saving
      throw or be @condition[blinded] until the spell ends.</p><div
      class="rd__spc-inline-post"></div><p>A creature @condition[blinded] by
      this spell makes another Constitution saving throw at the end of each of
      its turns. On a successful save, it is no longer
      @condition[blinded].</p></div><div><span class="bold">Classes:
      </span>Paladin</div>
