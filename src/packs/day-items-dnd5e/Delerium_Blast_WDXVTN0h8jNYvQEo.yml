name: Delerium Blast
type: spell
system:
  source:
    custom: ''
    book: DoDk
    page: '227'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>When you cast this spell, you gain one <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">level of
      contamination</a>.</p><div class="rd__spc-inline-post"></div><p>You ignite
      arcane energies stored inside a delerium fragment held in your hand, and
      hurl it towards a space you can see within range. It explodes in a
      20-foot-radius sphere of erratic psychic energy that overwhelms the minds
      and senses of those within. Each creature in the sphere must succeed on an
      Intelligence saving throw. On a failed save, a creature takes ([[/r
      10d6]]) psychic damage and becomes @condition[incapacitated] until the end
      of their next turn. On a successful save, a target takes half as much
      damage and suffers none of the spell's other effects.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      5th level or higher, the damage increases by [[/r 2d6]] for each slot
      level above 4th.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
