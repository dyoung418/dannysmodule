name: Mordenkainen's Private Sanctum
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '262'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You make an area within range magically
      secure. The area is a cube that can be as small as 5 feet to as large as
      100 feet on each side. The spell lasts for the duration or until you use
      an action to dismiss it.</p><div class="rd__spc-inline-post"></div><p>When
      you cast the spell, you decide what sort of security the spell provides,
      choosing any or all of the following properties:</p><ul
      class="rd__list"><li class="rd__li ">Sound can't pass through the barrier
      at the edge of the warded area.</li><li class="rd__li ">The barrier of the
      warded area appears dark and foggy, preventing vision (including
      @sense[darkvision]) through it.</li><li class="rd__li ">Sensors created by
      divination spells can't appear inside the protected area or pass through
      the barrier at its perimeter.</li><li class="rd__li ">Creatures in the
      area can't be targeted by divination spells.</li><li class="rd__li
      ">Nothing can teleport into or out of the warded area.</li><li
      class="rd__li ">Planar travel is blocked within the warded
      area.</li></ul><p>Casting this spell on the same spot every day for a year
      makes this effect permanent.</p></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 5th level or higher, you can
      increase the size of the cube by 100 feet for each slot level beyond 4th.
      Thus you could protect a cube that can be up to 200 feet on one side by
      using a spell slot of 5th level.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Wizard</div>
