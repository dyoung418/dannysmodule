  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A nonmagical weapon you touch becomes a
      magic weapon. Choose one of the following damage types: acid, cold, fire,
      lightning, or thunder. For the duration, the weapon has a +1 bonus to
      attack rolls and deals an extra [[/r 1d4]] damage of the chosen type when
      it hits.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      5th or 6th level, the bonus to attack rolls increases to +2 and the extra
      damage increases to [[/r 2d4]]. When you use a spell slot of 7th level or
      higher, the bonus increases to +3 and the extra damage increases to [[/r
      3d4]].</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Paladin</div>
