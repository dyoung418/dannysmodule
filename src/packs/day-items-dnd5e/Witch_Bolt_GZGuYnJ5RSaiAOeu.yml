    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A beam of crackling, blue energy lances
      out toward a creature within range, forming a sustained arc of lightning
      between you and the target. Make a ranged spell attack against that
      creature. On a hit, the target takes [[/r 1d12]] lightning damage, and on
      each of your turns for the duration, you can use your action to deal [[/r
      1d12]] lightning damage to the target automatically. The spell ends if you
      use your action to do anything else. The spell also ends if the target is
      ever outside the spell's range or if it has total cover from you.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 2nd level or higher, the initial
      damage increases by [[/r 1d12]] for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Warlock, Wizard</div>
