name: Grasping Vine
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '246'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You conjure a vine that sprouts from the
      ground in an unoccupied space of your choice that you can see within
      range. When you cast this spell, you can direct the vine to lash out at a
      creature within 30 feet of it that you can see. That creature must succeed
      on a Dexterity saving throw or be pulled 20 feet directly toward the
      vine.</p><div class="rd__spc-inline-post"></div><p>Until the spell ends,
      you can direct the vine to lash out at the same creature or another one as
      a bonus action on each of your turns.</p></div><div><span
      class="bold">Classes: </span>Druid, Ranger</div>
