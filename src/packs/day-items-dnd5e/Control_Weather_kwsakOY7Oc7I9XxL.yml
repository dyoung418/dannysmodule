      data-rd-isroller="false">Condition</th></tr></thead><tbody><tr><td
      class="col-1 ve-text-center">1</td><td
      class="col-11">Clear</td></tr><tr><td class="col-1
      ve-text-center">2</td><td class="col-11">Light clouds</td></tr><tr><td
      class="col-1 ve-text-center">3</td><td class="col-11">Overcast or ground
      fog</td></tr><tr><td class="col-1 ve-text-center">4</td><td
      class="col-11">Rain, hail, or snow</td></tr><tr><td class="col-1
      ve-text-center">5</td><td class="col-11">Torrential rain, driving hail, or
      blizzard</td></tr></tbody></table><table class="w-100 rd__table 
      stripe-odd-table"><caption>Temperature</caption><thead><tr><th
