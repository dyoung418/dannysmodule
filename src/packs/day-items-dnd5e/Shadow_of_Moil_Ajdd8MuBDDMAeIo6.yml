  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Flame-like shadows wreathe your body until
      the spell ends, causing you to become heavily obscured to others. The
      shadows turn dim light within 10 feet of you into darkness, and bright
      light in the same area to dim light.</p><div
      class="rd__spc-inline-post"></div><p>Until the spell ends, you have
      resistance to radiant damage. In addition, whenever a creature within 10
      feet of you hits you with an attack, the shadows lash out at that
      creature, dealing it [[/r 2d8]] necrotic damage.</p></div><div><span
      class="bold">Classes: </span>Warlock</div>
