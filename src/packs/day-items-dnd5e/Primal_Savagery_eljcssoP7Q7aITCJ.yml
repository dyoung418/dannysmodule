  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You channel primal magic to cause your
      teeth or fingernails to sharpen, ready to deliver a corrosive attack. Make
      a melee spell attack against one creature within 5 feet of you. On a hit,
      the target takes [[/r 1d10]] acid damage. After you make the attack, your
      teeth or fingernails return to normal.</p><div
      class="rd__spc-inline-post"></div><p>The spell's damage increases by [[/r
      1d10]] when you reach 5th level ([[/r 2d10]]), 11th level ([[/r 3d10]]),
      and 17th level ([[/r 4d10]]).</p></div><div><span class="bold">Classes:
      </span>Druid</div>
