    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch a willing creature. For the
      duration, the target's movement is unaffected by difficult terrain, and
      spells and other magical effects can neither reduce the target's speed nor
      cause the target to be @condition[paralyzed] or
      @condition[restrained].</p><div class="rd__spc-inline-post"></div><p>The
      target can also spend 5 feet of movement to automatically escape from
      nonmagical restraints, such as manacles or a creature that has it
      @condition[grappled]. Finally, being underwater imposes no penalties on
      the target's movement or attacks.</p></div><div><span
      class="bold">Classes: </span>Artificer, Bard, Cleric, Druid, Ranger</div>
