system:
  description:
    value: >-
      <p><em>10th-level Echo Knight feature</em></p><p>You can make your echo
      throw itself in front of an attack directed at another creature that you
      can see. Before the attack roll is made, you can use your reaction to
      teleport the echo to an unoccupied space within 5 feet of the targeted
      creature. The attack roll that triggered the reaction is instead made
      against your echo.</p><p>Once you use this feature, you can’t use it again
      until you finish a short or long rest.</p>
