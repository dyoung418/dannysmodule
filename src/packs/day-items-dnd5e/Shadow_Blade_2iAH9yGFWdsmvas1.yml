name: Shadow Blade
type: spell
system:
  source:
    custom: ''
    book: XGE
    page: '164'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You weave together threads of shadow to
      create a sword of solidified gloom in your hand. This magic sword lasts
      until the spell ends. It counts as a simple melee weapon with which you
      are proficient. It deals [[/r 2d8]] psychic damage on a hit and has the
      finesse, light, and thrown properties (range 20/60). In addition, when you
      use the sword to attack a target that is in dim light or darkness, you
      make the attack roll with advantage.</p><div
      class="rd__spc-inline-post"></div><p>If you drop the weapon or throw it,
      it dissipates at the end of the turn. Thereafter, while the spell
      persists, you can use a bonus action to cause the sword to reappear in
      your hand.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a 3rd- or 4th-level spell slot, the damage increases to
      [[/r 3d8]]. When you cast it using a 5th- or 6th-level spell slot, the
      damage increases to [[/r 4d8]]. When you cast it using a spell slot of 7th
      level or higher, the damage increases to [[/r 5d8]].</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Warlock, Wizard</div>
