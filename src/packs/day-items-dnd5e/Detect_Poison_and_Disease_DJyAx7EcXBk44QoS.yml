  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>For the duration, you can sense the
      presence and location of poisons, poisonous creatures, and diseases within
      30 feet of you. You also identify the kind of poison, poisonous creature,
      or disease in each case.</p><div class="rd__spc-inline-post"></div><p>The
      spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1
      inch of common metal, a thin sheet of lead, or 3 feet of wood or
      dirt.</p></div><div><span class="bold">Classes: </span>Cleric, Druid,
      Paladin, Ranger</div>
