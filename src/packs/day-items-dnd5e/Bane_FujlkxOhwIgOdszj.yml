  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Up to three creatures of your choice that
      you can see within range must make Charisma saving throws. Whenever a
      target that fails this saving throw makes an attack roll or a saving throw
      before the spell ends, the target must roll a [[/r d4]] and subtract the
      number rolled from the attack roll or saving throw.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 2nd level or higher, you can
      target one additional creature for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Cleric</div>
