  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A sudden loud ringing noise, painfully
      intense, erupts from a point of your choice within range. Each creature in
      a 10-foot-radius sphere centered on that point must make a Constitution
      saving throw. A creature takes [[/r 3d8]] thunder damage on a failed save,
      or half as much damage on a successful one. A creature made of inorganic
      material such as stone, crystal, or metal has disadvantage on this saving
      throw.</p><div class="rd__spc-inline-post"></div><p>A nonmagical object
      that isn't being worn or carried also takes the damage if it's in the
      spell's area.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 3rd level or higher, the damage increases
      by [[/r 1d8]] for each slot level above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Sorcerer, Warlock, Wizard</div>
