  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A hail of rock-hard ice pounds to the
      ground in a 20-foot-radius, 40-foot-high cylinder centered on a point
      within range. Each creature in the cylinder must make a Dexterity saving
      throw. A creature takes [[/r 2d8]] bludgeoning damage and [[/r 4d6]] cold
      damage on a failed save, or half as much damage on a successful
      one.</p><div class="rd__spc-inline-post"></div><p>Hailstones turn the
      storm's area of effect into difficult terrain until the end of your next
      turn.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 5th level or higher, the bludgeoning
      damage increases by [[/r 1d8]] for each slot level above 4th.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Druid, Sorcerer, Wizard</div>
