system:
  description:
    value: >-
      <p><em>18th-level Echo Knight feature</em></p><p>You can use a bonus
      action to create two echoes with your Manifest Echo feature, and these
      echoes can coexist. If you try to create a third echo, the previous two
      echoes are destroyed. Anything you can do from one echo’s position can be
      done from the other’s instead.</p><p>In addition, when you roll initiative
      and have no uses of your Unleash Incarnation feature left, you regain one
      use of that feature.</p>
