  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You drive a disorienting spike of psychic
      energy into the mind of one creature you can see within range. The target
      must succeed on an Intelligence saving throw or take [[/r 1d6]] psychic
      damage and subtract [[/r 1d4]] from the next saving throw it makes before
      the end of your next turn.</p><div
      class="rd__spc-inline-post"></div><p>This spell's damage increases by [[/r
      1d6]] when you reach certain levels: 5th level ([[/r 2d6]]), 11th level
      ([[/r 3d6]]), and 17th level ([[/r 4d6]]).</p></div>
