system:
  description:
    value: >-
      <p><em>15th-level Alchemist feature</em></p><p>You have been exposed to so
      many chemicals that they pose little risk to you, and you can use them to
      quickly end certain ailments:</p><p>You gain resistance to acid damage and
      poison damage, and you are immune to the poisoned condition.</p><p>You can
      cast greater restoration and heal without expending a spell slot, without
      preparing the spell, and without material components, provided you use
      alchemist’s supplies as the spellcasting focus. Once you cast either spell
      with this feature, you can’t cast that spell with it again until you
      finish a long rest.</p>
