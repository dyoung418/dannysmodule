  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Of the many tactics employed by master
      magician and renowned adventurer Jim Darkmagic, the old glowing coin trick
      is a time-honored classic. When you cast the spell, you hurl the coin that
      is the spell's material component to any spot within range. The coin
      lights up as if under the effect of a @spell[light] spell. Each creature
      of your choice that you can see within 30 feet of the coin must succeed on
      a Wisdom saving throw or be distracted for the duration. While distracted,
      a creature has disadvantage on Wisdom (@skill[Perception]) checks and
      initiative rolls.</p><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Wizard</div>
