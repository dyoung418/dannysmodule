name: Speak with Animals
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '277'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You gain the ability to comprehend and
      verbally communicate with beasts for the duration. The knowledge and
      awareness of many beasts is limited by their intelligence, but at minimum,
      beasts can give you information about nearby locations and monsters,
      including whatever they can perceive or have perceived within the past
      day. You might be able to persuade a beast to perform a small favor for
      you, at the DM's discretion.</p><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Druid, Ranger</div>
