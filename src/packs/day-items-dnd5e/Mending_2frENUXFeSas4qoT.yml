  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>This spell repairs a single break or tear
      in an object you touch, such as broken chain link, two halves of a broken
      key, a torn cloak, or a leaking wineskin. As long as the break or tear is
      no larger than 1 foot in any dimension, you mend it, leaving no trace of
      the former damage.</p><div class="rd__spc-inline-post"></div><p>This spell
      can physically repair a magic item or construct, but the spell can't
      restore magic to such an object.</p></div><div><span class="bold">Classes:
      </span>Artificer, Bard, Cleric, Druid, Sorcerer, Wizard</div>
