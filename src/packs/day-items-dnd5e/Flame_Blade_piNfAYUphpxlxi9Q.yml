  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You evoke a fiery blade in your free hand.
      The blade is similar in size and shape to a scimitar, and it lasts for the
      duration. If you let go of the blade, it disappears, but you can evoke the
      blade again as a bonus action.</p><div
      class="rd__spc-inline-post"></div><p>You can use your action to make a
      melee spell attack with the fiery blade. On a hit, the target takes [[/r
      3d6]] fire damage.</p><p>The flaming blade sheds bright light in a 10-foot
      radius and dim light for an additional 10 feet.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      4th level or higher, the damage increases by [[/r 1d6]] for every two slot
      levels above 2nd.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Druid</div>
