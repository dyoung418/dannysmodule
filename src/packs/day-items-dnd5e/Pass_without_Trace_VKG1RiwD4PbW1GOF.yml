name: Pass without Trace
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '264'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A veil of shadows and silence radiates
      from you, masking you and your companions from detection. For the
      duration, each creature you choose within 30 feet of you (including you)
      has a +10 bonus to Dexterity (@skill[Stealth]) checks and can't be tracked
      except by magical means. A creature that receives this bonus leaves behind
      no tracks or other traces of its passage.</p><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Druid, Ranger</div>
