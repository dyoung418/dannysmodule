name: Sleep
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '276'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>This spell sends creatures into a magical
      slumber. Roll [[/r 5d8]]; the total is how many hit points of creatures
      this spell can affect. Creatures within 20 feet of a point you choose
      within range are affected in ascending order of their current hit points
      (ignoring @condition[unconscious] creatures).</p><div
      class="rd__spc-inline-post"></div><p>Starting with the creature that has
      the lowest current hit points, each creature affected by this spell falls
      @condition[unconscious] until the spell ends, the sleeper takes damage, or
      someone uses an action to shake or slap the sleeper awake. Subtract each
      creature's hit points from the total before moving on to the creature with
      the next lowest hit points. A creature's hit points must be equal to or
      less than the remaining total for that creature to be
      affected.</p><p>Undead and creatures immune to being @condition[charmed]
      aren't affected by this spell.</p></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 2nd level or higher, roll an
      additional [[/r 2d8]] for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Sorcerer, Wizard</div>
