name: Prismatic Spray
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '267'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Eight multicolored rays of light flash
      from your hand. Each ray is a different color and has a different power
      and purpose. Each creature in a 60-foot cone must make a Dexterity saving
      throw. For each target, roll a [[/r d8]] to determine which color ray
      affects it.</p><div class="rd__spc-inline-post"></div><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">1-Red.</span></span> <p>The target takes [[/r
      10d6]] fire damage on a failed save, or half as much damage on a
      successful one.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="2">
      <span class="entry-title-inner">2-Orange.</span></span> <p>The target
      takes [[/r 10d6]] acid damage on a failed save, or half as much damage on
      a successful one.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="3">
      <span class="entry-title-inner">3-Yellow.</span></span> <p>The target
      takes [[/r 10d6]] lightning damage on a failed save, or half as much
      damage on a successful one.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="4"> <span
      class="entry-title-inner">4-Green.</span></span> <p>The target takes [[/r
      10d6]] poison damage on a failed save, or half as much damage on a
      successful one.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="5">
      <span class="entry-title-inner">5-Blue.</span></span> <p>The target takes
      [[/r 10d6]] cold damage on a failed save, or half as much damage on a
      successful one.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="6">
      <span class="entry-title-inner">6-Indigo.</span></span> <p>On a failed
      save, the target is @condition[restrained]. It must then make a
      Constitution saving throw at the end of each of its turns. If it
      successfully saves three times, the spell ends. If it fails its save three
      times, it permanently turns to stone and is subjected to the
      @condition[petrified] condition. The successes and failures don't need to
      be consecutive, keep track of both until the target collects three of a
      kind.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="7"> <span
      class="entry-title-inner">7-Violet.</span></span> <p>On a failed save, the
      target is @condition[blinded]. It must then make a Wisdom saving throw at
      the start of your next turn. A successful save ends the blindness. If it
      fails that save, the creature is transported to another plane of existence
      of the DM's choosing and is no longer @condition[blinded]. (Typically, a
      creature that is on a plane that isn't its home plane is banished home,
      while other creatures are usually cast into the Astral or Ethereal
      planes.)</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="8">
      <span class="entry-title-inner">8-Special.</span></span> <p>The target is
      struck by two rays. Roll twice more, rerolling any 8.</p><div
      class="rd__spc-inline-post"></div></div></div><div><span
      class="bold">Classes: </span>Sorcerer, Wizard</div>
