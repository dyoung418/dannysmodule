name: Animal Friendship
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '212'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>This spell lets you convince a beast that
      you mean it no harm. Choose a beast that you can see within range. It must
      see and hear you. If the beast's Intelligence is 4 or higher, the spell
      fails. Otherwise, the beast must succeed on a Wisdom saving throw or be
      @condition[charmed] by you for the spell's duration. If you or one of your
      companions harms the target, the spell ends.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 2nd level or higher, you can
      affect one additional beast for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Druid, Ranger</div>
