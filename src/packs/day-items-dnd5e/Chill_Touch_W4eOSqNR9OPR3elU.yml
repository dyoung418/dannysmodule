name: Chill Touch
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '221'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a ghostly, skeletal hand in the
      space of a creature within range. Make a ranged spell attack against the
      creature to assail it with the chill of the grave. On a hit, the target
      takes [[/r 1d8]] necrotic damage, and it can't regain hit points until the
      start of your next turn. Until then, the hand clings to the
      target.</p><div class="rd__spc-inline-post"></div><p>If you hit an undead
      target, it also has disadvantage on attack rolls against you until the end
      of your next turn.</p><p>This spell's damage increases by [[/r 1d8]] when
      you reach 5th level ([[/r 2d8]]), 11th level ([[/r 3d8]]), and 17th level
      ([[/r 4d8]]).</p></div><div><span class="bold">Classes: </span>Sorcerer,
      Warlock, Wizard</div>
