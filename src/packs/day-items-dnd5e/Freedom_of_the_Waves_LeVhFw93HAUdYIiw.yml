    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You conjure a deluge of seawater in a
      15-foot-radius, 10-foot-tall cylinder centered on a point within range.
      This water takes the form of a tidal wave, a whirlpool, a waterspout, or
      another form of your choice. Each creature in the area must succeed on a
      Strength saving throw against your spell save DC or take [[/r 2d8]]
      bludgeoning damage and fall @condition[prone]. You can choose a number of
      creatures equal to your spellcasting modifier (minimum of 1) to
      automatically succeed on this saving throw.</p><div
      class="rd__spc-inline-post"></div><p>If you are within the spell's area,
      as part of the action you use to cast the spell, you can vanish into the
      deluge and teleport to an unoccupied space that you can see within the
      spell's area.</p></div><div><span class="bold">Classes: </span>Druid,
      Ranger, Sorcerer</div>
