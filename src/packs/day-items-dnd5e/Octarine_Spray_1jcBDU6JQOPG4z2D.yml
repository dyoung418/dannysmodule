    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>When you cast this spell, you gain one <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">level of
      contamination</a>. Octarine rays of light flash from your hand. Each ray
      is a different colour and has a different power and purpose, see the table
      below. Each creature in a 60-foot cone must succeed on a Constitution
      saving throw. For each target, roll a [[/r d8]] to determine which colour
      ray affects it.</p><div class="rd__spc-inline-post"></div><table
      class="w-100 rd__table  stripe-odd-table"><thead><tr><th class="col-2
      ve-text-center" data-rd-isroller="true">[[/r d8]]</th><th class="col-10"
      data-rd-isroller="false">Octarine Spray
      Effect</th></tr></thead><tbody><tr><td class="col-2 ve-text-center"
      data-roll-min="1" data-roll-max="1">1</td><td class="col-10">The target
      takes [[/r 20d6]] psychic damage on a failed save, or half as much damage
      on a success.</td></tr><tr><td class="col-2 ve-text-center"
      data-roll-min="2" data-roll-max="2">2</td><td class="col-10">The target
      takes [[/r 20d6]] necrotic damage on a failed save, or half as much damage
      on a success.</td></tr><tr><td class="col-2 ve-text-center"
      data-roll-min="3" data-roll-max="3">3</td><td class="col-10">The target
      takes [[/r 20d6]] force damage on a failed save, or half as much damage on
      a success.</td></tr><tr><td class="col-2 ve-text-center" data-roll-min="4"
      data-roll-max="4">4</td><td class="col-10">The target takes [[/r 20d6]]
      radiant damage on a failed save, or half as much damage on a
      success.</td></tr><tr><td class="col-2 ve-text-center" data-roll-min="5"
      data-roll-max="5">5</td><td class="col-10">The target takes [[/r 20d6]]
      thunder damage on a failed save, or half as much damage on a
      success.</td></tr><tr><td class="col-2 ve-text-center" data-roll-min="6"
      data-roll-max="6">6</td><td class="col-10">At the start of each of its
      turns, the affected target uses all its movement to move directly towards
      the closest creature it can see. Then, the affected target uses its action
      to make a melee attack against a randomly determined creature within its
      reach. If there is no creature within its reach, the affected target does
      nothing this turn. At the end of each of its turns, the affected target
      can make a Wisdom saving throw. If it succeeds, this effect ends for that
      target.</td></tr><tr><td class="col-2 ve-text-center" data-roll-min="7"
      data-roll-max="7">7</td><td class="col-10">At the start of each of its
      turns, the affected target gains one <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">level of
      contamination</a>. At the end of each of its turns, an affected target can
      make a Constitution saving throw. If it succeeds, this effect ends for
      that target, but any <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination
      levels</a> gained remain.</td></tr><tr><td class="col-2 ve-text-center"
      data-roll-min="8" data-roll-max="8">8</td><td
      class="col-10"><b>Special.</b> The target is struck by an additional ray.
      Roll again twice. There's no limit to how many additional rays can strike
      a single creature in this manner.</td></tr></tbody></table></div>
