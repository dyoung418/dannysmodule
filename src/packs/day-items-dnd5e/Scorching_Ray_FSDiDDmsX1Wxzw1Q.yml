  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create three rays of fire and hurl
      them at targets within range. You can hurl them at one target or
      several.</p><div class="rd__spc-inline-post"></div><p>Make a ranged spell
      attack for each ray. On a hit, the target takes [[/r 2d6]] fire
      damage.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 3rd level or higher, you create one
      additional ray for each slot level above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
