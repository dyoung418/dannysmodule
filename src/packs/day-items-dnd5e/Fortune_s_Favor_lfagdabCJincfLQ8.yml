    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You impart latent luck to yourself or one
      willing creature you can see within range. When the chosen creature makes
      an attack roll, an ability check, or a saving throw before the spell ends,
      it can dismiss this spell on itself to roll an additional [[/r d20]] and
      choose which of the [[/r d20]]s to use. Alternatively, when an attack roll
      is made against the chosen creature, it can dismiss this spell on itself
      to roll a [[/r d20]] and choose which of the [[/r d20]]s to use, the one
      it rolled or the one the attacker rolled.</p><div
      class="rd__spc-inline-post"></div><p>If the original [[/r d20]] roll has
      advantage or disadvantage, the creature rolls the additional [[/r d20]]
      after advantage or disadvantage has been applied to the original
      roll.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 3rd level or higher, you can target one
      additional creature for each slot level above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
