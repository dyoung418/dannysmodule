name: Investiture of Ice
type: spell
system:
  source:
    custom: ''
    book: XGE
    page: '159'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Until the spell ends, ice rimes your body,
      and you gain the following benefits:</p><div
      class="rd__spc-inline-post"></div><ul class="rd__list"><li class="rd__li
      ">You are immune to cold damage and have resistance to fire
      damage.</li><li class="rd__li ">You can move across difficult terrain
      created by ice or snow without spending extra movement.</li><li
      class="rd__li ">The ground in a 10-foot radius around you is icy and is
      difficult terrain for creatures other than you. The radius moves with
      you.</li><li class="rd__li ">You can use your action to create a 15-foot
      cone of freezing wind extending from your outstretched hand in a direction
      you choose. Each creature in the cone must make a Constitution saving
      throw. A creature takes [[/r 4d6]] cold damage on a failed save, or half
      as much damage on a successful one. A creature that fails its save against
      this effect has its speed halved until the start of your next
      turn.</li></ul></div><div><span class="bold">Classes: </span>Druid,
      Sorcerer, Warlock, Wizard</div>
