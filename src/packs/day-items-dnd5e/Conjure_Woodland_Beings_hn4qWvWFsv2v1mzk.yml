    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You summon fey creatures that appear in
      unoccupied spaces that you can see within range. Choose one of the
      following options for what appears:</p><div
      class="rd__spc-inline-post"></div><ul class="rd__list"><li class="rd__li
      ">One <a
      href="https://5etools-mirror-2.github.io/bestiary.html#blankhash,flstchallenge%20rating:min=&amp;0~max=&amp;2,flsttype:fey=1,flstmiscellaneous:swarm=2">fey
      creature of challenge rating 2 or lower</a></li><li class="rd__li ">Two <a
      href="https://5etools-mirror-2.github.io/bestiary.html#blankhash,flstchallenge%20rating:min=&amp;0~max=&amp;1,flsttype:fey=1,flstmiscellaneous:swarm=2">fey
      creatures of challenge rating 1 or lower</a></li><li class="rd__li ">Four
      <a
      href="https://5etools-mirror-2.github.io/bestiary.html#blankhash,flstchallenge%20rating:min=&amp;0~max=&amp;1/2,flsttype:fey=1,flstmiscellaneous:swarm=2">fey
      creatures of challenge rating 1/2 or lower</a></li><li class="rd__li
      ">Eight <a
      href="https://5etools-mirror-2.github.io/bestiary.html#blankhash,flstchallenge%20rating:min=&amp;0~max=&amp;1/4,flsttype:fey=1,flstmiscellaneous:swarm=2">fey
      creatures of challenge rating 1/4 or lower</a></li></ul><p>A summoned
      creature disappears when it drops to 0 hit points or when the spell
      ends.</p><p>The summoned creatures are friendly to you and your
      companions. Roll initiative for the summoned creatures as a group, which
      have their own turns. They obey any verbal commands that you issue to them
      (no action required by you). If you don't issue any commands to them, they
      defend themselves from hostile creatures, but otherwise take no
      actions.</p><p>The DM has the creatures' statistics.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using certain
      higher-level spell slots, you choose one of the summoning options above,
      and more creatures appear: twice as many with a 6th-level slot and three
      times as many with an 8th-level slot.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Druid, Ranger</div>
