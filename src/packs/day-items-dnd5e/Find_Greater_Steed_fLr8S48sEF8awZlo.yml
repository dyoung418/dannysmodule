name: Find Greater Steed
type: spell
system:
  source:
    custom: ''
    book: XGE
    page: '156'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You summon a spirit that assumes the form
      of a loyal, majestic mount. Appearing in an unoccupied space within range,
      the spirit takes on a form you choose: a @creature[griffon], a
      @creature[pegasus], a @creature[peryton], a @creature[dire wolf], a
      @creature[rhinoceros], or a @creature[saber-toothed tiger]. The creature
      has the statistics provided in the Monster Manual for the chosen form,
      though it is a celestial, a fey, or a fiend (your choice) instead of its
      normal creature type. Additionally, if it has an Intelligence score of 5
      or lower, its Intelligence becomes 6, and it gains the ability to
      understand one language of your choice that you speak.</p><div
      class="rd__spc-inline-post"></div><p>You control the mount in combat.
      While the mount is within 1 mile of you, you can communicate with it
      telepathically. While mounted on it, you can make any spell you cast that
      targets only you also target the mount.</p><p>The mount disappears
      temporarily when it drops to 0 hit points or when you dismiss it as an
      action. Casting this spell again re-summons the bonded mount, with all its
      hit points restored and any conditions removed.</p><p>You can't have more
      than one mount bonded by this spell or @spell[find steed] at the same
      time. As an action, you can release a mount from its bond, causing it to
      disappear permanently.</p><p>Whenever the mount disappears, it leaves
      behind any objects it was wearing or carrying.</p><div
      class="rd__b-special rd__b-inset " data-source="FTD"><span class="rd__h
      rd__h--2-inset" data-title-index="1"><h4
      class="entry-title-inner">Dragonnel Steeds</h4><span
      class="ve-flex-vh-center"> <span class="rd__title-link
      rd__title-link--inset"><span class="help-subtle" title="Fizban’s Treasury
      of Dragons">FTD</span> p190</span><span class="rd__h-toggle ml-2 clickable
      no-select" data-rd-h-special-toggle-button="true" title="Toggle Visibility
      (CTRL to Toggle All)">[–]</span></span></span><p>With the DM's permission,
      a paladin can summon a spirit in the form of a @creature[dragonnel|ftd]
      using the find greater steed spell, which appears in <i>Xanathar's Guide
      to Everything</i>.</p><div
      class="float-clear"></div></div></div><div><span class="bold">Classes:
      </span>Paladin</div>
