    book: XGE
    page: '156'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch a quiver containing arrows or
      bolts. When a target is hit by a ranged weapon attack using a piece of
      ammunition drawn from the quiver, the target takes an extra [[/r 1d6]]
      fire damage. The spell's magic ends on a piece of ammunition when it hits
      or misses, and the spell ends when twelve pieces of ammunition have been
      drawn from the quiver.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 4th level or higher, the number
      of pieces of ammunition you can affect with this spell increases by two
      for each slot level above 3rd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Druid, Ranger, Sorcerer, Wizard</div>
