    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>When you cast this spell, you gain one <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">level of
      contamination</a>. You draw unrestrained arcane magic from the delerium
      shard you hold in your hand. Until the spell ends, you gain the following
      benefits:</p><div class="rd__spc-inline-post"></div><ul
      class="rd__list"><li class="rd__li ">When you cast a spell that deals
      acid, fire, cold, lightning, or poison damage, you can change the damage
      type to force, necrotic, psychic, or radiant damage.</li><li class="rd__li
      ">Once per turn when you deal damage with a spell, you can deal an extra
      [[/r 1d12]] necrotic damage for each <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination
      level</a> you have gained to one target of that spell.</li><li
      class="rd__li ">When you cast a spell that forces a creature to make a
      saving throw to resist its effects, you can choose to gain one <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">level of
      contamination</a>. If you do, one target of the spell has disadvantage on
      its first saving throw made against that spell.</li></ul><p>This spell
      can't be dispelled by @spell[dispel magic].</p></div>
