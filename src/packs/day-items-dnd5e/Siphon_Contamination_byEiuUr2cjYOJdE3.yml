name: Siphon Contamination
type: spell
system:
  source:
    custom: ''
    book: DoDk
    page: '229'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>This demanding spell transfers <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination</a>
      from one creature to another. When you cast this spell, you must first
      touch either a willing humanoid creature with one or more <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">levels of
      contamination</a>, or a former humanoid creature whose current form is the
      result of a monstrous transformation. You then touch a different willing
      humanoid creature.</p><div class="rd__spc-inline-post"></div><p>If both
      creatures touched were willing humanoid creatures, you remove all <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination
      levels</a> and mutations from the first creature, then the second creature
      you touch gains a number of <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination
      levels</a> equal to the number of levels removed from the first
      creature.</p><p>If the first creature you touch is a former humanoid who
      suffered a monstrous <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination</a>,
      and the second creature is a willing humanoid creature with a character
      level or challenge rating equal to or higher than the challenge rating of
      the transformed creature, you restore the fully contaminated creature to
      its original form, then the humanoid creature immediately undergoes a
      monstrous transformation as if it had gained six <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination
      levels</a>.</p><p>The second creature touched cannot prevent or negate
      these <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination
      levels</a> or an ensuing transformation in any way, or else the spell
      fails with no effect.</p></div>
