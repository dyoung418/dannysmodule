  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You point at one creature you can see
      within range, and the sound of a dolorous bell fills the air around it for
      a moment. The target must succeed on a Wisdom saving throw or take [[/r
      1d8]] necrotic damage. If the target is missing any of its hit points, it
      instead takes [[/r 1d12]] necrotic damage.</p><div
      class="rd__spc-inline-post"></div><p>The spell's damage increases by one
      die when you reach 5th level ([[/r 2d8]] or [[/r 2d12]]), 11th level ([[/r
      3d8]] or [[/r 3d12]]), and 17th level ([[/r 4d8]] or [[/r
      4d12]]).</p></div><div><span class="bold">Classes: </span>Cleric, Warlock,
      Wizard</div>
