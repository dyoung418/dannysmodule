  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You cause numbing frost to form on one
      creature that you can see within range. The target must make a
      Constitution saving throw. On a failed save, the target takes [[/r 1d6]]
      cold damage, and it has disadvantage on the next weapon attack roll it
      makes before the end of its next turn.</p><div
      class="rd__spc-inline-post"></div><p>The spell's damage increases by [[/r
      1d6]] when you reach 5th level ([[/r 2d6]]), 11th level ([[/r 3d6]]), and
      17th level ([[/r 4d6]]).</p></div><div><span class="bold">Classes:
      </span>Artificer, Druid, Sorcerer, Warlock, Wizard</div>
