name: Create Undead
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '229'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You can cast this spell only at night.
      Choose up to three corpses of Medium or Small humanoids within range. Each
      corpse becomes a @creature[ghoul] under your control. (The DM has game
      statistics for these creatures.)</p><div
      class="rd__spc-inline-post"></div><p>As a bonus action on each of your
      turns, you can mentally command any creature you animated with this spell
      if the creature is within 120 feet of you (if you control multiple
      creatures, you can command any or all of them at the same time, issuing
      the same command to each one). You decide what action the creature will
      take and where it will move during its next turn, or you can issue a
      general command, such as to guard a particular chamber or corridor. If you
      issue no commands, the creature only defends itself against hostile
      creatures. Once given an order, the creature continues to follow it until
      its task is complete.</p><p>The creature is under your control for 24
      hours, after which it stops obeying any command you have given it. To
      maintain control of the creature for another 24 hours, you must cast this
      spell on the creature before the current 24-hour period ends. This use of
      the spell reasserts your control over up to three creatures you have
      animated with this spell, rather than animating new ones.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a 7th-level spell
      slot, you can animate or reassert control over four
      @creature[ghoul||ghouls]. When you cast this spell using an 8th-level
      spell slot, you can animate or reassert control over five
      @creature[ghoul||ghouls] or two @creature[ghast||ghasts] or
      @creature[wight||wights]. When you cast this spell using a 9th-level spell
      slot, you can animate or reassert control over six
      @creature[ghoul||ghouls], three @creature[ghast||ghasts] or
      @creature[wight||wights], or two @creature[mummy||mummies].</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric, Warlock, Wizard</div>
