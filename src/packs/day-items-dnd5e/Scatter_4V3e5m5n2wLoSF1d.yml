  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>The air quivers around up to five
      creatures of your choice that you can see within range. An unwilling
      creature must succeed on a Wisdom saving throw to resist this spell. You
      teleport each affected target to an unoccupied space that you can see
      within 120 feet of you. That space must be on the ground or on a
      floor.</p><div class="rd__spc-inline-post"></div></div><div><span
      class="bold">Classes: </span>Sorcerer, Warlock, Wizard</div>
