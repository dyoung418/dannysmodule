name: Skill Empowerment
type: spell
system:
  source:
    custom: ''
    book: XGE
    page: '165'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Your magic deepens a creature's
      understanding of its own talent. You touch one willing creature and give
      it expertise in one skill of your choice; until the spell ends, the
      creature doubles its proficiency bonus for ability checks it makes that
      use the chosen skill.</p><div class="rd__spc-inline-post"></div><p>You
      must choose a skill in which the target is proficient and that isn't
      already benefiting from an effect, such as Expertise, that doubles its
      proficiency bonus.</p></div><div><span class="bold">Classes:
      </span>Artificer, Bard, Sorcerer, Wizard</div>
