  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Your body becomes blurred, shifting and
      wavering to all who can see you. For the duration, any creature has
      disadvantage on attack rolls against you. An attacker is immune to this
      effect if it doesn't rely on sight, as with blindsight, or can see through
      illusions, as with @sense[truesight].</p><div
