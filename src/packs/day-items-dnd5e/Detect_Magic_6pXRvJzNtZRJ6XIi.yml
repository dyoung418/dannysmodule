  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>For the duration, you sense the presence
      of magic within 30 feet of you. If you sense magic in this way, you can
      use your action to see a faint aura around any visible creature or object
      in the area that bears magic, and you learn its <a
      href="https://5etools-mirror-2.github.io/book.html#PHB,10,the%20schools%20of%20magic,0">school
      of magic</a>, if any.</p><div class="rd__spc-inline-post"></div><p>The
      spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1
      inch of common metal, a thin sheet of lead, or 3 feet of wood or
      dirt.</p></div><div><span class="bold">Classes: </span>Artificer, Bard,
      Cleric, Druid, Paladin, Ranger, Sorcerer, Wizard</div>
