  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>By casting gem-inlaid sticks, rolling
      dragon bones, laying out ornate cards, or employing some other divining
      tool, you receive an omen from an otherworldly entity about the results of
      a specific course of action that you plan to take within the next 30
      minutes. The DM chooses from the following possible omens:</p><div
      class="rd__spc-inline-post"></div><ul class="rd__list"><li class="rd__li
      ">Weal, for good results</li><li class="rd__li ">Woe, for bad
      results</li><li class="rd__li ">Weal and woe, for both good and bad
      results</li><li class="rd__li ">Nothing, for results that aren't
      especially good or bad</li></ul><p>The spell doesn't take into account any
      possible circumstances that might change the outcome, such as the casting
      of additional spells or the loss or gain of a companion.</p><p>If you cast
      the spell two or more times before completing your next long rest, there
      is a cumulative [[/r 1d100]]{25 percent} chance for each casting after the
      first that you get a random reading. The DM makes this roll in
      secret.</p></div><div><span class="bold">Classes: </span>Cleric</div>
