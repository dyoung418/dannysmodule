    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch a point and infuse an area
      around it with holy (or unholy) power. The area can have a radius up to 60
      feet, and the spell fails if the radius includes an area already under the
      effect a hallow spell. The affected area is subject to the following
      effects.</p><div class="rd__spc-inline-post"></div><p>First, celestials,
      elementals, fey, fiends, and undead can't enter the area, nor can such
      creatures charm, frighten, or possess creatures within it. Any creature
      @condition[charmed], @condition[frightened], or possessed by such a
      creature is no longer @condition[charmed], @condition[frightened], or
      possessed upon entering the area. You can exclude one or more of those
      types of creatures from this effect.</p><p>Second, you can bind an extra
      effect to the area. Choose the effect from the following list, or choose
      an effect offered by the DM. Some of these effects apply to creatures in
      the area; you can designate whether the effect applies to all creatures,
      creatures that follow a specific deity or leader, or creatures of a
      specific sort, such as orcs or trolls. When a creature that would be
      affected enters the spell's area for the first time on a turn or starts
      its turn there, it can make a Charisma saving throw. On a success, the
      creature ignores the extra effect until it leaves the area.</p><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">Courage.</span></span> <p>Affected
      creatures can't be @condition[frightened] while in the area.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="2"> <span
      class="entry-title-inner">Darkness.</span></span> <p>Darkness fills the
      area. Normal light, as well as magical light created by spells of a lower
      level than the slot you used to cast this spell, can't illuminate the
      area.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="3"> <span
      class="entry-title-inner">Daylight.</span></span> <p>Bright light fills
      the area. Magical darkness created by spells of a lower level than the
      slot you used to cast this spell can't extinguish the light.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="4"> <span
      class="entry-title-inner">Energy Protection.</span></span> <p>Affected
      creatures in the area have resistance to one damage type of your choice,
      except for bludgeoning, piercing, or slashing.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="5"> <span
      class="entry-title-inner">Energy Vulnerability.</span></span> <p>Affected
      creatures in the area have vulnerability to one damage type of your
      choice, except for bludgeoning, piercing, or slashing.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="6"> <span
      class="entry-title-inner">Everlasting Rest.</span></span> <p>Dead bodies
      interred in the area can't be turned into undead.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="7"> <span
      class="entry-title-inner">Extradimensional Interference.</span></span>
      <p>Affected creatures can't move or travel using teleportation or by
      extradimensional or interplanar means.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="8"> <span
      class="entry-title-inner">Fear.</span></span> <p>Affected creatures are
      @condition[frightened] while in the area.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="9"> <span
      class="entry-title-inner">Silence.</span></span> <p>No sound can emanate
      from within the area, and no sound can reach into it.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="10"> <span
      class="entry-title-inner">Tongues.</span></span> <p>Affected creatures can
      communicate with any other creature in the area, even if they don't share
      a common language.</p><div
      class="rd__spc-inline-post"></div></div></div><div><span
      class="bold">Classes: </span>Cleric</div>
