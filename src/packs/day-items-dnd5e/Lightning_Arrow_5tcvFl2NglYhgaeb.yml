    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>The next time you make a ranged weapon
      attack during the spell's duration, the weapon's ammunition, or the weapon
      itself if it's a thrown weapon, transforms into a bolt of lightning. Make
      the attack roll as normal. The target takes [[/r 4d8]] lightning damage on
      a hit, or half as much damage on a miss, instead of the weapon's normal
      damage.</p><div class="rd__spc-inline-post"></div><p>Whether you hit or
      miss, each creature within 10 feet of the target must make a Dexterity
      saving throw. Each of these creatures takes [[/r 2d8]] lightning damage on
      a failed save, or half as much damage on a successful one.</p><p>The piece
      of ammunition or weapon then returns to its normal form.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      4th level or higher, the damage for both effects of the spell increases by
      [[/r 1d8]] for each slot level above 3rd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Ranger</div>
