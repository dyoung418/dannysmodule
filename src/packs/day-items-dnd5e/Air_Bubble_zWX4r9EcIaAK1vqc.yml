    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a spectral globe around the
      head of a willing creature you can see within range. The globe is filled
      with fresh air that lasts until the spell ends. If the creature has more
      than one head, the globe of air appears around only one of its heads
      (which is all the creature needs to avoid suffocation, assuming that all
      its heads share the same respiratory system).</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd level or higher, you can
      create two additional globes of fresh air for each slot level above
      2nd.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Druid, Ranger, Sorcerer, Wizard</div>
