  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A frigid beam of blue-white light streaks
      toward a creature within range. Make a ranged spell attack against the
      target. On a hit, it takes [[/r 1d8]] cold damage, and its speed is
      reduced by 10 feet until the start of your next turn.</p><div
      class="rd__spc-inline-post"></div><p>The spell's damage increases by [[/r
      1d8]] when you reach 5th level ([[/r 2d8]]), 11th level ([[/r 3d8]]), and
      17th level ([[/r 4d8]]).</p></div><div><span class="bold">Classes:
      </span>Artificer, Sorcerer, Wizard</div>
