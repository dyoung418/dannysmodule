  description:
    value: >-
      <div class="rd__b  rd__b--3"><div class="rd__quote"><p
      class="rd__quote-line rd__quote-line--last">“<i>When I met Jim Darkmagic,
      I wondered how he got anything done in that outfit. I have since learned
      that most of his talents involve standing and talking. His outfit is
      perfect for that.</i>”</p><p><span class="rd__quote-by">—
      Môrgæn</span></p></div><div class="rd__spc-inline-post"></div><p>Jim
      Darkmagic is said to have invented this spell, originally calling it <i>I
      said what?!</i> Have you ever been talking to the local monarch and
      accidentally mentioned how their son looks like your favorite hog from
      when you were growing up on the family farm? We've all been there! But
      rather than being beheaded for an honest slip of the tongue, you can
      pretend it never happened—by ensuring that no one knows it
      happened.</p><p>When you cast this spell, you skillfully reshape the
      memories of listeners in your immediate area, so that each creature of
      your choice within 5 feet of you forgets everything you said within the
      last 6 seconds. Those creatures then remember that you actually said the
      words you speak as the verbal component of the spell.</p></div><div><span
      class="bold">Classes: </span>Bard, Wizard</div>
