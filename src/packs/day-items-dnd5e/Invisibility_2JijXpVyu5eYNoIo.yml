  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A creature you touch becomes
      @condition[invisible] until the spell ends. Anything the target is wearing
      or carrying is @condition[invisible] as long as it is on the target's
      person. The spell ends for a target that attacks or casts a spell.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd level or higher, you can
      target one additional creature for each slot level above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Bard, Sorcerer, Warlock, Wizard</div>
