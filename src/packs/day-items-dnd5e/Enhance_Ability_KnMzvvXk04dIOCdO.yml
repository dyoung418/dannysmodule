name: Enhance Ability
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '237'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch a creature and bestow upon it a
      magical enhancement. Choose one of the following effects; the target gains
      that effect until the spell ends.</p><div
      class="rd__spc-inline-post"></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">Bear's Endurance.</span></span> <p>The target
      has advantage on Constitution checks. It also gains [[/r 2d6]] temporary
      hit points, which are lost when the spell ends.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="2"> <span
      class="entry-title-inner">Bull's Strength.</span></span> <p>The target has
      advantage on Strength checks, and his or her carrying capacity
      doubles.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="3">
      <span class="entry-title-inner">Cat's Grace.</span></span> <p>The target
      has advantage on Dexterity checks. It also doesn't take damage from
      falling 20 feet or less if it isn't @condition[incapacitated].</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="4"> <span
      class="entry-title-inner">Eagle's Splendor.</span></span> <p>The target
      has advantage on Charisma checks.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="5"> <span
      class="entry-title-inner">Fox's Cunning.</span></span> <p>The target has
      advantage on Intelligence checks.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="6"> <span
      class="entry-title-inner">Owl's Wisdom.</span></span> <p>The target has
      advantage on Wisdom checks.</p><div
      class="rd__spc-inline-post"></div></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      3rd level or higher, you can target one additional creature for each slot
      level above 2nd.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Bard, Cleric, Druid, Sorcerer</div>
