name: Blindness/Deafness
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '219'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You can blind or deafen a foe. Choose one
      creature that you can see within range to make a Constitution saving
      throw. If it fails, the target is either @condition[blinded] or
      @condition[deafened] (your choice) for the duration. At the end of each of
      its turns, the target can make a Constitution saving throw. On a success,
      the spell ends.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      3rd level or higher, you can target one additional creature for each slot
      level above 2nd.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Cleric, Sorcerer, Wizard</div>
