  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You cause up to ten words to form in a
      part of the sky you can see. The words appear to be made of cloud and
      remain in place for the spell's duration. The words dissipate when the
      spell ends. A strong wind can disperse the clouds and end the spell
      early.</p><div class="rd__spc-inline-post"></div></div><div><span
