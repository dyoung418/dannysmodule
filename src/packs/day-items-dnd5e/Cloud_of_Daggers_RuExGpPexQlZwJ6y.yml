  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You fill the air with spinning daggers in
      a cube 5 feet on each side, centered on a point you choose within range. A
      creature takes [[/r 4d4]] slashing damage when it enters the spell's area
      for the first time on a turn or starts its turn there.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd level or higher, the damage
      increases by [[/r 2d4]] for each slot level above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Sorcerer, Warlock, Wizard</div>
