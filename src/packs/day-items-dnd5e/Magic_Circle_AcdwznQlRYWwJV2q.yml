    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a 10-foot-radius, 20-foot-tall
      cylinder of magical energy centered on a point on the ground that you can
      see within range. Glowing runes appear wherever the cylinder intersects
      with the floor or other surface.</p><div
      class="rd__spc-inline-post"></div><p>Choose one or more of the following
      types of creatures: celestials, elementals, fey, fiends, or undead. The
      circle affects a creature of the chosen type in the following ways:</p><ul
      class="rd__list"><li class="rd__li ">The creature can't willingly enter
      the cylinder by nonmagical means. If the creature tries to use
      teleportation or interplanar travel to do so, it must first succeed on a
      Charisma saving throw.</li><li class="rd__li ">The creature has
      disadvantage on attack rolls against targets within the cylinder.</li><li
      class="rd__li ">Targets within the cylinder can't be @condition[charmed],
      @condition[frightened], or possessed by the creature.</li></ul><p>When you
      cast this spell, you can elect to cause its magic to operate in the
      reverse direction, preventing a creature of the specified type from
      leaving the cylinder and protecting targets outside it.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      4th level or higher, the duration increases by 1 hour for each slot level
      above 3rd.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric, Paladin, Warlock, Wizard</div>
