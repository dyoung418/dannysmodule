  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Choose a creature that you can see within
      range. A surge of positive energy washes through the creature, causing it
      to regain 70 hit points. This spell also ends
      @condition[blinded||blindness], @condition[deafened||deafness], and any
      diseases affecting the target. This spell has no effect on constructs or
      undead.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      7th level or higher, the amount of healing increases by 10 for each slot
      level above 6th.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric, Druid</div>
