    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a bolt of lightning that arcs
      toward a target of your choice that you can see within range. Three bolts
      then leap from that target to as many as three other targets, each of
      which must be within 30 feet of the first target. A target can be a
      creature or an object and can be targeted by only one of the
      bolts.</p><div class="rd__spc-inline-post"></div><p>A target must make a
      Dexterity saving throw. The target takes [[/r 10d8]] lightning damage on a
      failed save, or half as much damage on a successful one.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      7th level or higher, one additional bolt leaps from the first target to
      another target for each slot level above 6th.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
