  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You sacrifice some of your health to mend
      another creature's injuries. You take [[/r 4d8]] necrotic damage, which
      can't be reduced in any way, and one creature of your choice that you can
      see within range regains a number of hit points equal to twice the
      necrotic damage you take.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 4th level or higher, the damage
      increases by [[/r 1d8]] for each slot level above 3rd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric, Wizard</div>
