  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You apply alchemical fluids or holy water
      to a contaminated humanoid creature while reciting an exacting magical
      chant that expels eldritch contaminants from the target's body. When you
      finish casting the spell, all <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination
      levels</a> and mutations are removed from the creature. It then gains one
      level of @condition[exhaustion] for each <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination
      level</a> removed with this spell.</p><div
      class="rd__spc-inline-post"></div></div>
