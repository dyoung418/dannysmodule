name: Burning Hands
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '220'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>As you hold your hands with thumbs
      touching and fingers spread, a thin sheet of flames shoots forth from your
      outstretched fingertips. Each creature in a 15-foot cone must make a
      Dexterity saving throw. A creature takes [[/r 3d6]] fire damage on a
      failed save, or half as much damage on a successful one.</p><div
      class="rd__spc-inline-post"></div><p>The fire ignites any flammable
      objects in the area that aren't being worn or carried.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, the damage increases by [[/r 1d6]] for each slot
      level above 1st.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
