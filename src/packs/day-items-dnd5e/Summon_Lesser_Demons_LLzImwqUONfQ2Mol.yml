name: Summon Lesser Demons
type: spell
system:
  source:
    custom: ''
    book: XGE
    page: '167'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You utter foul words, summoning demons
      from the chaos of the Abyss. Roll on the following table to determine what
      appears.</p><div class="rd__spc-inline-post"></div><table class="w-100
      rd__table  stripe-odd-table"><thead><tr><th class="col-1 ve-text-center"
      data-rd-isroller="true">[[/r d6]]</th><th class="col-11"
      data-rd-isroller="false">Demons Summoned</th></tr></thead><tbody><tr><td
      class="col-1 ve-text-center" data-roll-min="1"
      data-roll-max="2">1-2</td><td class="col-11">Two <a
      href="https://5etools-mirror-2.github.io/bestiary.html#blankhash,flstchallenge%20rating:min=&amp;0~max=&amp;1,flsttag:demon=1,flstmiscellaneous:swarm=2">demons
      of challenge rating 1 or lower</a></td></tr><tr><td class="col-1
      ve-text-center" data-roll-min="3" data-roll-max="4">3-4</td><td
      class="col-11">Four <a
      href="https://5etools-mirror-2.github.io/bestiary.html#blankhash,flstchallenge%20rating:min=&amp;0~max=&amp;1/2,flsttag:demon=1,flstmiscellaneous:swarm=2">demons
      of challenge rating 1/2 or lower</a></td></tr><tr><td class="col-1
      ve-text-center" data-roll-min="5" data-roll-max="6">5-6</td><td
      class="col-11">Eight <a
      href="https://5etools-mirror-2.github.io/bestiary.html#blankhash,flstchallenge%20rating:min=&amp;0~max=&amp;1/4,flsttag:demon=1,flstmiscellaneous:swarm=2">demons
      of challenge rating 1/4 or lower</a></td></tr></tbody></table><p>The DM
      chooses the demons, such as @creature[manes] or
      @creature[dretch||dretches], and you choose the unoccupied spaces you can
      see within range where they appear. A summoned demon disappears when it
      drops to 0 hit points or when the spell ends.</p><p>The demons are hostile
      to all creatures, including you. Roll initiative for the summoned demons
      as a group, which has its own turns. The demons pursue and attack the
      nearest non-demons to the best of their ability.</p><p>As part of casting
      the spell, you can form a circle on the ground with the blood used as a
      material component. The circle is large enough to encompass your space.
      While the spell lasts, the summoned demons can't cross the circle or harm
      it, and they can't target anyone within it. Using the material component
      in this manner consumes it when the spell ends.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      6th or 7th level, you summon twice as many demons. If you cast it using a
      spell slot of 8th or 9th level, you summon three times as many
      demons.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Warlock, Wizard</div>
