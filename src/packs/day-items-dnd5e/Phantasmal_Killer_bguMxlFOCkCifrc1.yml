name: Phantasmal Killer
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '265'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You tap into the nightmares of a creature
      you can see within range and create an illusory manifestation of its
      deepest fears, visible only to that creature. The target must make a
      Wisdom saving throw. On a failed save, the target becomes
      @condition[frightened] for the duration. At the end of each of the
      target's turns before the spell ends, the target must succeed on a Wisdom
      saving throw or take [[/r 4d10]] psychic damage. On a successful save, the
      spell ends.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      5th level or higher, the damage increases by [[/r 1d10]] for each slot
      level above 4th.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Wizard</div>
