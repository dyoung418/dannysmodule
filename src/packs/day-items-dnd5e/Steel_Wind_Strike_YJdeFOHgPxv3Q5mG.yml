  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You flourish the weapon used in the
      casting and then vanish to strike like the wind. Choose up to five
      creatures you can see within range. Make a melee spell attack against each
      target. On a hit, a target takes [[/r 6d10]] force damage.</p><div
      class="rd__spc-inline-post"></div><p>You can then teleport to an
      unoccupied space you can see within 5 feet of one of the targets you hit
      or missed.</p></div><div><span class="bold">Classes: </span>Ranger,
