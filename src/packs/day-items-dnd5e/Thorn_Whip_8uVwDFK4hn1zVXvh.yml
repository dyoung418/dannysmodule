  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a long, vine-like whip covered
      in thorns that lashes out at your command toward a creature in range. Make
      a melee spell attack against the target. If the attack hits, the creature
      takes [[/r 1d6]] piercing damage, and if the creature is Large or smaller,
      you pull the creature up to 10 feet closer to you.</p><div
      class="rd__spc-inline-post"></div><p>This spell's damage increases by [[/r
      1d6]] when you reach 5th level ([[/r 2d6]]), 11th level ([[/r 3d6]]), and
      17th level ([[/r 4d6]]).</p></div><div><span class="bold">Classes:
      </span>Artificer, Druid</div>
