  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You hurl a 4-inch-diameter sphere of
      energy at a creature that you can see within range. You choose acid, cold,
      fire, lightning, poison, or thunder for the type of orb you create, and
      then make a ranged spell attack against the target. If the attack hits,
      the creature takes [[/r 3d8]] damage of the type you chose.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 2nd level or higher, the damage
      increases by [[/r 1d8]] for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
