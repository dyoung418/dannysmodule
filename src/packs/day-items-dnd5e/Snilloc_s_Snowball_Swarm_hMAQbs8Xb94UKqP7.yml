  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A flurry of magic snowballs erupts from a
      point you choose within range. Each creature in a 5-foot-radius sphere
      centered on that point must make a Dexterity saving throw. A creature
      takes [[/r 3d6]] cold damage on a failed save, or half as much damage on a
      successful one.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      3rd level or higher, the damage increases by [[/r 1d6]] for each slot
      level above 2nd.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
