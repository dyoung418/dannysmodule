  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You manifest a ravine of gravitational
      energy in a line originating from you that is 100 feet long and 5 feet
      wide. Each creature in that line must make a Constitution saving throw,
      taking [[/r 8d8]] force damage on a failed save, or half as much damage on
      a successful one.</p><div class="rd__spc-inline-post"></div><p>Each
      creature within 10 feet of the line but not in it must succeed on a
      Constitution saving throw or take [[/r 8d8]] force damage and be pulled
      toward the line until the creature is in its area.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      7th level or higher, the damage increases by [[/r 1d8]] for each slot
      level above 6th.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
