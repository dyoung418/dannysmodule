    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A blast of cold air erupts from your
      hands. Each creature in a 60-foot cone must make a Constitution saving
      throw. A creature takes [[/r 8d8]] cold damage on a failed save, or half
      as much damage on a successful one.</p><div
      class="rd__spc-inline-post"></div><p>A creature killed by this spell
      becomes a frozen statue until it thaws.</p></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      6th level or higher, the damage increases by [[/r 1d8]] for each slot
      level above 5th.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
