name: Eyebite
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '238'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>For the spell's duration, your eyes become
      an inky void imbued with dread power. One creature of your choice within
      60 feet of you that you can see must succeed on a Wisdom saving throw or
      be affected by one of the following effects of your choice for the
      duration. On each of your turns until the spell ends, you can use your
      action to target another creature but can't target a creature again if it
      has succeeded on a saving throw against this casting of eyebite.</p><div
      class="rd__spc-inline-post"></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">Asleep.</span></span> <p>The target falls
      @condition[unconscious]. It wakes up if it takes any damage or if another
      creature uses its action to shake the sleeper awake.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="2"> <span
      class="entry-title-inner">Panicked.</span></span> <p>The target is
      @condition[frightened] of you. On each of its turns, the
      @condition[frightened] creature must take the @action[Dash] action and
      move away from you by the safest and shortest available route, unless
      there is nowhere to move. If the target moves to a place at least 60 feet
      away from you where it can no longer see you, this effect ends.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="3"> <span
      class="entry-title-inner">Sickened.</span></span> <p>The target has
      disadvantage on attack rolls and ability checks. At the end of each of its
      turns, it can make another Wisdom saving throw. If it succeeds, the effect
      ends.</p><div class="rd__spc-inline-post"></div></div></div><div><span
      class="bold">Classes: </span>Bard, Sorcerer, Warlock, Wizard</div>
