name: Dispel Magic
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '234'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Choose one creature, object, or magical
      effect within range. Any spell of 3rd level or lower on the target ends.
      For each spell of 4th level or higher on the target, make an ability check
      using your spellcasting ability. The DC equals 10 + the spell's level. On
      a successful check, the spell ends.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 4th level or higher, you
      automatically end the effects of a spell on the target if the spell's
      level is equal to or less than the level of the spell slot you
      used.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Bard, Cleric, Druid, Paladin, Sorcerer, Warlock,
      Wizard</div>
