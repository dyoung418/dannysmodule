    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You call forth a fiendish spirit. It
      manifests in an unoccupied space that you can see within range. This
      corporeal form uses the @creature[Fiendish Spirit|TCE] stat block. When
      you cast the spell, choose Demon, Devil, or Yugoloth. The creature
      resembles a fiend of the chosen type, which determines certain traits in
      its stat block. The creature disappears when it drops to 0 hit points or
      when the spell ends.</p><div class="rd__spc-inline-post"></div><p>The
      creature is an ally to you and your companions. In combat, the creature
      shares your initiative count, but it takes its turn immediately after
      yours. It obeys your verbal commands (no action required by you). If you
      don't issue any, it takes the @action[Dodge] action and uses its move to
      avoid danger.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 7th level or higher, use the higher level
      wherever the spell's level appears in the stat block.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
