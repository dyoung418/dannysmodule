  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You unleash a string of insults laced with
      subtle enchantments at a creature you can see within range. If the target
      can hear you (though it need not understand you), it must succeed on a
      Wisdom saving throw or take [[/r 1d4]] psychic damage and have
      disadvantage on the next attack roll it makes before the end of its next
      turn.</p><div class="rd__spc-inline-post"></div><p>This spell's damage
      increases by [[/r 1d4]] when you reach 5th level ([[/r 2d4]]), 11th level
      ([[/r 3d4]]), and 17th level ([[/r 4d4]]).</p></div><div><span
      class="bold">Classes: </span>Bard</div>
