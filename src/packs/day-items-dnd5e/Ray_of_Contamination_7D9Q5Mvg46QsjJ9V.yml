    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>When you cast this spell, you gain one <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">level of
      contamination</a>. An octarine ray springs from your pointing finger to a
      creature that you can see within range. The target must succeed on a
      Constitution saving throw. On a failed save, a creature takes [[/r 16d6]]
      necrotic damage and gains [[/r 1d4]] <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">levels of
      contamination</a>. On a successful save, a target takes half as much
      damage and does not gain any <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination
      levels</a>.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      7th level or higher, you can target one additional creature for each slot
      level above 6th. The creatures must be within 30 feet of each other when
      you target them.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
