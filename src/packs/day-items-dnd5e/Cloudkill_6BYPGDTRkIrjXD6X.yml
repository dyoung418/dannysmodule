name: Cloudkill
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '222'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a 20-foot-radius sphere of
      poisonous, yellow-green fog centered on a point you choose within range.
      The fog spreads around corners. It lasts for the duration or until strong
      wind disperses the fog, ending the spell. Its area is heavily
      obscured.</p><div class="rd__spc-inline-post"></div><p>When a creature
      enters the spell's area for the first time on a turn or starts its turn
      there, that creature must make a Constitution saving throw. The creature
      takes [[/r 5d8]] poison damage on a failed save, or half as much damage on
      a successful one. Creatures are affected even if they hold their breath or
      don't need to breathe.</p><p>The fog moves 10 feet away from you at the
      start of each of your turns, rolling along the surface of the ground. The
      vapors, being heavier than air, sink to the lowest level of the land, even
      pouring down openings.</p></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 6th level or higher, the damage
      increases by [[/r 1d8]] for each slot level above 5th.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
