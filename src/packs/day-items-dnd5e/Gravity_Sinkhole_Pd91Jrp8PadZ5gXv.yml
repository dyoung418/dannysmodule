    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A 20-foot-radius sphere of crushing force
      forms at a point you can see within range and tugs at the creatures there.
      Each creature in the sphere must make a Constitution saving throw. On a
      failed save, the creature takes [[/r 5d10]] force damage and is pulled in
      a straight line toward the center of the sphere, ending in an unoccupied
      space as close to the center as possible (even if that space is in the
      air). On a successful save, the creature takes half as much damage and
      isn't pulled.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      5th level or higher, the damage increases by [[/r 1d10]] for each slot
      level above 4th.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
