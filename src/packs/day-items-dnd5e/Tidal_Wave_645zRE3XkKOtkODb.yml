  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You conjure up a wave of water that
      crashes down on an area within range. The area can be up to 30 feet long,
      up to 10 feet wide, and up to 10 feet tall. Each creature in that area
      must make a Dexterity saving throw. On a failed save, a creature takes
      [[/r 4d8]] bludgeoning damage and is knocked @condition[prone]. On a
      successful save, a creature takes half as much damage and isn't knocked
      @condition[prone]. The water then spreads out across the ground in all
      directions, extinguishing unprotected flames in its area and within 30
      feet of it, and then it vanishes.</p><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Druid, Sorcerer, Wizard</div>
