  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a shard of ice and fling it at
      one creature within range. Make a ranged spell attack against the target.
      On a hit, the target takes [[/r 1d10]] piercing damage. Hit or miss, the
      shard then explodes. The target and each creature within 5 feet of it must
      succeed on a Dexterity saving throw or take [[/r 2d6]] cold
      damage.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, the cold damage increases by [[/r 1d6]] for each slot
      level above 1st.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Druid, Sorcerer, Wizard</div>
