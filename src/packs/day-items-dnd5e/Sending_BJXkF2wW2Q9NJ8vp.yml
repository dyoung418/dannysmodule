    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You send a short message of twenty-five
      words or less to a creature with which you are familiar. The creature
      hears the message in its mind, recognizes you as the sender if it knows
      you, and can answer in a like manner immediately. The spell enables
      creatures with Intelligence scores of at least 1 to understand the meaning
      of your message.</p><div class="rd__spc-inline-post"></div><p>You can send
      the message across any distance and even to other planes of existence, but
      if the target is on a different plane than you, there is a [[/r 1d100]]{5
      percent} chance that the message doesn't arrive.</p></div><div><span
      class="bold">Classes: </span>Bard, Cleric, Wizard</div>
