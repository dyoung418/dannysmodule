name: Ensnaring Strike
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '237'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>The next time you hit a creature with a
      weapon attack before this spell ends, a writhing mass of thorny vines
      appears at the point of impact, and the target must succeed on a Strength
      saving throw or be @condition[restrained] by the magical vines until the
      spell ends. A Large or larger creature has advantage on this saving throw.
      If the target succeeds on the save, the vines shrivel away.</p><div
      class="rd__spc-inline-post"></div><p>While @condition[restrained] by this
      spell, the target takes [[/r 1d6]] piercing damage at the start of each of
      its turns. A creature @condition[restrained] by the vines or one that can
      touch the creature can use its action to make a Strength check against
      your spell save DC. On a success, the target is freed.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>If you cast this spell using a spell slot of 2nd
      level or higher, the damage increases by [[/r 1d6]] for each slot level
      above 1st.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Ranger</div>
