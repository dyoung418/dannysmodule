  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a lash of lightning energy that
      strikes at one creature of your choice that you can see within 15 feet of
      you. The target must succeed on a Strength saving throw or be pulled up to
      10 feet in a straight line toward you and then take [[/r 1d8]] lightning
      damage if it is within 5 feet of you.</p><div
      class="rd__spc-inline-post"></div><p>This spell's damage increases by [[/r
      1d8]] when you reach 5th level ([[/r 2d8]]), 11th level ([[/r 3d8]]), and
      17th level ([[/r 4d8]]).</p></div><div><span class="bold">Classes:
      </span>Artificer, Sorcerer, Warlock, Wizard</div>
