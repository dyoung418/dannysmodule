name: Fireball
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '241'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A bright streak flashes from your pointing
      finger to a point you choose within range and then blossoms with a low
      roar into an explosion of flame. Each creature in a 20-foot-radius sphere
      centered on that point must make a Dexterity saving throw. A target takes
      [[/r 8d6]] fire damage on a failed save, or half as much damage on a
      successful one.</p><div class="rd__spc-inline-post"></div><p>The fire
      spreads around corners. It ignites flammable objects in the area that
      aren't being worn or carried.</p></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 4th level or higher, the damage
      increases by [[/r 1d6]] for each slot level above 3rd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
