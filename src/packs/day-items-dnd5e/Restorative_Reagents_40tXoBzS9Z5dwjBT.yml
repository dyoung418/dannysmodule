  description:
    value: >-
      <p><em>9th-level Alchemist feature</em></p><p>You can incorporate
      restorative reagents into some of your works:</p><p>Whenever a creature
      drinks an experimental elixir you created, the creature gains temporary
      hit points equal to 2d6 + your Intelligence modifier (minimum of 1
      temporary hit point).</p><p>You can cast lesser restoration without
      expending a spell slot and without preparing the spell, provided you use
      alchemist’s supplies as the spellcasting focus. You can do so a number of
      times equal to your Intelligence modifier (minimum of once), and you
      regain all expended uses when you finish a long rest.</p>
