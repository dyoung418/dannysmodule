name: Warp Bolt
type: spell
system:
  source:
    custom: ''
    book: DoDk
    page: '229'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>When you cast this spell, you gain one <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">level of
      contamination</a>. An arcing bolt of octarine lightning strikes a creature
      within range. If the target has one or more <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination
      levels</a>, it is hit automatically. Otherwise, make a ranged spell attack
      against that creature. On a hit, the target takes [[/r 6d6]] necrotic
      damage and gains one <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">level of
      contamination</a>.</p><div class="rd__spc-inline-post"></div><p>You can
      create a new bolt of lightning as your action on any turn until the spell
      ends.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 3rd level or higher, you can target 1
      additional creature for each spell level above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
