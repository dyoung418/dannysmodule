  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch a willing creature. The target
      gains a flying speed of 60 feet for the duration. When the spell ends, the
      target falls if it is still aloft, unless it can stop the fall.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 4th level or higher, you can
      target one additional creature for each slot level above 3rd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Sorcerer, Warlock, Wizard</div>
