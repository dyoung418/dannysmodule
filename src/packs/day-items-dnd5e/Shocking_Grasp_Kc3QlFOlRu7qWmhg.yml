    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Lightning springs from your hand to
      deliver a shock to a creature you try to touch. Make a melee spell attack
      against the target. You have advantage on the attack roll if the target is
      wearing armor made of metal. On a hit, the target takes [[/r 1d8]]
      lightning damage, and it can't take reactions until the start of its next
      turn.</p><div class="rd__spc-inline-post"></div><p>The spell's damage
      increases by [[/r 1d8]] when you reach 5th level ([[/r 2d8]]), 11th level
      ([[/r 3d8]]), and 17th level ([[/r 4d8]]).</p></div><div><span
      class="bold">Classes: </span>Artificer, Sorcerer, Wizard</div>
