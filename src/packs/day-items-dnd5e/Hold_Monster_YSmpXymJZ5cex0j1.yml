name: Hold Monster
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '251'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Choose a creature that you can see within
      range. The target must succeed on a Wisdom saving throw or be
      @condition[paralyzed] for the duration. This spell has no effect on
      undead. At the end of each of its turns, the target can make another
      Wisdom saving throw. On a success, the spell ends on the target.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 6th level or higher, you can
      target one additional creature for each slot level above 5th. The
      creatures must be within 30 feet of each other when you target
      them.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Sorcerer, Warlock, Wizard</div>
