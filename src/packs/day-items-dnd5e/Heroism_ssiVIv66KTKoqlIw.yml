  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A willing creature you touch is imbued
      with bravery. Until the spell ends, the creature is immune to being
      @condition[frightened] and gains temporary hit points equal to your
      spellcasting ability modifier at the start of each of its turns. When the
      spell ends, the target loses any remaining temporary hit points from this
      spell.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, you can target one additional creature for each slot
      level above 1st.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Paladin</div>
