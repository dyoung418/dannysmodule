name: Command
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '223'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You speak a one-word command to a creature
      you can see within range. The target must succeed on a Wisdom saving throw
      or follow the command on its next turn. The spell has no effect if the
      target is undead, if it doesn't understand your language, or if your
      command is directly harmful to it.</p><div
      class="rd__spc-inline-post"></div><p>Some typical commands and their
      effects follow. You might issue a command other than one described here.
      If you do so, the DM determines how the target behaves. If the target
      can't follow your command, the spell ends.</p><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">Approach.</span></span> <p>The target moves
      toward you by the shortest and most direct route, ending its turn if it
      moves within 5 feet of you.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="2"> <span
      class="entry-title-inner">Drop.</span></span> <p>The target drops whatever
      it is holding and then ends its turn.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="3"> <span
      class="entry-title-inner">Flee.</span></span> <p>The target spends its
      turn moving away from you by the fastest available means.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="4"> <span
      class="entry-title-inner">Grovel.</span></span> <p>The target falls
      @condition[prone] and then ends its turn.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="5"> <span
      class="entry-title-inner">Halt.</span></span> <p>The target doesn't move
      and takes no actions. A flying creature stays aloft, provided that it is
      able to do so. If it must move to stay aloft, it flies the minimum
      distance needed to remain in the air.</p><div
      class="rd__spc-inline-post"></div></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, you can affect one additional creature for each slot
      level above 1st. The creatures must be within 30 feet of each other when
      you target them.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric, Paladin</div>
