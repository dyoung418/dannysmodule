  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch a nonmagical weapon. Until the
      spell ends, that weapon becomes a magic weapon with a +1 bonus to attack
      rolls and damage rolls.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 4th level or higher, the bonus
      increases to +2. When you use a spell slot of 6th level or higher, the
      bonus increases to +3.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Paladin, Wizard</div>
