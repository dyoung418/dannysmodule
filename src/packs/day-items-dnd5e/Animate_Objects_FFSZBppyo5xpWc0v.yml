name: Animate Objects
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '213'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Objects come to life at your command.
      Choose up to ten nonmagical objects within range that are not being worn
      or carried. Medium targets count as two objects, Large targets count as
      four objects, Huge targets count as eight objects. You can't animate any
      object larger than Huge. Each target animates and becomes a creature under
      your control until the spell ends or until reduced to 0 hit
      points.</p><div class="rd__spc-inline-post"></div><p>As a bonus action,
      you can mentally command any creature you made with this spell if the
      creature is within 500 feet of you (if you control multiple creatures, you
      can command any or all of them at the same time, issuing the same command
      to each one). You decide what action the creature will take and where it
      will move during its next turn, or you can issue a general command, such
      as to guard a particular chamber or corridor. If you issue no commands,
      the creature only defends itself against hostile creatures. Once given an
      order, the creature continues to follow it until its task is
      complete.</p><table class="w-100 rd__table 
      stripe-odd-table"><caption>Animated Object
      Statistics</caption><thead><tr><th class="col-2"
      data-rd-isroller="false">Size</th><th class="col-1 ve-text-center"
      data-rd-isroller="false">HP</th><th class="col-1 ve-text-center"
      data-rd-isroller="false">AC</th><th class="col-6"
      data-rd-isroller="false">Attack</th><th class="col-1 ve-text-center"
      data-rd-isroller="false">Str</th><th class="col-1 ve-text-center"
      data-rd-isroller="false">Dex</th></tr></thead><tbody><tr><td
      class="col-2">@creature[animated object (tiny)|phb|Tiny]</td><td
      class="col-1 ve-text-center">20</td><td class="col-1
      ve-text-center">18</td><td class="col-6">[[/r 1d20+8]]{+8} to hit, [[/r
      1d4 + 4]] damage</td><td class="col-1 ve-text-center">[[/r 1d20 -
      3]]{4}</td><td class="col-1 ve-text-center">[[/r 1d20 +
      4]]{18}</td></tr><tr><td class="col-2">@creature[animated object
      (small)|phb|Small]</td><td class="col-1 ve-text-center">25</td><td
      class="col-1 ve-text-center">16</td><td class="col-6">[[/r 1d20+6]]{+6} to
      hit, [[/r 1d8 + 2]] damage</td><td class="col-1 ve-text-center">[[/r 1d20
      - 2]]{6}</td><td class="col-1 ve-text-center">[[/r 1d20 +
      2]]{14}</td></tr><tr><td class="col-2">@creature[animated object
      (medium)|phb|Medium]</td><td class="col-1 ve-text-center">40</td><td
      class="col-1 ve-text-center">13</td><td class="col-6">[[/r 1d20+5]]{+5} to
      hit, [[/r 2d6 + 1]] damage</td><td class="col-1 ve-text-center">[[/r
      1d20]]{10}</td><td class="col-1 ve-text-center">[[/r 1d20 +
      1]]{12}</td></tr><tr><td class="col-2">@creature[animated object
      (large)|phb|Large]</td><td class="col-1 ve-text-center">50</td><td
      class="col-1 ve-text-center">10</td><td class="col-6">[[/r 1d20+6]]{+6} to
      hit, [[/r 2d10 + 2]] damage</td><td class="col-1 ve-text-center">[[/r 1d20
      + 2]]{14}</td><td class="col-1 ve-text-center">[[/r
      1d20]]{10}</td></tr><tr><td class="col-2">@creature[animated object
      (huge)|phb|Huge]</td><td class="col-1 ve-text-center">80</td><td
      class="col-1 ve-text-center">10</td><td class="col-6">[[/r 1d20+8]]{+8} to
      hit, [[/r 2d12 + 4]] damage</td><td class="col-1 ve-text-center">[[/r 1d20
      + 4]]{18}</td><td class="col-1 ve-text-center">[[/r 1d20 -
      3]]{6}</td></tr></tbody></table><p>An animated object is a construct with
      AC, hit points, attacks, Strength, and Dexterity determined by its size.
      Its Constitution is 10 and its Intelligence and Wisdom are 3, and its
      Charisma is 1. Its speed is 30 feet; if the object lacks legs or other
      appendages it can use for locomotion, it instead has a flying speed of 30
      feet and can hover. If the object is securely attached to a surface or a
      larger object, such as a chain bolted to a wall, its speed is 0. It has
      blindsight with a radius of 30 feet and is blind beyond that distance.
      When the animated object drops to 0 hit points, it reverts to its original
      object form, and any remaining damage carries over to its original object
      form.</p><p>If you command an object to attack, it can make a single melee
      attack against a creature within 5 feet of it. It makes a slam attack with
      an attack bonus and bludgeoning damage determined by its size. The DM
      might rule that a specific object inflicts slashing or piercing damage
      based on its form.</p></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>If you
      cast this spell using a spell slot of 6th level or higher, you can animate
      two additional objects for each slot level above 5th.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Bard, Sorcerer, Wizard</div>
