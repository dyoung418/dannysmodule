    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A stroke of lightning forming a line 100
      feet long and 5 feet wide blasts out from you in a direction you choose.
      Each creature in the line must make a Dexterity saving throw. A creature
      takes [[/r 8d6]] lightning damage on a failed save, or half as much damage
      on a successful one.</p><div class="rd__spc-inline-post"></div><p>The
      lightning ignites flammable objects in the area that aren't being worn or
      carried.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 4th level or higher, the damage increases
      by [[/r 1d6]] for each slot level above 3rd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
