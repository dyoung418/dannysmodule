    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a twisting pattern of colors
      that weaves through the air inside a 30-foot cube within range. The
      pattern appears for a moment and vanishes. Each creature in the area who
      sees the pattern must make a Wisdom saving throw. On a failed save, the
      creature becomes @condition[charmed] for the duration. While
      @condition[charmed] by this spell, the creature is
      @condition[incapacitated] and has a speed of 0.</p><div
      class="rd__spc-inline-post"></div><p>The spell ends for an affected
      creature if it takes any damage or if someone else uses an action to shake
      the creature out of its stupor.</p></div><div><span class="bold">Classes:
      </span>Bard, Sorcerer, Warlock, Wizard</div>
