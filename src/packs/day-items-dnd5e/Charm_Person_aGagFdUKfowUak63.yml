name: Charm Person
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '221'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You attempt to charm a humanoid you can
      see within range. It must make a Wisdom saving throw, and does so with
      advantage if you or your companions are fighting it. If it fails the
      saving throw, it is @condition[charmed] by you until the spell ends or
      until you or your companions do anything harmful to it. The
      @condition[charmed] creature regards you as a friendly acquaintance. When
      the spell ends, the creature knows it was @condition[charmed] by
      you.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, you can target one additional creature for each slot
      level above 1st. The creatures must be within 30 feet of each other when
      you target them.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Druid, Sorcerer, Warlock, Wizard</div>
