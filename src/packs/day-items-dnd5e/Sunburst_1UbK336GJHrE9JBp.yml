  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Brilliant sunlight flashes in a 60-foot
      radius centered on a point you choose within range. Each creature in that
      light must make a Constitution saving throw. On a failed save, a creature
      takes [[/r 12d6]] radiant damage and is @condition[blinded] for 1 minute.
      On a successful save, it takes half as much damage and isn't
      @condition[blinded] by this spell. Undead and oozes have disadvantage on
      this saving throw.</p><div class="rd__spc-inline-post"></div><p>A creature
      @condition[blinded] by this spell makes another Constitution saving throw
      at the end of each of its turns. On a successful save, it is no longer
      @condition[blinded].</p><p>This spell dispels any darkness in its area
      that was created by a spell.</p></div><div><span class="bold">Classes:
      </span>Druid, Sorcerer, Wizard</div>
