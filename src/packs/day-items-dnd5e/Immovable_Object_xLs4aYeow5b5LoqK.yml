name: Immovable Object
type: spell
system:
  source:
    custom: ''
    book: EGW
    page: '187'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch an object that weighs no more
      than 10 pounds and cause it to become magically fixed in place. You and
      the creatures you designate when you cast this spell can move the object
      normally. You can also set a password that, when spoken within 5 feet of
      the object, suppresses this spell for 1 minute.</p><div
      class="rd__spc-inline-post"></div><p>If the object is fixed in the air, it
      can hold up to 4,000 pounds of weight. More weight causes the object to
      fall. Otherwise, a creature can use an action to make a Strength check
      against your spell save DC. On a success, the creature can move the object
      up to 10 feet.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>If you cast
      this spell using a spell slot of 4th or 5th level, the DC to move the
      object increases by 5, it can carry up to 8,000 pounds of weight, and the
      duration increases to 24 hours. If you cast this spell using a spell slot
      of 6th level or higher, the DC to move the object increases by 10, it can
      carry up to 20,000 pounds of weight, and the effect is permanent until
      dispelled.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
