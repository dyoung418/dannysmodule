  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You point your finger, and the creature
      that damaged you is momentarily surrounded by hellish flames. The creature
      must make a Dexterity saving throw. It takes [[/r 2d10]] fire damage on a
      failed save, or half as much damage on a successful one.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 2nd level or higher, the damage
      increases by [[/r 1d10]] for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Warlock</div>
