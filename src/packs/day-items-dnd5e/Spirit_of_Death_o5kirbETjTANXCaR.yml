name: Spirit of Death
type: spell
system:
  source:
    custom: ''
    book: BMT
    page: '50'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You call forth a spirit that embodies
      death. The spirit manifests in an unoccupied space you can see within
      range and uses the @creature[reaper spirit|BMT] stat block. The spirit
      disappears when it is reduced to 0 hit points or when the spell
      ends.</p><div class="rd__spc-inline-post"></div><p>The spirit is an ally
      to you and your companions. In combat, the spirit shares your initiative
      count and takes its turn immediately after yours. It obeys your verbal
      commands (no action required by you). If you don't issue the spirit any
      commands, it takes the @action[Dodge] action and uses its movement to
      avoid danger.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 5th level or higher, use the higher level
      wherever the spell's level appears in the reaper spirit stat
      block.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
