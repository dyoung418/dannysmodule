    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You target the triggering creature, which
      must succeed on a Wisdom saving throw or vanish, being thrown to another
      point in time and causing the attack to miss or the spell to be wasted. At
      the start of its next turn, the target reappears where it was or in the
      closest unoccupied space. The target doesn't remember you casting the
      spell or being affected by it.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 6th level or higher, you can
      target one additional creature for each slot level above 5th. All targets
      must be within 30 feet of each other.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
