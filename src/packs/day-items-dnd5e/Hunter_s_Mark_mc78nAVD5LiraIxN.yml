name: Hunter's Mark
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '251'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You choose a creature you can see within
      range and mystically mark it as your quarry. Until the spell ends, you
      deal an extra [[/r 1d6]] damage to the target whenever you hit it with a
      weapon attack, and you have advantage on any Wisdom (@skill[Perception])
      or Wisdom (@skill[Survival]) check you make to find it. If the target
      drops to 0 hit points before this spell ends, you can use a bonus action
      on a subsequent turn of yours to mark a new creature.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd or 4th level, you can
      maintain your @status[concentration] on the spell for up to 8 hours. When
      you use a spell slot of 5th level or higher, you can maintain your
      @status[concentration] on the spell for up to 24 hours.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Ranger</div>
