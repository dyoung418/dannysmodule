    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You shatter the barriers between realities
      and timelines, thrusting a creature into turmoil and madness. The target
      must succeed on a Wisdom saving throw, or it can't take reactions until
      the spell ends. The affected target must also roll a [[/r d10]] at the
      start of each of its turns; the number rolled determines what happens to
      the target, as shown on the Reality Break Effects table.</p><div
      class="rd__spc-inline-post"></div><p>At the end of each of its turns, the
      affected target can repeat the Wisdom saving throw, ending the spell on
      itself on a success.</p><table class="w-100 rd__table 
      stripe-odd-table"><caption>Reality Break Effects</caption><thead><tr><th
      class="col-2 ve-text-center" data-rd-isroller="true">[[/r d10]]</th><th
      class="col-10"
      data-rd-isroller="false">Effect</th></tr></thead><tbody><tr><td
      class="col-2 ve-text-center" data-roll-min="1"
      data-roll-max="2">1-2</td><td class="col-10"><b>Vision of the Far
      Realm.</b> The target takes [[/r 6d12]] psychic damage, and it is
      @condition[stunned] until the end of the turn.</td></tr><tr><td
      class="col-2 ve-text-center" data-roll-min="3"
      data-roll-max="5">3-5</td><td class="col-10"><b>Rending Rift.</b> The
      target must make a Dexterity saving throw, taking [[/r 8d12]] force damage
      on a failed save, or half as much damage on a successful
      one.</td></tr><tr><td class="col-2 ve-text-center" data-roll-min="6"
      data-roll-max="8">6-8</td><td class="col-10"><b>Wormhole.</b> The target
      is teleported, along with everything it is wearing and carrying, up to 30
      feet to an unoccupied space of your choice that you can see. The target
      also takes [[/r 10d12]] force damage and is knocked
      @condition[prone].</td></tr><tr><td class="col-2 ve-text-center"
      data-roll-min="9" data-roll-max="10">9-10</td><td class="col-10"><b>Chill
      of the Dark Void.</b> The target takes [[/r 10d12]] cold damage, and it is
      @condition[blinded] until the end of the
      turn.</td></tr></tbody></table></div>
