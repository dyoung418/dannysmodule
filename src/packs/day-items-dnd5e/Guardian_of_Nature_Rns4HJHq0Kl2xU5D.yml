name: Guardian of Nature
type: spell
system:
  source:
    custom: ''
    book: XGE
    page: '157'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A nature spirit answers your call and
      transforms you into a powerful guardian. The transformation lasts until
      the spell ends. You choose one of the following forms to assume: Primal
      Beast or Great Tree.</p><div class="rd__spc-inline-post"></div><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">Primal Beast.</span></span> <p>Bestial fur
      covers your body, your facial features become feral, and you gain the
      following benefits:</p><div class="rd__spc-inline-post"></div></div><ul
      class="rd__list"><li class="rd__li ">Your walking speed increases by 10
      feet.</li><li class="rd__li ">You gain @sense[darkvision] with a range of
      120 feet.</li><li class="rd__li ">You make Strength-based attack rolls
      with advantage.</li><li class="rd__li ">Your melee weapon attacks deal an
      extra [[/r 1d6]] force damage on a hit.</li></ul><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="2"> <span
      class="entry-title-inner">Great Tree.</span></span> <p>Your skin appears
      barky, leaves sprout from your hair, and you gain the following
      benefits:</p><div class="rd__spc-inline-post"></div></div><ul
      class="rd__list"><li class="rd__li ">You gain 10 temporary hit
      points.</li><li class="rd__li ">You make Constitution saving throws with
      advantage.</li><li class="rd__li ">You make Dexterity- and Wisdom-based
      attack rolls with advantage.</li><li class="rd__li ">While you are on the
      ground, the ground within 15 feet of you is difficult terrain for your
      enemies.</li></ul></div><div><span class="bold">Classes: </span>Druid,
      Ranger</div>
