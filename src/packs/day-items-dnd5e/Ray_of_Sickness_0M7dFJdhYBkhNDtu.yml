    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A ray of sickening greenish energy lashes
      out toward a creature within range. Make a ranged spell attack against the
      target. On a hit, the target takes [[/r 2d8]] poison damage and must make
      a Constitution saving throw. On a failed save, it is also
      @condition[poisoned] until the end of your next turn.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 2nd level or higher, the damage
      increases by [[/r 1d8]] for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
