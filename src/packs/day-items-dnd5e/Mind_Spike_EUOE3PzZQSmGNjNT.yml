name: Mind Spike
type: spell
system:
  source:
    custom: ''
    book: XGE
    page: '162'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You reach into the mind of one creature
      you can see within range. The target must make a Wisdom saving throw,
      taking [[/r 3d8]] psychic damage on a failed save, or half as much damage
      on a successful one. On a failed save, you also always know the target's
      location until the spell ends, but only while the two of you are on the
      same plane of existence. While you have this knowledge, the target can't
      become hidden from you, and if it's @condition[invisible], it gains no
      benefit from that condition against you.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd level or higher, the damage
      increases by [[/r 1d8]] for each slot level above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Warlock, Wizard</div>
