name: Banishment
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '217'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You attempt to send one creature that you
      can see within range to another plane of existence. The target must
      succeed on a Charisma saving throw or be banished.</p><div
      class="rd__spc-inline-post"></div><p>If the target is native to the plane
      of existence you're on, you banish the target to a harmless demiplane.
      While there, the target is @condition[incapacitated]. The target remains
      there until the spell ends, at which point the target reappears in the
      space it left or in the nearest unoccupied space if that space is
      occupied.</p><p>If the target is native to a different plane of existence
      than the one you're on, the target is banished with a faint popping noise,
      returning to its home plane. If the spell ends before 1 minute has passed,
      the target reappears in the space it left or in the nearest unoccupied
      space if that space is occupied. Otherwise, the target doesn't
      return.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 5th level or higher, you can target one
      additional creature for each slot level above 4th.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric, Paladin, Sorcerer, Warlock, Wizard</div>
