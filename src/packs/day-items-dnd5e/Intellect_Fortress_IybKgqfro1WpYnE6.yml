      Levels.</span></span> <p>When you cast this spell using a spell slot of
      4th level or higher, you can target one additional creature for each slot
      level above 3rd. The creatures must be within 30 feet of each other when
      you target them.</p><div class="rd__spc-inline-post"></div></div><div
