    value: >-
      <p>3rd-level Echo Knight feature</p><p>You can heighten your echo's fury.
      Whenever you take the @action[Attack] action, you can make one additional
      melee attack from the echo's position.</p><p>You can use this feature a
      number of times equal to your Constitution modifier (a minimum of once).
      You regain all expended uses when you finish a long rest.</p>
