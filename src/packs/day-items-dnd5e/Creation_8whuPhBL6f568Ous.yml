  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You pull wisps of shadow material from the
      Shadowfell to create a nonliving object of vegetable matter within range:
      soft goods, rope, wood, or something similar. You can also use this spell
      to create mineral objects such as stone, crystal, or metal. The object
      created must be no larger than a 5-foot cube, and the object must be of a
      form and material that you have seen before.</p><div
      class="rd__spc-inline-post"></div><p>The duration depends on the object's
      material. If the object is composed of multiple materials, use the
      shortest duration.</p><table class="w-100 rd__table 
      stripe-odd-table"><caption>Creation</caption><thead><tr><th class="col-8"
      data-rd-isroller="false">Material</th><th class="col-4"
      data-rd-isroller="false">Duration</th></tr></thead><tbody><tr><td
      class="col-8">Vegetable matter</td><td class="col-4">1
      day</td></tr><tr><td class="col-8">Stone or crystal</td><td
      class="col-4">12 hours</td></tr><tr><td class="col-8">Precious
      metals</td><td class="col-4">1 hour</td></tr><tr><td
      class="col-8">Gems</td><td class="col-4">10 minutes</td></tr><tr><td
      class="col-8">Adamantine or mithral</td><td class="col-4">1
      minute</td></tr></tbody></table><p>Using any material created by this
      spell as another spell's material component causes that spell to
      fail.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 6th level or higher, the cube increases
      by 5 feet for each slot level above 5th.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Sorcerer, Wizard</div>
