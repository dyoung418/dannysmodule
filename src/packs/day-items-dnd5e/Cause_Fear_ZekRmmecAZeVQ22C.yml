name: Cause Fear
type: spell
system:
  source:
    custom: ''
    book: XGE
    page: '151'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You awaken the sense of mortality in one
      creature you can see within range. A construct or an undead is immune to
      this effect. The target must succeed on a Wisdom saving throw or become
      @condition[frightened] of you until the spell ends. The
      @condition[frightened] target can repeat the saving throw at the end of
      each of its turns, ending the effect on itself on a success.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 2nd level or higher, you can
      target one additional creature for each slot level above 1st. The
      creatures must be within 30 feet of each other when you target
      them.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Warlock, Wizard</div>
