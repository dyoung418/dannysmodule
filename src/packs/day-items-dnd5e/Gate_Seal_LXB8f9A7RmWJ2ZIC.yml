  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You fortify the fabric of the planes in a
      30-foot cube you can see within range. Within that area, portals close and
      can't be opened for the duration. Spells and other effects that allow
      planar travel or open portals, such as @spell[gate] or @spell[plane
      shift], fail if used to enter or leave the area. The cube is
      stationary.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      6th level or higher, the spell lasts until dispelled.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Warlock, Wizard</div>
