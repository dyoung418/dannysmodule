name: Create Bonfire
type: spell
system:
  source:
    custom: ''
    book: XGE
    page: '152'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a bonfire on ground that you
      can see within range. Until the spell ends, the magic bonfire fills a
      5-foot cube. Any creature in the bonfire's space when you cast the spell
      must succeed on a Dexterity saving throw or take [[/r 1d8]] fire damage. A
      creature must also make the saving throw when it moves into the bonfire's
      space for the first time on a turn or ends its turn there.</p><div
      class="rd__spc-inline-post"></div><p>The bonfire ignites flammable objects
      in its area that aren't being worn or carried.</p><p>The spell's damage
      increases by [[/r 1d8]] when you reach 5th level ([[/r 2d8]]), 11th level
      ([[/r 3d8]]), and 17th level ([[/r 4d8]]).</p></div><div><span
      class="bold">Classes: </span>Artificer, Druid, Sorcerer, Warlock,
      Wizard</div>
