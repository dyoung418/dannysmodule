name: Storm of Vengeance
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '279'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A churning storm cloud forms, centered on
      a point you can see and spreading to a radius of 360 feet. Lightning
      flashes in the area, thunder booms, and strong winds roar. Each creature
      under the cloud (no more than 5,000 feet beneath the cloud) when it
      appears must make a Constitution saving throw. On a failed save, a
      creature takes [[/r 2d6]] thunder damage and becomes @condition[deafened]
      for 5 minutes.</p><div class="rd__spc-inline-post"></div><p>Each round you
      maintain @status[concentration] on this spell, the storm produces
      different effects on your turn.</p><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">Round 2.</span></span> <p>Acidic rain falls from
      the cloud. Each creature and object under the cloud takes [[/r 1d6]] acid
      damage.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="2"> <span
      class="entry-title-inner">Round 3.</span></span> <p>You call six bolts of
      lightning from the cloud to strike six creatures or objects of your choice
      beneath the cloud. A given creature or object can't be struck by more than
      one bolt. A struck creature must make a Dexterity saving throw. The
      creature takes [[/r 10d6]] lightning damage on a failed save, or half as
      much damage on a successful one.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="3"> <span
      class="entry-title-inner">Round 4.</span></span> <p>Hailstones rain down
      from the cloud. Each creature under the cloud takes [[/r 2d6]] bludgeoning
      damage.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="4"> <span
      class="entry-title-inner">Round 5–10.</span></span> <p>Gusts and freezing
      rain assail the area under the cloud. The area becomes difficult terrain
      and is heavily obscured. Each creature there takes [[/r 1d6]] cold damage.
      Ranged weapon attacks in the area are impossible. The wind and rain count
      as a severe distraction for the purposes of maintaining
      @status[concentration] on spells. Finally, gusts of strong wind (ranging
      from 20 to 50 miles per hour) automatically disperse fog, mists, and
      similar phenomena in the area, whether mundane or magical.</p><div
      class="rd__spc-inline-post"></div></div></div><div><span
      class="bold">Classes: </span>Druid</div>
