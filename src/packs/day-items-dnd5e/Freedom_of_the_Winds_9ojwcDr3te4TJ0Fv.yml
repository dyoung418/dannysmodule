    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Wind wraps around your body, tugging at
      your hair and clothing as your feet lift off the ground. You gain a flying
      speed of 60 feet. Additionally, you have advantage on ability checks to
      avoid being @condition[grappled], and on saving throws against being
      @condition[restrained] or @condition[paralyzed].</p><div
      class="rd__spc-inline-post"></div><p>When you are targeted by a spell or
      attack while this spell is in effect, you can use a reaction to teleport
      up to 60 feet to an unoccupied space you can see. If this movement takes
      you out of range of the triggering spell or attack, you are unaffected by
      it. This spell then ends when you reappear.</p></div><div><span
      class="bold">Classes: </span>Druid, Ranger, Sorcerer</div>
