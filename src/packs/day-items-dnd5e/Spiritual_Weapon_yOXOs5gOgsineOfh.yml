name: Spiritual Weapon
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '278'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a floating, spectral weapon
      within range that lasts for the duration or until you cast this spell
      again. When you cast the spell, you can make a melee spell attack against
      a creature within 5 feet of the weapon. On a hit, the target takes force
      damage equal to [[/r 1d8]] + your spellcasting ability modifier.</p><div
      class="rd__spc-inline-post"></div><p>As a bonus action on your turn, you
      can move the weapon up to 20 feet and repeat the attack against a creature
      within 5 feet of it.</p><p>The weapon can take whatever form you choose.
      Clerics of deities who are associated with a particular weapon (as St.
      Cuthbert is known for his mace and Thor for his hammer) make this spell's
      effect resemble that weapon.</p></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd level or higher, the damage
      increases by [[/r 1d8]] for every two slot levels above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric</div>
