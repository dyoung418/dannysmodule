      hit, the target takes [[/r 1d10]] fire damage. A flammable object hit by
      this spell ignites if it isn't being worn or carried.</p><div
      class="rd__spc-inline-post"></div><p>This spell's damage increases by [[/r
      1d10]] when you reach 5th level ([[/r 2d10]]), 11th level ([[/r 3d10]]),
      and 17th level ([[/r 4d10]]).</p></div><div><span class="bold">Classes:
