name: Erupting Earth
type: spell
system:
  source:
    custom: ''
    book: XGE
    page: '155'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Choose a point you can see on the ground
      within range. A fountain of churned earth and stone erupts in a 20-foot
      cube centered on that point. Each creature in that area must make a
      Dexterity saving throw. A creature takes [[/r 3d12]] bludgeoning damage on
      a failed save, or half as much damage on a successful one. Additionally,
      the ground in that area becomes difficult terrain until cleared. Each
      5-foot-square portion of the area requires at least 1 minute to clear by
      hand.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      4th level or higher, the damage increases by [[/r 1d12]] for each slot
      level above 3rd.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Druid, Sorcerer, Wizard</div>
