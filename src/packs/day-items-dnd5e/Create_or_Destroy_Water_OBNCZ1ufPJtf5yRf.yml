name: Create or Destroy Water
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '229'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You either create or destroy
      water.</p><div class="rd__spc-inline-post"></div><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">Create Water.</span></span> <p>You create up to
      10 gallons of clean water within range in an open container.
      Alternatively, the water falls as rain in a 30-foot cube within range,
      extinguishing exposed flames in the area.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="2"> <span
      class="entry-title-inner">Destroy Water.</span></span> <p>You destroy up
      to 10 gallons of water in an open container within range. Alternatively,
      you destroy fog in a 30-foot cube within range.</p><div
      class="rd__spc-inline-post"></div></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, you create or destroy 10 additional gallons of water,
      or the size of the cube increases by 5 feet, for each slot level above
      1st.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric, Druid</div>
