    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create intense pressure, unleash it in
      a 30-foot cone, and decide whether the pressure pulls or pushes creatures
      and objects. Each creature in that cone must make a Constitution saving
      throw. A creature takes [[/r 6d6]] force damage on a failed save, or half
      as much damage on a successful one. And every creature that fails the save
      is either pulled 15 feet toward you or pushed 15 feet away from you,
      depending on the choice you made for the spell.</p><div
      class="rd__spc-inline-post"></div><p>In addition, unsecured objects that
      are completely within the cone are likewise pulled or pushed 15
      feet.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 4th level or higher, the damage increases
      by [[/r 1d6]] and the distance pulled or pushed increases by 5 feet for
      each slot level above 3rd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
