name: Heat Metal
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '250'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Choose a manufactured metal object, such
      as a metal weapon or a suit of heavy or medium metal armor, that you can
      see within range. You cause the object to glow red-hot. Any creature in
      physical contact with the object takes [[/r 2d8]] fire damage when you
      cast the spell. Until the spell ends, you can use a bonus action on each
      of your subsequent turns to cause this damage again.</p><div
      class="rd__spc-inline-post"></div><p>If a creature is holding or wearing
      the object and takes the damage from it, the creature must succeed on a
      Constitution saving throw or drop the object if it can. If it doesn't drop
      the object, it has disadvantage on attack rolls and ability checks until
      the start of your next turn.</p></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd level or higher, the damage
      increases by [[/r 1d8]] for each slot level above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Bard, Druid</div>
