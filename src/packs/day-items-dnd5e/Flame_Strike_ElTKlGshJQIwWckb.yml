  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A vertical column of divine fire roars
      down from the heavens in a location you specify. Each creature in a
      10-foot-radius, 40-foot-high cylinder centered on a point within range
      must make a Dexterity saving throw. A creature takes [[/r 4d6]] fire
      damage and [[/r 4d6]] radiant damage on a failed save, or half as much
      damage on a successful one.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 6th level or higher, the fire
      damage or the radiant damage (your choice) increases by [[/r 1d6]] for
      each slot level above 5th.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric</div>
