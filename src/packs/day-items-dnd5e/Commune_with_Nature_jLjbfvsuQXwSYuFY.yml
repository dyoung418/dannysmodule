name: Commune with Nature
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '224'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You briefly become one with nature and
      gain knowledge of the surrounding territory. In the outdoors, the spell
      gives you knowledge of the land within 3 miles of you. In caves and other
      natural underground settings, the radius is limited to 300 feet. The spell
      doesn't function where nature has been replaced by construction, such as
      in dungeons and towns.</p><div class="rd__spc-inline-post"></div><p>You
      instantly gain knowledge of up to three facts of your choice about any of
      the following subjects as they relate to the area:</p><ul
      class="rd__list"><li class="rd__li ">terrain and bodies of water</li><li
      class="rd__li ">prevalent plants, minerals, animals, or peoples</li><li
      class="rd__li ">powerful celestials, fey, fiends, elementals, or
      undead</li><li class="rd__li ">influence from other planes of
      existence</li><li class="rd__li ">buildings</li></ul><p>For example, you
      could determine the location of powerful undead in the area, the location
      of major sources of safe drinking water, and the location of any nearby
      towns.</p></div><div><span class="bold">Classes: </span>Druid,
      Ranger</div>
