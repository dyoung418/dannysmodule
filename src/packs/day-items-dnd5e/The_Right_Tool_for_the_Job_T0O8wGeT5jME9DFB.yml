  description:
    value: >-
      <p><span style="font-family:Signika, sans-serif">3rd-level artificer
      feature</span></p><p
      style="box-sizing:border-box;user-select:text;margin:0.5em
      0px;color:rgb(25, 24, 19);font-family:Signika,
      sans-serif;font-size:13px;font-style:normal;font-variant-ligatures:normal;font-variant-caps:normal;font-weight:400;letter-spacing:normal;orphans:2;text-indent:0px;text-transform:none;widows:2;word-spacing:0px;-webkit-text-stroke-width:0px;white-space:normal;text-decoration-thickness:initial;text-decoration-style:initial;text-decoration-color:initial;text-align:start"><span
      style="font-family:Signika, sans-serif">You’ve learned how to produce
      exactly the tool you need: with thieves’ tools or artisan’s tools in hand,
      you can magically create one set of artisan’s tools in an unoccupied space
      within 5 feet of you. This creation requires 1 hour of uninterrupted work,
      which can coincide with a short or long rest. Though the product of magic,
      the tools are nonmagical, and they vanish when you use this feature
      again.</span></p>
