name: Manifest Echo
type: feat
_id: nDuf73RJK52UHCIs
img: systems/dnd5e/icons/svg/items/feature.svg
system:
  description:
    value: >-
      <p>You can use a bonus action to magically manifest an echo of yourself in
      an unoccupied space you can see within 15 feet of you. This echo is a
      magical, translucent, gray image of you that lasts until it is destroyed,
      until you dismiss it as a bonus action, until you manifest another echo,
      or until you’re incapacitated.</p><p>Your echo has AC 14 + your
      proficiency bonus, 1 hit point, and immunity to all conditions. If it has
      to make a saving throw, it uses your saving throw bonus for the roll. It
      is the same size as you, and it occupies its space. On your turn, you can
      mentally command the echo to move up to 30 feet in any direction (no
      action required). If your echo is ever more than 30 feet from you at the
      end of your turn, it is destroyed.</p><p>You can use the echo in the
      following ways:</p><p>As a bonus action, you can teleport, magically
      swapping places with your echo at a cost of 15 feet of your movement,
      regardless of the distance between the two of you.</p><p>When you take the
      Attack action on your turn, any attack you make with that action can
      originate from your space or the echo’s space. You make this choice for
      each attack.</p><p>When a creature that you can see within 5 feet of your
      echo moves at least 5 feet away from it, you can use your reaction to make
      an opportunity attack against that creature as if you were in the echo’s
      space.</p>
    chat: >-
      <p>Bonus Action: manifest an echo w/in 15ft.  Echo has 14+your
      proficiency, 1 HP, immunity to all conditions.  The echo uses your saving
      throw modifiers.</p><p>On your turn, you can mentally command the echo to
      move up to 30 ft (no action required).</p><p>You can use the echo in the
      following ways</p><ul><li><p>Bonus Action: teleport to swap places with
      your echo at cost of 15ft movement</p></li><li><p>On Attack Action, make
      the attack originate from your echo</p></li><li><p>If a creature near your
      echo triggers an opportunity attack, use your reaction to make the
      opportunity attack against that creature from your echo</p></li></ul>
