    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You invoke the power of Hadar, the Dark
      Hunger. Tendrils of dark energy erupt from you and batter all creatures
      within 10 feet of you. Each creature in that area must make a Strength
      saving throw. On a failed save, a target takes [[/r 2d6]] necrotic damage
      and can't take reactions until its next turn. On a successful save, the
      creature takes half damage, but suffers no other effect.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 2nd level or higher, the damage
      increases by [[/r 1d6]] for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Warlock</div>
