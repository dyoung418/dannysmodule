  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create three glowing darts of magical
      force. Each dart hits a creature of your choice that you can see within
      range. A dart deals [[/r 1d4 + 1]] force damage to its target. The darts
      all strike simultaneously, and you can direct them to hit one creature or
      several.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, the spell creates one more dart for each slot level
      above 1st.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
