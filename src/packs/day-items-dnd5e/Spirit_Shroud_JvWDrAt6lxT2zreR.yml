name: Spirit Shroud
type: spell
system:
  source:
    custom: ''
    book: TCE
    page: '108'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You call forth spirits of the dead, which
      flit around you for the spell's duration. The spirits are intangible and
      invulnerable.</p><div class="rd__spc-inline-post"></div><p>Until the spell
      ends, any attack you make deals [[/r 1d8]] extra damage when you hit a
      creature within 10 feet of you. This damage is radiant, necrotic, or cold
      (your choice when you cast the spell). Any creature that takes this damage
      can't regain hit points until the start of your next turn.</p><p>In
      addition, any creature of your choice that you can see that starts its
      turn within 10 feet of you has its speed reduced by 10 feet until the
      start of your next turn.</p></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 4th level or higher, the damage
      increases by [[/r 1d8]] for every two slot levels above 3rd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
