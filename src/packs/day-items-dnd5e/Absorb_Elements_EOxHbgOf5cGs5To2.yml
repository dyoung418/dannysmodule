    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>The spell captures some of the incoming
      energy, lessening its effect on you and storing it for your next melee
      attack. You have resistance to the triggering damage type until the start
      of your next turn. Also, the first time you hit with a melee attack on
      your next turn, the target takes an extra [[/r 1d6]] damage of the
      triggering type, and the spell ends.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 2nd level or higher, the extra
      damage increases by [[/r 1d6]] for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Druid, Ranger, Sorcerer, Wizard</div>
