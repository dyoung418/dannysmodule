  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A dazzling array of flashing, colored
      light springs from your hand. Roll [[/r 6d10]]; the total is how many hit
      points of creatures this spell can effect. Creatures in a 15-foot cone
      originating from you are affected in ascending order of their current hit
      points (ignoring @condition[unconscious] creatures and creatures that
      can't see).</p><div class="rd__spc-inline-post"></div><p>Starting with the
      creature that has the lowest current hit points, each creature affected by
      this spell is @condition[blinded] until the end of your next turn.
      Subtract each creature's hit points from the total before moving on to the
      creature with the next lowest hit points. A creature's hit points must be
      equal to or less than the remaining total for that creature to be
      affected.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 2nd level or higher, roll an additional
      [[/r 2d10]] for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
