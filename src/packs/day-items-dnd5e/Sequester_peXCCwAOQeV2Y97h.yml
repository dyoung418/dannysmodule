  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>By means of this spell, a willing creature
      or an object can be hidden away, safe from detection for the duration.
      When you cast the spell and touch the target, it becomes
      @condition[invisible] and can't be targeted by <a
      href="https://5etools-mirror-2.github.io/spells.html#blankhash,flstschool:d=1">divination
      spells</a> or perceived through scrying sensors created by divination
      spells.</p><div class="rd__spc-inline-post"></div><p>If the target is a
      creature, it falls into a state of suspended animation. Time ceases to
      flow for it, and it doesn't grow older.</p><p>You can set a condition for
      the spell to end early. The condition can be anything you choose, but it
      must occur or be visible within 1 mile of the target. Examples include
      "after 1,000 years" or "when the @creature[tarrasque] awakens." This spell
      also ends if the target takes any damage.</p></div><div><span
      class="bold">Classes: </span>Wizard</div>
