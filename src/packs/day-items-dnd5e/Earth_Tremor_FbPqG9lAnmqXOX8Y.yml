    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You cause a tremor in the ground within
      range. Each creature other than you in that area must make a Dexterity
      saving throw. On a failed save, a creature takes [[/r 1d6]] bludgeoning
      damage and is knocked @condition[prone]. If the ground in that area is
      loose earth or stone, it becomes difficult terrain until cleared, with
      each 5-foot-diameter portion requiring at least 1 minute to clear by
      hand.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, the damage increases by [[/r 1d6]] for each slot
      level above 1st.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Druid, Sorcerer, Wizard</div>
