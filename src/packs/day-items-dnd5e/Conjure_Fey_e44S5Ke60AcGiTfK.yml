name: Conjure Fey
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '226'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You summon a <a
      href="https://5etools-mirror-2.github.io/bestiary.html#blankhash,flstchallenge%20rating:min=&amp;0~max=&amp;6,flsttype:fey=1,flstmiscellaneous:swarm=2">fey
      creature of challenge rating 6 or lower</a>, or a fey spirit that takes
      the form of a <a
      href="https://5etools-mirror-2.github.io/bestiary.html#blankhash,flstchallenge%20rating:min=&amp;0~max=&amp;6,flsttype:beast=1,flstmiscellaneous:swarm=2">beast
      of challenge rating 6 or lower</a>. It appears in an unoccupied space that
      you can see within range. The fey creature disappears when it drops to 0
      hit points or when the spell ends.</p><div
      class="rd__spc-inline-post"></div><p>The fey creature is friendly to you
      and your companions for the duration. Roll initiative for the creature,
      which has its own turns. It obeys any verbal commands that you issue to it
      (no action required by you), as long as they don't violate its alignment.
      If you don't issue any commands to the fey creature, it defends itself
      from hostile creatures but otherwise takes no actions.</p><p>If your
      @status[concentration] is broken, the fey creature doesn't disappear.
      Instead, you lose control of the fey creature, it becomes hostile toward
      you and your companions, and it might attack. An uncontrolled fey creature
      can't be dismissed by you, and it disappears 1 hour after you summoned
      it.</p><p>The DM has the fey creature's statistics.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      7th level or higher, the challenge rating increases by 1 for each slot
      level above 6th.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Druid, Warlock</div>
