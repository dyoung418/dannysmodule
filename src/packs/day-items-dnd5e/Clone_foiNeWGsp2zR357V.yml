    - somatic
    - material
  materials:
    value: >-
      a diamond worth at least 1,000 gp and at least 1 cubic inch of flesh of
      the creature that is to be cloned, which the spell consumes, and a vessel
      worth at least 2,000 gp that has a sealable lid and is large enough to
      hold the creature being cloned, such as a huge urn, coffin, mud-filled
      cyst in the ground, or crystal container filled with salt water
