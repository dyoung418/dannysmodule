  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a sword-shaped plane of force
      that hovers within range. It lasts for the duration.</p><div
      class="rd__spc-inline-post"></div><p>When the sword appears, you make a
      melee spell attack against a target of your choice within 5 feet of the
      sword. On a hit, the target takes [[/r 3d10]] force damage. Until the
      spell ends, you can use a bonus action on each of your turns to move the
      sword up to 20 feet to a spot you can see and repeat this attack against
      the same target or a different one.</p></div><div><span
      class="bold">Classes: </span>Bard, Wizard</div>
