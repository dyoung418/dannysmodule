  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>When you cast this spell, you gain one <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">level of
      contamination</a>. You draw chaotic magical power from the delerium
      fragment held in your hand, and blast a creature you can see within range
      with paradoxical power. Choose one ability score, then choose cold, fire,
      lightning, necrotic, psychic, or radiant damage. The target must succeed
      on a saving throw using the chosen ability score; it takes [[/r 6d6]]
      damage of the chosen type on a failed saving throw, or half as much on a
      successful one.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, the damage increases by [[/r 2d6]] for each slot
      level above 1st.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
