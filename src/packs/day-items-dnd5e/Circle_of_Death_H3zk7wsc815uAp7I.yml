  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A sphere of negative energy ripples out in
      a 60-foot-radius sphere from a point within range. Each creature in that
      area must make a Constitution saving throw. A target takes [[/r 8d6]]
      necrotic damage on a failed save, or half as much damage on a successful
      one.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      7th level or higher, the damage increases by [[/r 2d6]] for each slot
      level above 6th.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Warlock, Wizard</div>
