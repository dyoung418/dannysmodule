    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A tendril of inky darkness reaches out
      from you, touching a creature you can see within range to drain life from
      it. The target must make a Dexterity saving throw. On a successful save,
      the target takes [[/r 2d8]] necrotic damage, and the spell ends. On a
      failed save, the target takes [[/r 4d8]] necrotic damage, and until the
      spell ends, you can use your action on each of your turns to automatically
      deal [[/r 4d8]] necrotic damage to the target. The spell ends if you use
      your action to do anything else, if the target is ever outside the spell's
      range, or if the target has total cover from you.</p><div
      class="rd__spc-inline-post"></div><p>Whenever the spell deals damage to a
      target, you regain hit points equal to half the amount of necrotic damage
      the target takes.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 6th level or higher, the damage increases
      by [[/r 1d8]] for each slot level above 5th.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Warlock, Wizard</div>
