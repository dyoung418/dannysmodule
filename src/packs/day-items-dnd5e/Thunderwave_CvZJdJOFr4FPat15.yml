name: Thunderwave
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '282'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A wave of thunderous force sweeps out from
      you. Each creature in a 15-foot cube originating from you must make a
      Constitution saving throw. On a failed save, a creature takes [[/r 2d8]]
      thunder damage and is pushed 10 feet away from you. On a successful save,
      the creature takes half as much damage and isn't pushed.</p><div
      class="rd__spc-inline-post"></div><p>In addition, unsecured objects that
      are completely within the area of effect are automatically pushed 10 feet
      away from you by the spell's effect, and the spell emits a thunderous boom
      audible out to 300 feet.</p></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 2nd level or higher, the damage
      increases by [[/r 1d8]] for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Druid, Sorcerer, Wizard</div>
