    book: BMT
    page: '50'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You spray a 15-foot cone of spectral
      cards. Each creature in that area must make a Dexterity saving throw. On a
      failed save, a creature takes [[/r 2d10]] force damage and has the
      @condition[blinded] condition until the end of its next turn. On a
      successful save, a creature takes half as much damage only.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd level or higher, the damage
      increases by [[/r 1d10]] for each slot level above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div>
