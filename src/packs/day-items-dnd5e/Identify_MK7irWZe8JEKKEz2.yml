    book: PHB
    page: '252'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You choose one object that you must touch
      throughout the casting of the spell. If it is a magic item or some other
      magic-imbued object, you learn its properties and how to use them, whether
      it requires attunement to use, and how many charges it has, if any. You
      learn whether any spells are affecting the item and what they are. If the
      item was created by a spell, you learn which spell created it.</p><div
      class="rd__spc-inline-post"></div><p>If you instead touch a creature
      throughout the casting, you learn what spells, if any, are currently
      affecting it.</p></div><div><span class="bold">Classes: </span>Artificer,
      Bard, Wizard</div>
