  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You negate contaminated magical energies
      in a 10-foot radius sphere. Until the spell ends, the sphere moves with
      you, centred on you. Creatures in the sphere (including you) can't gain <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination
      levels</a> and have immunity to necrotic damage. Contaminated spells can't
      be cast by creatures in the area.</p><div
