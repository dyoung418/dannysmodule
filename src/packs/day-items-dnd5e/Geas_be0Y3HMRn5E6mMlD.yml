name: Geas
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '244'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You place a magical command on a creature
      that you can see within range, forcing it to carry out some service or
      refrain from some action or course of activity as you decide. If the
      creature can understand you, it must succeed on a Wisdom saving throw or
      become @condition[charmed] by you for the duration. While the creature is
      @condition[charmed] by you, it takes [[/r 5d10]] psychic damage each time
      it acts in a manner directly counter to your instructions, but no more
      than once each day. A creature that can't understand you is unaffected by
      the spell.</p><div class="rd__spc-inline-post"></div><p>You can issue any
      command you choose, short of an activity that would result in certain
      death. Should you issue a suicidal command, the spell ends.</p><p>You can
      end the spell early by using an action to dismiss it. A @spell[remove
      curse], @spell[greater restoration], or @spell[wish] spell also ends
      it.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 7th or 8th level, the duration is 1 year.
      When you cast this spell using a spell slot of 9th level, the spell lasts
      until it is ended by one of the spells mentioned above.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Cleric, Druid, Paladin, Wizard</div>
