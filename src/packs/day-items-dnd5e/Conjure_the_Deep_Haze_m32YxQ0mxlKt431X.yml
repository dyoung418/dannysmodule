name: Conjure the Deep Haze
type: spell
system:
  source:
    custom: ''
    book: DoDk
    page: '226'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>When you cast this spell, you gain one <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">level of
      contamination</a>.</p><div class="rd__spc-inline-post"></div><p>You create
      a 20-foot-radius sphere of the Deep Haze on a point you choose within
      range. The fog spreads around corners. It lasts for the duration or until
      strong wind disperses the fog, ending the spell. Its area is heavily
      obscured.</p><p>When a creature enters the spell's area for the first time
      on a turn or starts its turn there, that creature must succeed on a
      Constitution saving throw. On a failed saving throw, it suffers ([[/r
      8d6]]) necrotic damage and gains one <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">level of
      contamination</a>. On a successful save, the creature takes half as much
      damage and does not gain any <a
      href="https://5etools-mirror-2.github.io/adventure.html#DoDk,12">contamination
      levels</a>. Creatures are affected even if they hold their breath or don't
      need to breathe.</p></div>
