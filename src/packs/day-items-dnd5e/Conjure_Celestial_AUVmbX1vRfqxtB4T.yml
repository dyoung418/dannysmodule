name: Conjure Celestial
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '225'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You summon a <a
      href="https://5etools-mirror-2.github.io/bestiary.html#blankhash,flstchallenge%20rating:min=&amp;0~max=&amp;4,flsttype:celestial=1,flstmiscellaneous:swarm=2">celestial
      of challenge rating 4 or lower</a>, which appears in an unoccupied space
      that you can see within range. The celestial disappears when it drops to 0
      hit points or when the spell ends.</p><div
      class="rd__spc-inline-post"></div><p>The celestial is friendly to you and
      your companions for the duration. Roll initiative for the celestial, which
      has its own turns. It obeys any verbal commands that you issue to it (no
      action required by you), as long as they don't violate its alignment. If
      you don't issue any commands to the celestial, it defends itself from
      hostile creatures but otherwise takes no actions.</p><p>The DM has
      @creature[couatl||the celestial]'s statistics.</p></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a 9th-level spell
      slot, you summon a <a
      href="https://5etools-mirror-2.github.io/bestiary.html#blankhash,flstchallenge%20rating:min=&amp;0~max=&amp;5,flsttype:celestial=1,flstmiscellaneous:swarm=2">celestial
      of challenge rating 5 or lower</a>.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric</div>
