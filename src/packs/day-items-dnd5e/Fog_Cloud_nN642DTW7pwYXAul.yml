name: Fog Cloud
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '243'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a 20-foot-radius sphere of fog
      centered on a point within range. The sphere spreads around corners, and
      its area is heavily obscured. It lasts for the duration or until a wind of
      moderate or greater speed (at least 10 miles per hour) disperses
      it.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, the radius of the fog increases by 20 feet for each
      slot level above 1st.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Druid, Ranger, Sorcerer, Wizard</div>
