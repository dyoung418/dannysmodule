name: Hail of Thorns
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '249'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>The next time you hit a creature with a
      ranged weapon attack before the spell ends, this spell creates a rain of
      thorns that sprouts from your ranged weapon or ammunition. In addition to
      the normal effect of the attack, the target of the attack and each
      creature within 5 feet of it must make a Dexterity saving throw. A
      creature takes [[/r 1d10]] piercing damage on a failed save, or half as
      much damage on a successful one.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>If you
      cast this spell using a spell slot of 2nd level or higher, the damage
      increases by [[/r 1d10]] for each slot level above 1st (to a maximum of
      [[/r 6d10]]).</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Ranger</div>
