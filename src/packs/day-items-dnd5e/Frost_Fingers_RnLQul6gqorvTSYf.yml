  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Freezing cold blasts from your fingertips
      in a 15-foot cone. Each creature in that area must make a Constitution
      saving throw, taking [[/r 2d8]] cold damage on a failed save, or half as
      much damage on a successful one.</p><div
      class="rd__spc-inline-post"></div><p>The cold freezes nonmagical liquids
      in the area that aren't being worn or carried.</p></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, the damage increases by [[/r 1d8]] for each slot
      level above 1st.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Wizard</div>
