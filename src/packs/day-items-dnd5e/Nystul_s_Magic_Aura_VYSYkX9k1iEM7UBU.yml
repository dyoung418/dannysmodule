name: Nystul's Magic Aura
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '263'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You place an illusion on a creature or an
      object you touch so that divination spells reveal false information about
      it. The target can be a willing creature or an object that isn't being
      carried or worn by another creature.</p><div
      class="rd__spc-inline-post"></div><p>When you cast the spell, choose one
      or both of the following effects. The effect lasts for the duration. If
      you cast this spell on the same creature or object every day for 30 days,
      placing the same effect on it each time, the illusion lasts until it is
      dispelled.</p><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">False
      Aura.</span></span> <p>You change the way the target appears to spells and
      magical effects, such as @spell[detect magic], that detect magical auras.
      You can make a nonmagical object appear magical, a magical object appear
      nonmagical, or change the object's magical aura so that it appears to
      belong to a specific school of magic that you choose. When you use this
      effect on an object, you can make the false magic apparent to any creature
      that handles the item.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><span
      class="rd__h rd__h--3" data-title-index="2"> <span
      class="entry-title-inner">Mask.</span></span> <p>You change the way the
      target appears to spells and magical effects that detect creature types,
      such as a paladin's @classFeature[Divine Sense|Paladin|PHB|1] or the
      trigger of a @spell[symbol] spell. You choose a creature type and other
      spells and magical effects treat the target as if it were a creature of
      that type or of that alignment.</p><div
      class="rd__spc-inline-post"></div></div></div><div><span
      class="bold">Classes: </span>Wizard</div>
