    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A shimmering green arrow streaks toward a
      target within range and bursts in a spray of acid. Make a ranged spell
      attack against the target. On a hit, the target takes [[/r 4d4]] acid
      damage immediately and [[/r 2d4]] acid damage at the end of its next turn.
      On a miss, the arrow splashes the target with acid for half as much of the
      initial damage and no damage at the end of its next turn.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd level or higher, the damage
      (both initial and later) increases by [[/r 1d4]] for each slot level above
      2nd.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Wizard</div>
