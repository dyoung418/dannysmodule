name: Imprisonment
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '252'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a magical restraint to hold a
      creature that you can see within range. The target must succeed on a
      Wisdom saving throw or be bound by the spell; if it succeeds, it is immune
      to this spell if you cast it again. While affected by this spell, the
      creature doesn't need to breathe, eat, or drink, and it doesn't age.
      Divination spells can't locate or perceive the target.</p><div
      class="rd__spc-inline-post"></div><p>When you cast the spell, you choose
      one of the following forms of imprisonment.</p><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">Burial.</span></span> <p>The target is entombed
      far beneath the earth in a sphere of magical force that is just large
      enough to contain the target. Nothing can pass through the sphere, nor can
      any creature teleport or use planar travel to get into or out of
      it.</p><div class="rd__spc-inline-post"></div></div><p>The special
      component for this version of the spell is a small mithral orb.</p><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="2">
      <span class="entry-title-inner">Chaining.</span></span> <p>Heavy chains,
      firmly rooted in the ground, hold the target in place. The target is
      @condition[restrained] until the spell ends, and it can't move or be moved
      by any means until then.</p><div
      class="rd__spc-inline-post"></div></div><p>The special component for this
      version of the spell is a fine chain of precious metal.</p><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="3">
      <span class="entry-title-inner">Hedged Prison.</span></span> <p>The spell
      transports the target into a tiny demiplane that is warded against
      teleportation and planar travel. The demiplane can be a labyrinth, a cage,
      a tower, or any similar confined structure or area of your choice.</p><div
      class="rd__spc-inline-post"></div></div><p>The special component for this
      version of the spell is a miniature representation of the prison made from
      jade.</p><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="4"> <span class="entry-title-inner">Minimus
      Containment.</span></span> <p>The target shrinks to a height of 1 inch and
      is imprisoned inside a gemstone or similar object. Light can pass through
      the gemstone normally (allowing the target to see out and other creatures
      to see in), but nothing else can pass through, even by means of
      teleportation or planar travel. The gemstone can't be cut or broken while
      the spell remains in effect.</p><div
      class="rd__spc-inline-post"></div></div><p>The special component for this
      version of the spell is a large, transparent gemstone, such as a corundum,
      diamond, or ruby.</p><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="5"> <span
      class="entry-title-inner">Slumber.</span></span> <p>The target falls
      asleep and can't be awoken.</p><div
      class="rd__spc-inline-post"></div></div><p>The special component for this
      version of the spell consists of rare soporific herbs.</p><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="6">
      <span class="entry-title-inner">Ending the Spell.</span></span> <p>During
      the casting of the spell, in any of its versions, you can specify a
      condition that will cause the spell to end and release the target. The
      condition can be as specific or as elaborate as you choose, but the DM
      must agree that the condition is reasonable and has a likelihood of coming
      to pass. The conditions can be based on a creature's name, identity, or
      deity but otherwise must be based on observable actions or qualities and
      not based on intangibles such as level, class, or hit points.</p><div
      class="rd__spc-inline-post"></div></div><p>A @spell[dispel magic] spell
      can end the spell only if it is cast as a 9th-level spell, targeting
      either the prison or the special component used to create it.</p><p>You
      can use a particular special component to create only one prison at a
      time. If you cast the spell again using the same component, the target of
      the first casting is immediately freed from its
      binding.</p></div><div><span class="bold">Classes: </span>Warlock,
      Wizard</div>
