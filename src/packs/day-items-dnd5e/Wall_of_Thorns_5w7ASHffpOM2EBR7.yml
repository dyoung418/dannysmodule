name: Wall of Thorns
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '287'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a wall of tough, pliable,
      tangled brush bristling with needle-sharp thorns. The wall appears within
      range on a solid surface and lasts for the duration. You choose to make
      the wall up to 60 feet long, 10 feet high, and 5 feet thick or a circle
      that has a 20-foot diameter and is up to 20 feet high and 5 feet thick.
      The wall blocks line of sight.</p><div
      class="rd__spc-inline-post"></div><p>When the wall appears, each creature
      within its area must make a Dexterity saving throw. On a failed save, a
      creature takes [[/r 7d8]] piercing damage, or half as much damage on a
      successful save.</p><p>A creature can move through the wall, albeit slowly
      and painfully. For every 1 foot a creature moves through the wall, it must
      spend 4 feet of movement. Furthermore, the first time a creature enters
      the wall on a turn or ends its turn there, the creature must make a
      Dexterity saving throw. It takes [[/r 7d8]] slashing damage on a failed
      save, or half as much damage on a successful one.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      7th level or higher, both types of damage increase by [[/r 1d8]] for each
      slot level above 6th.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Druid</div>
