  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A stream of acid emanates from you in a
      line 30 feet long and 5 feet wide in a direction you choose. Each creature
      in the line must succeed on a Dexterity saving throw or be covered in acid
      for the spell's duration or until a creature uses its action to scrape or
      wash the acid off itself or another creature. A creature covered in the
      acid takes [[/r 2d4]] acid damage at start of each of its turns.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 2nd level or higher, the damage
      increases by [[/r 2d4]] for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer</div>
