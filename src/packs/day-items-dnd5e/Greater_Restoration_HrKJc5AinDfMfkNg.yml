  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You imbue a creature you touch with
      positive energy to undo a debilitating effect. You can reduce the target's
      @condition[exhaustion] level by one, or end one of the following effects
      on the target:</p><div class="rd__spc-inline-post"></div><ul
      class="rd__list"><li class="rd__li ">One effect that @condition[charmed]
      or @condition[petrified] the target</li><li class="rd__li ">One curse,
      including the target's attunement to a cursed magic item</li><li
      class="rd__li ">Any reduction to one of the target's ability
      scores</li><li class="rd__li ">One effect reducing the target's hit point
      maximum</li></ul></div><div><span class="bold">Classes: </span>Artificer,
      Bard, Cleric, Druid</div>
