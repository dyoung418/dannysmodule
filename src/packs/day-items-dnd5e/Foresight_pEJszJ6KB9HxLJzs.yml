  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch a willing creature and bestow a
      limited ability to see into the immediate future. For the duration, the
      target can't be surprised and has advantage on attack rolls, ability
      checks, and saving throws. Additionally, other creatures have disadvantage
      on attack rolls against the target for the duration.</p><div
      class="rd__spc-inline-post"></div><p>This spell immediately ends if you
      cast it again before its duration ends.</p></div><div><span
      class="bold">Classes: </span>Bard, Druid, Warlock, Wizard</div>
