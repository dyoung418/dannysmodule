  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A flood of healing energy flows from you
      into injured creatures around you. You restore up to 700 hit points,
      divided as you choose among any number of creatures that you can see
      within range. Creatures healed by this spell are also cured of all
      diseases and any effect making them @condition[blinded] or
      @condition[deafened]. This spell has no effect on undead or
      constructs.</p><div class="rd__spc-inline-post"></div></div><div><span
      class="bold">Classes: </span>Cleric</div>
