  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A 20-foot-radius sphere of whirling air
      springs into existence, centered on a point you choose within range. The
      sphere remains for the spell's duration. Each creature in the sphere when
      it appears or that ends its turn there must succeed on a Strength saving
      throw or take [[/r 2d6]] bludgeoning damage. The sphere's space is
      difficult terrain.</p><div class="rd__spc-inline-post"></div><p>Until the
      spell ends, you can use a bonus action on each of your turns to cause a
      bolt of lightning to leap from the center of the sphere toward one
      creature you choose within 60 feet of the center. Make a ranged spell
      attack. You have advantage on the attack roll if the target is in the
      sphere. On a hit, the target takes [[/r 4d6]] lightning
      damage.</p><p>Creatures within 30 feet of the sphere have disadvantage on
      Wisdom (@skill[Perception]) checks made to listen.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      5th level or higher, the damage for each of its effects increases by [[/r
      1d6]] for each slot level above 4th.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
