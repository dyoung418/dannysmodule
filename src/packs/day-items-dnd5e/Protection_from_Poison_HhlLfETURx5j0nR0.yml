    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch a creature. If it is
      @condition[poisoned], you neutralize the poison. If more than one poison
      afflicts the target, you neutralize one poison that you know is present,
      or you neutralize one at random.</p><div
      class="rd__spc-inline-post"></div><p>For the duration, the target has
      advantage on saving throws against being @condition[poisoned], and it has
      resistance to poison damage.</p></div><div><span class="bold">Classes:
      </span>Artificer, Cleric, Druid, Paladin, Ranger</div>
