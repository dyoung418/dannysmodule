  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Thin and wispy flames wreathe your body
      for the duration, shedding bright light in a 10-foot radius and dim light
      for an additional 10 feet. You can end the spell early by using an action
      to dismiss it.</p><div class="rd__spc-inline-post"></div><p>The flames
      provide you with a warm shield or a chill shield, as you choose. The warm
      shield grants you resistance to cold damage, and the chill shield grants
      you resistance to fire damage.</p><p>In addition, whenever a creature
      within 5 feet of you hits you with a melee attack, the shield erupts with
      flame. The attacker takes [[/r 2d8]] fire damage from a warm shield, or
      [[/r 2d8]] cold damage from a cold shield.</p></div><div><span
      class="bold">Classes: </span>Wizard</div>
