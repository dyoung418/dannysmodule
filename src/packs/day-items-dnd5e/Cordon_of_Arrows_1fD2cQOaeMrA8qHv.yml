name: Cordon of Arrows
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '228'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You plant four pieces of nonmagical
      ammunition—@item[arrow|phb|arrows] or @item[crossbow bolt|phb|crossbow
      bolts]—in the ground within range and lay magic upon them to protect an
      area. Until the spell ends, whenever a creature other than you comes
      within 30 feet of the ammunition for the first time on a turn or ends its
      turn there, one piece of ammunition flies up to strike it. The creature
      must succeed on a Dexterity saving throw or take [[/r 1d6]] piercing
      damage. The piece of ammunition is then destroyed. The spell ends when no
      ammunition remains.</p><div class="rd__spc-inline-post"></div><p>When you
      cast this spell, you can designate any creatures you choose, and the spell
      ignores them.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 3rd level or higher, the amount of
      ammunition that can be affected increases by two for each slot level above
      2nd.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Ranger</div>
