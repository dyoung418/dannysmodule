name: Dragon's Breath
type: spell
system:
  source:
    custom: ''
    book: XGE
    page: '154'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch one willing creature and imbue
      it with the power to spew magical energy from its mouth, provided it has
      one. Choose acid, cold, fire, lightning, or poison. Until the spell ends,
      the creature can use an action to exhale energy of the chosen type in a
      15-foot cone. Each creature in that area must make a Dexterity saving
      throw, taking [[/r 3d6]] damage of the chosen type on a failed save, or
      half as much damage on a successful one.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd level or higher, the damage
      increases by [[/r 1d6]] for each slot level above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
