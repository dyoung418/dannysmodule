name: Rime's Binding Ice
type: spell
system:
  source:
    custom: ''
    book: FTD
    page: '21'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A burst of cold energy emanates from you
      in a 30-foot cone. Each creature in that area must make a Constitution
      saving throw. On a failed save, a creature takes [[/r 3d8]] cold damage
      and is hindered by ice formations for 1 minute, or until it or another
      creature within reach of it uses an action to break away the ice. A
      creature hindered by ice has its speed reduced to 0. On a successful save,
      a creature takes half as much damage and isn't hindered by ice.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd level or higher, increase
      the cold damage by [[/r 1d8]] for each slot level above 2nd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
