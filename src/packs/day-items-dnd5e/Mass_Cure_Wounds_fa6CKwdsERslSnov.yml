name: Mass Cure Wounds
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '258'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A wave of healing energy washes out from a
      point of your choice within range. Choose up to six creatures in a
      30-foot-radius sphere centered on that point. Each target regains hit
      points equal to [[/r 3d8]] + your spellcasting ability modifier. This
      spell has no effect on undead or constructs.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 6th level or higher, the healing
      increases by [[/r 1d8]] for each slot level above 5th.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Cleric, Druid</div>
