name: Scrying
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '273'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You can see and hear a particular creature
      you choose that is on the same plane of existence as you. The target must
      make a Wisdom saving throw, which is modified by how well you know the
      target and the sort of physical connection you have to it. If a target
      knows you're casting this spell, it can fail the saving throw voluntarily
      if it wants to be observed.</p><div
      class="rd__spc-inline-post"></div><table class="w-100 rd__table 
      stripe-odd-table"><caption>Knowledge of Target</caption><thead><tr><th
      class="col-11" data-rd-isroller="false">Knowledge</th><th class="col-1
      ve-text-center" data-rd-isroller="false">Save
      Modifier</th></tr></thead><tbody><tr><td class="col-11">Secondhand (you
      have heard of the target)</td><td class="col-1
      ve-text-center">+5</td></tr><tr><td class="col-11">Firsthand (you have met
      the target)</td><td class="col-1 ve-text-center">+0</td></tr><tr><td
      class="col-11">Familiar (you know the target well)</td><td class="col-1
      ve-text-center">-5</td></tr></tbody></table><table class="w-100 rd__table 
      stripe-odd-table"><caption>Connection to Target</caption><thead><tr><th
      class="col-11" data-rd-isroller="false">Connection</th><th class="col-1
      ve-text-center" data-rd-isroller="false">Save
      Modifier</th></tr></thead><tbody><tr><td class="col-11">Likeness or
      picture</td><td class="col-1 ve-text-center">-2</td></tr><tr><td
      class="col-11">Possession or garment</td><td class="col-1
      ve-text-center">-4</td></tr><tr><td class="col-11">Body part, lock of
      hair, bit of nail, or the like</td><td class="col-1
      ve-text-center">-10</td></tr></tbody></table><p>On a successful save, the
      target isn't affected, and you can't use this spell against it again for
      24 hours.</p><p>On a failed save, the spell creates an invisible sensor
      within 10 feet of the target. You can see and hear through the sensor as
      if you were there. The sensor moves with the target, remaining within 10
      feet of it for the duration. A creature that can see @condition[invisible]
      objects sees the sensor as a luminous orb about the size of your
      fist.</p><p>Instead of targeting a creature, you can choose a location you
      have seen before as the target of this spell. When you do, the sensor
      appears at that location and doesn't move.</p></div><div><span
      class="bold">Classes: </span>Bard, Cleric, Druid, Warlock, Wizard</div>
