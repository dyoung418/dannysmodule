    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>While casting the spell, you place a vial
      of quicksilver in the chest of a life-sized human doll stuffed with ash or
      dust. You then stitch up the doll and drip your blood on it. At the end of
      the casting, you tap the doll with a crystal rod, transforming it into a
      <a
      href="https://5etools-mirror-2.github.io/bestiary.html#blankhash,fbsr:magen,flstsource:idrotf=1">magen</a>
      clothed in whatever the doll was wearing. The type of magen is chosen by
      you during the casting of the spell. See <a
      href="https://5etools-mirror-2.github.io/adventure.html#IDRotF,21">appendix
      C</a> for different kinds of magen and their statistics.</p><div
      class="rd__spc-inline-post"></div><p>When the magen appears, your hit
      point maximum decreases by an amount equal to the magen's challenge rating
      (minimum reduction of 1). Only a @spell[wish] spell can undo this
      reduction to your hit point maximum.</p><p>Any magen you create with this
      spell obeys your commands without question.</p></div><div><span
      class="bold">Classes: </span>Wizard</div>
    chat: ''
  level: 7
  school: trs
