    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch a creature and grant it a
      measure of protection from death.</p><div
      class="rd__spc-inline-post"></div><p>The first time the target would drop
      to 0 hit points as a result of taking damage, the target instead drops to
      1 hit point, and the spell ends.</p><p>If the spell is still in effect
      when the target is subjected to an effect that would kill it
      instantaneously without dealing damage, that effect is instead negated
      against the target, and the spell ends.</p></div><div><span
      class="bold">Classes: </span>Cleric, Paladin</div>
