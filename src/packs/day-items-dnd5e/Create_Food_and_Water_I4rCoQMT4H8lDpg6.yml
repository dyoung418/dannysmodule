  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create 45 pounds of food and 30
      gallons of water on the ground or in containers within range, enough to
      sustain up to fifteen humanoids or five steeds for 24 hours. The food is
      bland but nourishing, and spoils if uneaten after 24 hours. The water is
      clean and doesn't go bad.</p><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
