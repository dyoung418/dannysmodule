  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You create a 20-foot-radius sphere of
      destructive gravitational force centered on a point you can see within
      range. For the spell's duration, the sphere and any space within 100 feet
      of it are difficult terrain, and nonmagical objects fully inside the
      sphere are destroyed if they aren't being worn or carried.</p><div
      class="rd__spc-inline-post"></div><p>When the sphere appears and at the
      start of each of your turns until the spell ends, unsecured objects within
      100 feet of the sphere are pulled toward the sphere's center, ending in an
      unoccupied space as close to the center as possible.</p><p>A creature that
      starts its turn within 100 feet of the sphere must succeed on a Strength
      saving throw or be pulled straight toward the sphere's center, ending in
      an unoccupied space as close to the center as possible. A creature that
      enters the sphere for the first time on a turn or starts its turn there
      takes [[/r 5d10]] force damage and is @condition[restrained] until it is
      no longer in the sphere. If the sphere is in the air, the
      @condition[restrained] creature hovers inside the sphere. A creature can
      use its action to make a Strength check against your spell save DC, ending
      this @condition[restrained] condition on itself or another creature in the
      sphere that it can reach. A creature reduced to 0 hit points by this spell
      is annihilated, along with any nonmagical items it is wearing or
      carrying.</p></div>
    chat: ''
