name: Spirit Guardians
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '278'
    license: ''
    revision: 1
    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You call forth spirits to protect you.
      They flit around you to a distance of 15 feet for the duration. If you are
      good or neutral, their spectral form appears angelic or fey (your choice).
      If you are evil, they appear fiendish.</p><div
      class="rd__spc-inline-post"></div><p>When you cast this spell, you can
      designate any number of creatures you can see to be unaffected by it. An
      affected creature's speed is halved in the area, and when the creature
      enters the area for the first time on a turn or starts its turn there, it
      must make a Wisdom saving throw. On a failed save, the creature takes [[/r
      3d8]] radiant damage (if you are good or neutral) or [[/r 3d8]] necrotic
      damage (if you are evil). On a successful save, the creature takes half as
      much damage.</p></div><div class="rd__b  rd__b--3"><div class="rd__b 
      rd__b--3"><span class="rd__h rd__h--3" data-title-index="1"> <span
      class="entry-title-inner">At Higher Levels.</span></span> <p>When you cast
      this spell using a spell slot of 4th level or higher, the damage increases
      by [[/r 1d8]] for each slot level above 3rd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Cleric</div>
