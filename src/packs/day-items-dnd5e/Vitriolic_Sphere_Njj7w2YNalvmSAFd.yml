    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You point at a location within range, and
      a glowing 1-foot-diameter ball of emerald acid streaks there and explodes
      in a 20-foot-radius sphere. Each creature in that area must make a
      Dexterity saving throw. On a failed save, a creature takes [[/r 10d4]]
      acid damage and another [[/r 5d4]] acid damage at the end of its next
      turn. On a successful save, a creature takes half the initial damage and
      no damage at the end of its next turn.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 5th level or higher, the initial
      damage increases by [[/r 2d4]] for each slot level above 4th.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Sorcerer, Wizard</div>
