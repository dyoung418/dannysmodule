  description:
    value: >-
      <p><em>5th-level Alchemist feature</em></p><p>You’ve developed masterful
      command of magical chemicals, enhancing the healing and damage you create
      through them. Whenever you cast a spell using your alchemist’s supplies as
      the spellcasting focus, you gain a bonus to one roll of the spell. That
      roll must restore hit points or be a damage roll that deals acid, fire,
      necrotic, or poison damage, and the bonus equals your Intelligence
      modifier (minimum of +1).</p>
