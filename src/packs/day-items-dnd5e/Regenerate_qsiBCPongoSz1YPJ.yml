  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch a creature and stimulate its
      natural healing ability. The target regains [[/r 4d8 + 15]] hit points.
      For the duration of the spell, the target regains 1 hit point at the start
      of each of its turns (10 hit points each minute).</p><div
      class="rd__spc-inline-post"></div><p>The target's severed body members
      (fingers, legs, tails, and so on), if any, are restored after 2 minutes.
      If you have the severed part and hold it to the stump, the spell
      instantaneously causes the limb to knit to the stump.</p></div><div><span
      class="bold">Classes: </span>Bard, Cleric, Druid</div>
