    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>The touch of your shadow-wreathed hand can
      siphon life force from others to heal your wounds. Make a melee spell
      attack against a creature within your reach. On a hit, the target takes
      [[/r 3d6]] necrotic damage, and you regain hit points equal to half the
      amount of necrotic damage dealt. Until the spell ends, you can make the
      attack again on each of your turns as an action.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 4th level or higher, the damage
      increases by [[/r 1d6]] for each slot level above 3rd.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Warlock, Wizard</div>
