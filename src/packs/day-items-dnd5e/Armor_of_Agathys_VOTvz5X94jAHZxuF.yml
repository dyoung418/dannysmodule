  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>A protective magical force surrounds you,
      manifesting as a spectral frost that covers you and your gear. You gain 5
      temporary hit points for the duration. If a creature hits you with a melee
      attack while you have these hit points, the creature takes 5 cold
      damage.</p><div class="rd__spc-inline-post"></div></div><div class="rd__b 
      rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h rd__h--3"
      data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      2nd level or higher, both the temporary hit points and the cold damage
      increase by 5 for each slot level above 1st.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Warlock</div>
