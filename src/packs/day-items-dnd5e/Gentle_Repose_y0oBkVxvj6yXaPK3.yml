name: Gentle Repose
type: spell
system:
  source:
    custom: ''
    book: PHB
    page: '245'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You touch a corpse or other remains. For
      the duration, the target is protected from decay and can't become
      undead.</p><div class="rd__spc-inline-post"></div><p>The spell also
      effectively extends the time limit on raising the target from the dead,
      since days spent under the influence of this spell don't count against the
      time limit of spells such as @spell[raise dead].</p></div><div><span
      class="bold">Classes: </span>Cleric, Wizard</div>
    chat: ''
  actionType: util
  level: 2
