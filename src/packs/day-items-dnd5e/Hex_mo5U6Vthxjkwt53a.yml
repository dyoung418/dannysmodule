  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You place a curse on a creature that you
      can see within range. Until the spell ends, you deal an extra [[/r 1d6]]
      necrotic damage to the target whenever you hit it with an attack. Also,
      choose one ability when you cast the spell. The target has disadvantage on
      ability checks made with the chosen ability.</p><div
      class="rd__spc-inline-post"></div><p>If the target drops to 0 hit points
      before this spell ends, you can use a bonus action on a subsequent turn of
      yours to curse a new creature.</p><p>A @spell[remove curse] cast on the
      target ends this spell early.</p></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 3rd or 4th level, you can
      maintain your @status[concentration] on the spell for up to 8 hours. When
      you use a spell slot of 5th level or higher, you can maintain your
      @status[concentration] on the spell for up to 24 hours.</p><div
      class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Warlock</div>
