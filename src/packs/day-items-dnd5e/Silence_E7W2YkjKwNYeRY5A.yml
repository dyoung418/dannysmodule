  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>For the duration, no sound can be created
      within or pass through a 20-foot-radius sphere centered on a point you
      choose within range. Any creature or object entirely inside the sphere is
      immune to thunder damage, and creatures are @condition[deafened] while
      entirely inside it. Casting a spell that includes a verbal component is
      impossible there.</p><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Bard, Cleric, Ranger</div>
