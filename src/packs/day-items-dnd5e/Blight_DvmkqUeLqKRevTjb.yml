    rules: '2024'
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>Necromantic energy washes over a creature
      of your choice that you can see within range, draining moisture and
      vitality from it. The target must make a Constitution saving throw. The
      target takes [[/r 8d8]] necrotic damage on a failed save, or half as much
      damage on a successful one. This spell has no effect on undead or
      constructs.</p><div class="rd__spc-inline-post"></div><p>If you target a
      plant creature or a magical plant, it makes the saving throw with
      disadvantage, and the spell deals maximum damage to it.</p><p>If you
      target a nonmagical plant that isn't a creature, such as a tree or shrub,
      it doesn't make a saving throw, it simply withers and dies.</p></div><div
      class="rd__b  rd__b--3"><div class="rd__b  rd__b--3"><span class="rd__h
      rd__h--3" data-title-index="1"> <span class="entry-title-inner">At Higher
      Levels.</span></span> <p>When you cast this spell using a spell slot of
      5th level or higher, the damage increases by [[/r 1d8]] for each slot
      level above 4th.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Druid, Sorcerer, Warlock, Wizard</div>
