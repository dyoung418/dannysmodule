name: Catnap
type: spell
system:
  source:
    custom: ''
    book: XGE
    page: '151'
    license: ''
  description:
    value: >-
      <div class="rd__b  rd__b--3"><p>You make a calming gesture, and up to
      three willing creatures of your choice that you can see within range fall
      @condition[unconscious] for the spell's duration. The spell ends on a
      target early if it takes damage or someone uses an action to shake or slap
      it awake. If a target remains @condition[unconscious] for the full
      duration, that target gains the benefit of a short rest, and it can't be
      affected by this spell again until it finishes a long rest.</p><div
      class="rd__spc-inline-post"></div></div><div class="rd__b  rd__b--3"><div
      class="rd__b  rd__b--3"><span class="rd__h rd__h--3" data-title-index="1">
      <span class="entry-title-inner">At Higher Levels.</span></span> <p>When
      you cast this spell using a spell slot of 4th level or higher, you can
      target one additional willing creature for each slot level above
      3rd.</p><div class="rd__spc-inline-post"></div></div><div
      class="rd__spc-inline-post"></div></div><div><span class="bold">Classes:
      </span>Artificer, Bard, Sorcerer, Wizard</div>
