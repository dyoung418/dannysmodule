        - folder: dfRpdU8Efsenms12
          img: systems/pf2e/icons/actions/OneAction.webp
          name: Seek
          system:
            actionType:
              value: action
            actions:
              value: 1
            category: interaction
            description:
              value: >-
                <p>You scan an area for signs of creatures or objects, possibly
                including secret doors or hazards. Choose an area to scan. The
                GM determines the area you can scan with one Seek action—almost
                always 30 feet or less in any dimension. The GM might impose a
                penalty if you search far away from you or adjust the number of
                actions it takes to Seek a particularly cluttered area.</p>

                <p>The GM attempts a single secret [[/act seek]]{Perception}
                check for you and compares the result to the Stealth DCs of any
                @UUID[Compendium.pf2e.conditionitems.Item.VRSef5y1LmL2Hkjf]{Undetected}
                or
                @UUID[Compendium.pf2e.conditionitems.Item.iU0fEDdBp3rXpTMC]{Hidden}
                creatures in the area, or the DC to detect each object in the
                area (as determined by the GM or by someone
                @UUID[Compendium.pf2e.actionspf2e.Item.qVNVSmsgpKFGk9hV]{Concealing
                the Object}). A creature you detect might remain hidden, rather
                than becoming
                @UUID[Compendium.pf2e.conditionitems.Item.1wQY3JYyhMYeeV2G]{Observed},
                if you're using an imprecise sense or if an effect (such as
                @UUID[Compendium.pf2e.spells-srd.Item.XXqE1eY3w3z6xJCB]{Invisibility})
                prevents the subject from being observed.</p><hr
                /><p><strong>Critical Success</strong> Any undetected or hidden
                creature you critically succeeded against becomes observed by
                you. You learn the location of objects in the area you
                critically succeeded against.</p>

                <p><strong>Success</strong> Any undetected creature you suceeded
                against becomes hidden from you instead of undetected, and any
                hidden creature you succeeded against becomes observed by you.
                You learn the location of any object or get a clue to its
                whereabouts, as determined by the GM.</p>
              gm: ''
