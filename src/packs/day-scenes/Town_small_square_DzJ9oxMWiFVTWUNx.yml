          system:
            description:
              gm: ''
              value: >-
                <p>You're distracted or otherwise unable to focus your full
                attention on defense. You take a –2 circumstance penalty to AC.
                Some effects give you the off-guard condition only to certain
                creatures or against certain attacks. Others—especially
                conditions—can make you off-guard against everything. If a rule
                doesn't specify that the condition applies only to certain
                circumstances, it applies to all of them, such as "The target is
                off-guard."</p>
            rules:
