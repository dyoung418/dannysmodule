        - img: systems/pf2e/icons/conditions/persistent-damage.webp
          name: Persistent Damage
          system:
            description:
              gm: ''
              value: >-
                <p>You are taking damage from an ongoing effect, such as from
                being lit on fire. This appears as "X persistent [type] damage,"
                where "X" is the amount of damage dealt and "[type]" is the
                damage type. Like normal damage, it can be doubled or halved
                based on the results of an attack roll or saving throw. Instead
                of taking persistent damage immediately, you take it at the end
                of each of your turns as long as you have the condition, rolling
                any damage dice anew each time. After you take persistent
                damage, roll a @Check[flat|showDC:all|dc:15] to see if you
                recover from the persistent damage. If you succeed, the
                condition ends.</p>
            rules: []
            slug: persistent-damage
