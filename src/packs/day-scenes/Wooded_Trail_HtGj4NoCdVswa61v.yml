        - _id: hHLGOCYOj0KZUdYI
          img: systems/pf2e/icons/actions/OneAction.webp
          name: Spike Volley
          sort: 400000
          system:
            description:
              gm: ''
              value: >-
                <p>The manticore flings up to two spikes from its tail,
                targeting either two different creatures or a single creature.
                If the manticore targets two different creatures, these
                creatures must be within 20 feet of one another, and the
                manticore makes a separate Strike against each; this counts as
                only one Strike for the manticore's multiple attack penalty, and
                the penalty doesn't increase until after both attacks. If the
                manticore fires both spikes at the same creature, it makes a
                single Strike. If the attack hits, it deals the damage of a
                single spike, but the target is pinned in place, rendering it
                @UUID[Compendium.pf2e.conditionitems.Item.eIcWbB5o3pP6OIMe]{Immobilized}.
                A creature that succeeds at a @Check[athletics|dc:23|name:Remove
                Spike] check (attempted as a single action) can pull the spike
                free.</p>

                <p>A manticore can hurl no more than 12 spikes in 24 hours.</p>
            rules: []
            slug: null
