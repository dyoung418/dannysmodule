          name: Deafened
          system:
            description:
              gm: ''
              value: >-
                <p>You can't hear. You automatically critically fail Perception
                checks that require you to be able to hear. You take a –2 status
                penalty to Perception checks for initiative and checks that
                involve sound but also rely on other senses. If you perform an
                action that has the auditory trait, you must succeed at a
                @Check[flat|showDC:all|dc:5] or the action is lost; attempt the
                check after spending the action but before any effects are
                applied. You are immune to auditory effects while deafened.</p>
