        - img: systems/pf2e/icons/conditions/prone.webp
          name: Prone
          system:
            description:
              value: >-
                <p>You're lying on the ground. You are
                @UUID[Compendium.pf2e.conditionitems.Item.AJh5ex99aV6VTggg]{Off-Guard}
                and take a –2 circumstance penalty to attack rolls. The only
                move actions you can use while you're prone are
                @UUID[Compendium.pf2e.actionspf2e.Item.Tj055UcNm6UEgtCg]{Crawl}
                and
                @UUID[Compendium.pf2e.actionspf2e.Item.OdIUybJ3ddfL7wzj]{Stand}.
                Standing up ends the prone condition. You can
                @UUID[Compendium.pf2e.actionspf2e.Item.ust1jJSCZQUhBZIz]{Take
                Cover} while prone to hunker down and gain greater cover against
                ranged attacks, even if you don't have an object to get behind,
                which grants you a +4 circumstance bonus to AC against ranged
                attacks (but you remain off-guard).</p>

                <p>If you would be knocked prone while you're
                @UUID[Compendium.pf2e.actionspf2e.Item.pprgrYQ1QnIDGZiy]{Climbing}
                or
                @UUID[Compendium.pf2e.actionspf2e.Item.cS9nfDRGD83bNU1p]{Flying},
                you fall. You can't be knocked prone when
                @UUID[Compendium.pf2e.actionspf2e.Item.c8TGiZ48ygoSPofx]{Swimming}.</p>
              gm: ''
            group: null
